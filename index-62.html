<script type="text/babel" data-presets="react">
const {useState, useRef, useEffect, useCallback} = React;
const D = window.GAME_DATA;
const E = window.ENGINE;
const SP = window.SPRITES;

// ═══════════════════════════════════════════════════════════════
// WORLD GENERATION & GAME STATE (refs, not React state for perf)
// ═══════════════════════════════════════════════════════════════
const WW_DEFAULT = 4800, WH_DEFAULT = 4800, SAFE_R = 360;
// WW/WH are now world-specific — accessed via G.WW / G.WH in the loop.
// We keep globals for legacy references that run before enterWorld.
let WW = WW_DEFAULT, WH = WH_DEFAULT;
window.WW = WW; window.WH = WH;

function makeWorldEntities(worldDef, playerLevel){
  const monsters = [];
  const [minL, maxL] = worldDef.monLv;
  const ww = worldDef.ww || WW_DEFAULT, wh = worldDef.wh || WH_DEFAULT;
  const xpMul = worldDef.xpMul || 1.0;
  // PvP arena (or any world with no monster list) has no mobs/bosses at all
  const hasMonsters = worldDef.monsters && worldDef.monsters.length > 0;
  if(!hasMonsters){
    return { monsters: [], bosses: [] };
  }
  // ── MONSTER DISTRIBUTION (Dragon-Nest style training grounds) ──
  // Big maps are filled with: (a) "CAGES" — dense clusters of mixed monsters in
  // defined arena spots, great for groups/grinding; (b) scattered LONERS that
  // wander the open space. Scales with map size so huge maps stay populated.
  const areaRatio = (ww * wh) / (WW_DEFAULT * WH_DEFAULT);
  const cageCount = Math.max(3, Math.round((worldDef.endgame ? 4 : 3) * Math.sqrt(areaRatio)));
  const perCage = worldDef.endgame ? 14 : 10;
  const lonerCount = Math.round((worldDef.endgame ? 30 : 22) * Math.sqrt(areaRatio));

  const tooCloseToSafe = (x,y)=> Math.hypot(x-ww/2, y-wh/2) < SAFE_R+200;
  // place fenced CAGE PENS — square arenas with a fence and ONE entrance gap.
  // Dense monster packs live inside; they hit harder (a real challenge zone).
  const cages = [];
  let guard=0;
  const CAGE_HALF = 300; // half-size of the square pen
  while(cages.length < cageCount && guard++ < cageCount*20){
    const cx = 400 + Math.random()*(ww-800);
    const cy = 400 + Math.random()*(wh-800);
    if(tooCloseToSafe(cx,cy)) continue;
    if(cages.some(c=>Math.hypot(c.x-cx,c.y-cy) < CAGE_HALF*2.6)) continue;
    const gateSide = Math.floor(Math.random()*4); // 0=top 1=right 2=bottom 3=left
    cages.push({x:cx, y:cy, half:CAGE_HALF, gateSide, dmgMult:1.4});
  }
  // fill each pen with a dense pack of mixed monsters (bound inside the fence)
  cages.forEach(c=>{
    for(let i=0;i<perCage;i++){
      const x=E.clamp(c.x+(Math.random()*2-1)*(c.half-50), 100, ww-100);
      const y=E.clamp(c.y+(Math.random()*2-1)*(c.half-50), 100, wh-100);
      const base=D.MONSTERS.find(m=>m.id===E.pick(worldDef.monsters));
      if(!base) continue;
      const lv=E.randInt(minL,maxL);
      const mo=makeMonster(base, lv, x, y, 1+lv*0.085, false, xpMul);
      mo._cage=c; mo._cageDmg=c.dmgMult; // bound to pen + hits harder
      monsters.push(mo);
    }
  });
  // scattered loners wandering the open world
  for(let i=0;i<lonerCount;i++){
    const x=120+Math.random()*(ww-240), y=120+Math.random()*(wh-240);
    if(tooCloseToSafe(x,y)) continue;
    const base=D.MONSTERS.find(m=>m.id===E.pick(worldDef.monsters));
    if(!base) continue;
    const lv=E.randInt(minL,maxL);
    monsters.push(makeMonster(base, lv, x, y, 1+lv*0.085, false, xpMul));
  }
  // expose cages for the minimap + renderer
  worldDef._cages = cages;
  G._cages = cages;
  // spawn bosses — only if the world defines one
  const bossBase = worldDef.boss ? D.BOSSES.find(b=>b.id===worldDef.boss) : null;
  let bosses = [];
  if(bossBase){
    const bossCount = worldDef.endgame ? 8 : 6;
    const bossPositions = [];
    for(let i=0;i<bossCount;i++){
      const ang = (i/bossCount)*Math.PI*2;
      const rad = Math.min(ww,wh)*0.36;
      bossPositions.push([ ww/2 + Math.cos(ang)*rad, wh/2 + Math.sin(ang)*rad ]);
    }
    bosses = bossPositions.map((p,i)=>{
      const lv = maxL + 5 + i*3;
      const scale = 0.9 + lv*0.05;
      return makeMonster(bossBase, lv, E.clamp(p[0],200,ww-200), E.clamp(p[1],200,wh-200), scale, true, xpMul);
    });
  }
  return {monsters, bosses};
}

function makeMonster(base, lv, x, y, scale, isBoss, xpMul){
  xpMul = xpMul || 1;
  const atkScale = isBoss ? Math.min(scale,8) : Math.min(scale,6);
  const rawSize = base.size * 26 * (isBoss ? Math.min(scale, 2.2) : Math.min(scale, 1.6));
  const size = Math.min(rawSize, isBoss ? 110 : 58);
  // ── HP balance: player damage grows ~linearly with level (atk ≈ 30 + lv*3),
  //    so monster HP must too. levelHp ≈ atk × ~7 hits. Linear keeps every zone
  //    at a fun 4-10 hits for an at-level player; base.hp only nudges variety. ──
  const variety = Math.min(1.35, Math.max(0.75, 0.8 + 0.4 * ((base.hp||250) / 300)));
  const levelHp = 90 + lv*42;                         // higher HP — basics alone are slow
  let hp = Math.round(levelHp * variety * (isBoss ? 11 : 1));
  // ── XP balance: derive from the LEVEL so progression is steady everywhere
  //    (~10-14 normal kills per level; bosses worth ~40 kills). Based on the
  //    XP curve: xpForLevel(lv) / ~12 = a normal kill's value. ──
  const xpNeed = E.xpForLevel(lv);
  let xpVal = Math.max(5, Math.round(xpNeed / 12 * variety * xpMul));
  if(isBoss) xpVal = Math.round(xpVal * 12); // a boss is worth ~12 normal kills (~1 level)
  // gold scales gently with level
  const goldLo = Math.round(3 + lv*1.2), goldHi = Math.round(8 + lv*2.4);
  return {
    id: Math.random(), base, lv, x, y, isBoss,
    hp, maxHp: hp,
    atk: Math.round(base.atk*atkScale), def: Math.round(base.def*Math.min(scale,5)),
    spd: base.spd, xp: xpVal, gold: [goldLo, goldHi],
    size,
    state:'idle', aggro:false, atkT:0, stunT:0, slowT:0,
    wx:0, wy:0, wt:0, hurtT:0, _dying:false,
  };
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const [screen, setScreen] = useState('login'); // login | title | charsel | game
  const [, forceUpdate] = useState(0);
  const rerender = useCallback(()=>forceUpdate(n=>n+1), []);

  // ── account / admin state ──
  const [account, setAccount] = useState(null); // current username
  const [isAdmin, setIsAdmin] = useState(false);

  // ── refs for game state (mutated in loop, no rerender) ──
  const G = useRef({
    player: null,
    monsters: [], bosses: [],
    groundItems: [], particles: [], projectiles: [], effects: [], dmgNums: [],
    camera: {x:0, y:0},
    keys: {}, joy:{active:false, dx:0, dy:0, id:-1},
    atkHeld:false, atkCd:0, skillCd:{},
    shield:false, shieldEnd:0, buffAtk:0, buffEnd:0,
    worldDef: null, facing:1,
    running:false, lastT:0, frame:0,
    nearBoss:null, log:[],
    cs:null, // computed stats cache
  }).current;
  window.G = G; // expose for debug panel

  const canvasRef = useRef(null);
  const minimapRef = useRef(null);

  // ── UI modal state (React-driven) ──
  const [modal, setModal] = useState(null); // inventory|equip|stats|shopSkill|shopGear|worldmap|null
  const openModalRef = useRef(null);
  openModalRef.current = setModal;
  const [selItem, setSelItem] = useState(null);
  const [toast, setToast] = useState(null);
  const [lvlupFlash, setLvlupFlash] = useState(0);
  const [comboPrompt, setComboPrompt] = useState(false); // center-screen combo-quest offer
  const [evoFlash, setEvoFlash] = useState(null);
  const [dead, setDead] = useState(false);
  const [hudTick, setHudTick] = useState(0); // forces HUD refresh

  // ── char select ──
  const [selClass, setSelClass] = useState(null);
  const [charName, setCharName] = useState('');
  const [savedChar, setSavedChar] = useState(null);

  // ── login form ──
  const [loginUser, setLoginUser] = useState('');
  const [loginPw, setLoginPw] = useState('');
  const [loginMode, setLoginMode] = useState('login'); // login | register
  const [loginMsg, setLoginMsg] = useState('');
  const [adminPanel, setAdminPanel] = useState(false);
  const [weeklyAnnounce, setWeeklyAnnounce] = useState(null);
  // Safety: the admin panel must never appear on the login screen, and never
  // auto-open. It only shows when explicitly toggled from title or in-game.
  useEffect(()=>{ if(screen==='login' || screen==='charsel'){ setAdminPanel(false); } }, [screen]);

  // does this account have a saved character?
  const accountChars = ()=>{ const a=E.loadAccounts()[account]; if(!a) return [null,null,null,null]; return a.characters || [a.player||null,null,null,null]; };
  const accountHasChar = ()=>{ return accountChars().some(Boolean); };
  const [charSlot, setCharSlot] = useState(0);

  useEffect(()=>{ setSavedChar(E.load()); }, [screen]);

  // ════════ LOG ════════
  const log = useCallback((msg, cls)=>{
    G.log.push({msg, cls, t:Date.now()});
    if(G.log.length>20) G.log.shift();
  }, []);

  // ════════ TOAST ════════
  const showToast = useCallback((html, color)=>{
    setToast({html, color});
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>setToast(null), 2600);
  }, []);

  // ════════ START GAME ════════
  // ════════ LOGIN / ACCOUNTS ════════
  const doRegister = async ()=>{
    // Try cloud first if configured
    if(window.WOLCloud && window.WOLCloud.on){
      setLoginMsg('יוצר חשבון בענן...');
      const cr = await window.WOLCloud.register(loginUser.trim(), E.hashPw(loginPw));
      if(!cr.ok && cr.reason!=='cloud-off'){ setLoginMsg(cr.reason); return; }
      if(cr.ok){
        // also mirror locally so offline play works
        E.registerAccount(loginUser, loginPw);
        setLoginMsg('✓ נרשמת בענן! מתחבר...');
        doLogin(true); return;
      }
    }
    const r = E.registerAccount(loginUser, loginPw);
    if(!r.ok){ setLoginMsg(r.reason); return; }
    setLoginMsg('✓ נרשמת! מתחבר...');
    doLogin(true);
  };
  const doLogin = async ()=>{
    let uname, admin, account;
    // Try cloud first if configured
    if(window.WOLCloud && window.WOLCloud.on){
      setLoginMsg('מתחבר לענן...');
      const cr = await window.WOLCloud.login(loginUser.trim(), E.hashPw(loginPw));
      if(cr.ok){
        uname = cr.username; admin = cr.account.isAdmin;
        // sync the cloud characters into the local account store so the rest of the game works unchanged
        const accts = E.loadAccounts();
        if(!accts[uname]) accts[uname] = {pw:E.hashPw(loginPw), characters:cr.account.characters, isAdmin:admin, banned:false, created:Date.now()};
        else accts[uname].characters = cr.account.characters;
        accts[uname].isAdmin = admin;
        E.saveAccounts(accts);
      } else if(cr.reason!=='cloud-off'){
        // cloud reachable but login failed (wrong pw / banned / no user)
        setLoginMsg(cr.reason); return;
      }
    }
    // Local login (fallback, or primary when cloud is off)
    if(!uname){
      const r = E.loginAccount(loginUser, loginPw);
      if(!r.ok){ setLoginMsg(r.reason); return; }
      uname = r.username;
      admin = E.isAdmin(uname);
    }
    setAccount(uname);
    // GM/admin status comes ONLY from the verified account flag (cloud is_admin,
    // set via the external admin tool). There is no password code to become GM.
    setIsAdmin(!!admin);
    setAdminPanel(false);
    setLoginPw('');
    setLoginMsg('');
    setScreen('title');
    const announce = E.resolveWeekly();
    if(announce){ setWeeklyAnnounce(announce); }
    const W = E.loadWeekly();
    if(W.pending && W.pending.account===uname){
      setTimeout(()=>showToast(`🏆 ניצחת בתחרות השבועית! אסוף את הפרס בטבלת המובילים`, '#ffd24a'), 800);
    }
  };
  const logout = ()=>{
    if(G.player){ E.save(G.player); }
    G.running=false;
    setAccount(null); setIsAdmin(false); setLoginUser(''); setLoginPw('');
    setScreen('login');
  };

  // ════════ GM / ADMIN ACTIONS ════════
  const gmGiveGold = (amt)=>{ G.player.gold += amt; log(`🛡️ GM: +${amt} זהב`, 'lg-item'); rerender(); };
  const gmGiveXP = (amt)=>{ gainXP(amt); };
  const gmSetLevel = (lv)=>{
    const p=G.player; lv=E.clamp(lv,1,250);
    p.level=lv; p.xp=0;
    p.statPoints = (lv-1)*5;
    G.cs=E.computeStats(p); p.hp=G.cs.maxHp; p.mp=G.cs.maxMp;
    G.particles=[]; G.effects=[]; G.dmgNums=[]; G.projectiles=[];
    log(`🛡️ GM: רמה הוגדרה ל-${lv}`, 'lg-xp');
    // checkEvolution handles its own rerender(); don't call rerender() again
    // to avoid React batching conflicts that can prevent evoFlash from showing.
    checkEvolution();
  };
  const gmSpawnItem = (rarity)=>{
    const p=G.player;
    const it=E.genItem(p.level, rarity, 2);
    if(p.inventory.length<40){ p.inventory.push(it); log(`🛡️ GM: יצרת ${it.emoji} ${it.name}`, 'lg-leg'); }
    rerender();
  };
  const gmFullHeal = ()=>{ const p=G.player; p.hp=G.cs.maxHp; p.mp=G.cs.maxMp; log('🛡️ GM: ריפוי מלא','lg-heal'); rerender(); };
  const gmGodMode = ()=>{ G.godMode=!G.godMode; showToast(`מצב אלמוות ${G.godMode?'🟢 פעיל':'🔴 כבוי'}`, '#5aff8a'); rerender(); };
  const gmKillAll = ()=>{
    let n=0;
    [...G.monsters, ...G.bosses].forEach(m=>{ if(m.hp>0&&!m._dying){ m._dying=true; killMonster(m); n++; } });
    showToast(`💥 ${n} אויבים חוסלו`, '#ff7a6a');
  };
  const gmUnlockWorlds = ()=>{
    G.player.unlockedWorlds = D.WORLDS.map(w=>w.id);
    showToast('🗺️ כל העולמות פתוחים', '#5aff8a'); rerender();
  };
  // expose ALL GM functions for the admin panel's live-game section
  useEffect(()=>{
    if(isAdmin && screen==='game'){
      window.__GM_HOOKS__ = {
        setLevel:gmSetLevel, heal:gmFullHeal, god:gmGodMode, killAll:gmKillAll,
        unlockAll:gmUnlockWorlds,
        gold:(n)=>{ G.player.gold+=n; showToast(`💰 +${n.toLocaleString()}`,'#ffd24a'); rerender(); },
        giveXP:gmGiveXP,
        spawnItem:gmSpawnItem,
        doubleXp:()=>gmStartEvent('double_xp'),
        bossRush:()=>gmStartEvent('boss_rush'),
        treasure:()=>gmStartEvent('treasure'),
        maxStats:()=>{ const p=G.player; p.statPoints=(p.level-1)*5; showToast('💪 נקודות סטטיסטיקה אופסו','#5aff8a'); rerender(); },
        allMaterials:()=>{ const p=G.player; if(!p.materials)p.materials={}; Object.keys(D.MATERIALS).forEach(k=>p.materials[k]=(p.materials[k]||0)+50); showToast('🔨 +50 מכל חומר','#ffaa3a'); rerender(); },
        allMounts:()=>{ const p=G.player; p.mounts=Object.keys(D.MOUNTS); showToast('🐎 כל חיות הרכיבה נפתחו','#5aff8a'); rerender(); },
        dungeonKey:()=>{ G.player.dungeonKey=true; showToast('🗝️ קיבלת מפתח מבוך','#ff66ff'); rerender(); },
        speed:()=>{ G.gmSpeed=!G.gmSpeed; G.spdBuff=G.gmSpeed?2:0; G.spdBuffEnd=G.gmSpeed?Date.now()+9e8:0; showToast(`💨 מהירות-על ${G.gmSpeed?'🟢':'🔴'}`,'#88ddff'); },
        teleport:(wid)=>{ teleport(wid); },
        isOn:()=>({god:G.godMode, dxp:G.doubleXp, speed:G.gmSpeed}),
      };
    } else { try{ delete window.__GM_HOOKS__; }catch(e){ window.__GM_HOOKS__=null; } }
  }, [isAdmin, screen]);
  const gmStartEvent = (type)=>{
    const p=G.player;
    if(type==='boss_rush'){
      const wd=G.worldDef; const bossBase=D.BOSSES.find(b=>b.id===wd.boss);
      for(let i=0;i<3;i++){
        const a=i/3*Math.PI*2; const bx=p.x+Math.cos(a)*300, by=p.y+Math.sin(a)*300;
        const mb=makeMonster(bossBase, p.level+5, E.clamp(bx,100,WW-100), E.clamp(by,100,WH-100), 1+p.level*0.04, true);
        G.bosses.push(mb);
      }
      showToast('👑 אירוע: פלישת בוסים!', '#ff9a3a'); log('🎉 אירוע בוסים החל!', 'lg-boss');
    } else if(type==='treasure'){
      for(let i=0;i<8;i++){
        const a=Math.random()*Math.PI*2, d=80+Math.random()*200;
        const it=E.genItem(p.level, E.pick(['rare','epic','legendary']), 2);
        G.groundItems.push({x:p.x+Math.cos(a)*d, y:p.y+Math.sin(a)*d, item:it, id:Math.random(), bob:Math.random()*6, t:Date.now()});
      }
      showToast('💎 אירוע: גשם אוצרות!', '#ffd24a'); log('🎉 אירוע אוצרות! אסוף הכל!', 'lg-leg');
    } else if(type==='double_xp'){
      G.doubleXp = !G.doubleXp;
      showToast(`⭐ XP כפול ${G.doubleXp?'🟢 פעיל':'🔴 כבוי'}`, '#c77dff');
    }
    rerender();
  };

  const startNew = ()=>{
    if(!selClass){ alert('בחר מחלקה!'); return; }
    if(!charName.trim()){ alert('הזן שם!'); return; }
    // block impersonator character names (GM/Admin/Owner/...) unless this is a
    // verified admin account (so a real GM can still use a "GM" tag if they want)
    if(!isAdmin && E.isReservedName(charName)){ alert('שם זה שמור ואינו זמין — אסור להתחזות לצוות'); return; }
    const p = E.createPlayer(selClass, charName.trim());
    p.account = account;
    p.charSlot = charSlot; // which of the 4 slots
    p.gm = isAdmin; // GM flag mirrors the verified account status only
    G.player = p;
    E.save(p); // persist into the account slot
    enterWorld('meadow', true);
  };

  const continueGame = (slot)=>{
    // load this account's character from the chosen slot
    const accts = E.loadAccounts();
    const chars = (account && accts[account]) ? (accts[account].characters || [accts[account].player||null]) : [E.load()];
    const useSlot = (slot!=null) ? slot : chars.findIndex(Boolean);
    const saved = chars[useSlot];
    if(!saved){ alert('אין דמות בחריץ הזה'); return; }
    if(!saved.loadout) saved.loadout = saved.skills.slice(0,8);
    if(saved.evoStage==null) saved.evoStage = 0;
    if(!saved.account) saved.account = account;
    // migrate older saves missing newer fields (prevents crashes)
    if(!saved.materials) saved.materials = {};
    if(!saved.craftedUniques) saved.craftedUniques = [];
    if(!saved.mounts) saved.mounts = ['horse'];
    if(saved.activeMount===undefined) saved.activeMount = null;
    if(saved.dungeonKey===undefined) saved.dungeonKey = false;
    if(saved.lastDungeonEntry===undefined) saved.lastDungeonEntry = 0;
    if(!saved.pets) saved.pets = [];
    if(saved.activePet===undefined) saved.activePet = null;
    if(!saved.petParts) saved.petParts = {};
    if(!saved.achievements) saved.achievements = [];
    if(saved.title===undefined) saved.title = '';
    if(saved.pvpKills===undefined) saved.pvpKills = 0;
    if(saved.dailyClaim===undefined) saved.dailyClaim = 0;
    if(saved.dailyStreak===undefined) saved.dailyStreak = 0;
    if(saved.weeklyXp===undefined) saved.weeklyXp = 0;
    if(saved.weekId===undefined) saved.weekId = 0;
    if(saved.weeklyRewardClaimed===undefined) saved.weeklyRewardClaimed = 0;
    if(!saved.evoQuests) saved.evoQuests = {};
    if(saved.evoBranch===undefined) saved.evoBranch = null;
    if(saved.evoReady===undefined) saved.evoReady = false;
    if(saved.epicStage===undefined) saved.epicStage = 0;
    saved.charSlot = useSlot;
    saved.gm = isAdmin;
    G.player = saved;
    enterWorld(saved.world || 'meadow', true);
  };

  // PvP death → revive in town (meadow) with full HP, NO penalty
  const pvpRespawn = ()=>{
    const p = G.player;
    G.cs = E.computeStats(p);
    p.hp = G.cs.maxHp; p.mp = G.cs.maxMp;
    p.x = (D.WORLDS.find(w=>w.id==='meadow').ww||4800)/2;
    p.y = (D.WORLDS.find(w=>w.id==='meadow').wh||4800)/2;
    log('💀 הובסת ב-PvP — קמת לתחייה בעיר', 'lg-heal');
    setTimeout(()=>enterWorld('meadow', false), 400);
  };

  // ── FORGE DUNGEON: 4-zone staged progression ──
  // Zones 0-2: clear a pack of monsters → a portal opens to advance.
  // Zone 3: the boss. Killing it completes the dungeon.
  const setupDungeonZone = (zoneIdx)=>{
    const wd = G.worldDef; if(!wd || !wd.dungeon) return;
    G._dungeonZone = zoneIdx;
    G._dungeonGate = null;
    G.monsters = []; G.bosses = []; G.projectiles = []; G.effects = [];
    const p = G.player;
    // place player at zone center
    p.x = WW/2; p.y = WH/2 + 200;
    const zoneNames = ['🔥 אזור הלהבות','❄️ אזור הקרח','🌌 אזור הצללים','🔨 חדר הבוס'];
    const zoneMon = [['demon','elemental'],['golem','drake'],['behemoth','reaper'],[]];
    const zoneLv = [wd.monLv[0]+zoneIdx*15, wd.monLv[0]+zoneIdx*15+20];
    if(zoneIdx < 3){
      // spawn a pack of monsters to clear
      const count = 10 + zoneIdx*3;
      for(let i=0;i<count;i++){
        const ang = (i/count)*Math.PI*2 + Math.random()*0.5;
        const rad = 300 + Math.random()*600;
        const x = E.clamp(WW/2 + Math.cos(ang)*rad, 150, WW-150);
        const y = E.clamp(WH/2 + Math.sin(ang)*rad, 150, WH-150);
        const monId = E.pick(zoneMon[zoneIdx]);
        const base = D.MONSTERS.find(m=>m.id===monId);
        if(!base) continue;
        const lv = E.randInt(zoneLv[0], zoneLv[1]);
        G.monsters.push(makeMonster(base, lv, x, y, 1+lv*0.085, false, wd.xpMul||1));
      }
      G._dungeonZoneTotal = G.monsters.length;
      showToast(`${zoneNames[zoneIdx]} — נקה את כל המפלצות!`, '#ffaa3a');
      log(`🔨 ${zoneNames[zoneIdx]} (${zoneIdx+1}/4) — הרוג ${G.monsters.length} מפלצות`, 'lg-boss');
    } else {
      // final zone: the boss
      const bossBase = D.BOSSES.find(b=>b.id===wd.boss);
      const lv = wd.monLv[1];
      G.bosses = [ makeMonster(bossBase, lv, WW/2, WH/2-100, 0.9+lv*0.05, true, wd.xpMul||1) ];
      showToast(`${zoneNames[3]} — טיטאן הנפחייה! קח קבוצה!`, '#ff3a3a');
      log('🔨 חדר הבוס! טיטאן הנפחייה ממתין — חזק מאוד, עדיף קבוצה של 4!', 'lg-boss');
      G.shake = 14;
    }
    G.camera.x = p.x - window.innerWidth/2;
    G.camera.y = p.y - window.innerHeight/2;
  };

  const advanceDungeonZone = ()=>{
    const next = (G._dungeonZone||0) + 1;
    if(next > 3){ return; }
    setupDungeonZone(next);
    G.player.hp = Math.min(G.cs.maxHp, G.player.hp + G.cs.maxHp*0.5); // heal 50% between zones
    G.player.mp = G.cs.maxMp;
    showToast('✨ עברת לאזור הבא! (+50% חיים)', '#5aff8a');
  };

  const enterWorld = (worldId, freshStart)=>{
    const p = G.player;
    const wd = D.WORLDS.find(w=>w.id===worldId);
    G.worldDef = wd;
    p.world = worldId;
    if(!p.unlockedWorlds.includes(worldId)) p.unlockedWorlds.push(worldId);

    // Update world dimensions dynamically
    WW = wd.ww || WW_DEFAULT; WH = wd.wh || WH_DEFAULT;
    window.WW = WW; window.WH = WH;

    // Decide up-front whether this world's monsters come from the SERVER (shared).
    // If so, don't build local monsters at all — the server populates them and all
    // players see/fight the SAME ones together.
    const _nonShared = ['town','arena','forge_dungeon'];
    const _willShare = !!window.WOL_SERVER_URL && !_nonShared.includes(worldId) && !wd.dungeon && !wd.pvp && !wd.town;
    const {monsters, bosses} = _willShare ? {monsters:[], bosses:[]} : makeWorldEntities(wd, p.level);
    if(_willShare) G._cages = []; // shared worlds don't use local fenced pens
    G.monsters = monsters; G.bosses = bosses;
    G.groundItems = []; G.particles = []; G.projectiles = []; G.effects = []; G.dmgNums = [];
    G.skillCd = {}; G.atkCd = 0; G.shield=false; G.buffAtk=0; G.nearBoss=null;
    p.x = WW/2; p.y = WH/2;
    // ── DUNGEON: start at zone 1 (4-zone progression) ──
    G._dungeonZone = 0; G._dungeonGate = null; G._dungeonClear = false;
    if(wd.dungeon){ setupDungeonZone(0); }
    G.cs = E.computeStats(p);
    if(freshStart){ p.hp = G.cs.maxHp; p.mp = G.cs.maxMp; }
    G.camera.x = p.x - window.innerWidth/2;
    G.camera.y = p.y - window.innerHeight/2;

    setDead(false);
    setScreen('game');
    setModal(null);
    log(`⚔️ נכנסת ל${wd.name}`, 'lg-heal');
    if(worldId==='meadow' && freshStart) log('אתה באזור מוגן. צא החוצה כדי להילחם', 'lg-xp');
    // ── Multiplayer: connect / switch world ──
    try{
      const wtier = Math.max(1, D.WORLDS.findIndex(w=>w.id===worldId)+1);
      const prof={ name:p.name, cls:p.classId, level:p.level, evoStage:p.evoStage||0,
        world:worldId, x:Math.round(p.x), y:Math.round(p.y), hp:Math.round(p.hp), maxHp:Math.round(G.cs.maxHp), worldTier:wtier,
        account:p.account||'', slot:p.charSlot||0, gold:Math.round(p.gold||0) };
      if(window.WOLNet){
        if(!window.WOLNet.connected && !window.WOLNet.ws){ window.WOLNet.connect(prof); }
        else if(window.WOLNet.connected){ window.WOLNet.changeWorld(worldId, Math.round(p.x), Math.round(p.y), wtier); }
        // PvP damage handler: when another player hits me
        window.WOLNet.onPvp=(type,m)=>{
          if(type==='pvpHurt'){
            if(G.godMode) return;
            const dmg=m.damage;
            p.hp=Math.max(0,p.hp-dmg);
            pushDmgNum(p.x, p.y-30, dmg, '#ff5a5a', true);
            G.hurtFlash=Date.now()+200;
            if(m.knockX||m.knockY){ p.x+=m.knockX*8; p.y+=m.knockY*8; }
            window.WOLNet.reportHp(p.hp);
            if(p.hp<=0){ window.WOLNet.reportDeath(m.fromId); showToast(`💀 ${m.fromName} חיסל אותך!`, '#ff5a5a'); pvpRespawn(); }
            else showToast(`⚔️ ${m.fromName} פגע בך ${dmg}`, '#ff8a5a');
          } else if(type==='pvpKill'){
            showToast(`🏆 חיסלת את ${m.victimName}!`, '#5aff8a');
            p.gold += 200; window.__pvpKills=(window.__pvpKills||0)+1;
            p.pvpKills=(p.pvpKills||0)+1; checkAchievements();
          }
        };
        // ALWAYS-ON chat receiver: store every message globally and (if the chat
        // panel is closed) flash a toast, so players see chat without opening it.
        if(!window._chatInbox) window._chatInbox=[];
        window.WOLNet.onChat=(from,text,opts)=>{
          opts=opts||{};
          window._chatInbox.push({who:from,txt:text,sys:opts.sys,me:opts.me,lv:opts.level,t:Date.now()});
          if(window._chatInbox.length>60) window._chatInbox.shift();
          if(window._onChatPush) window._onChatPush();
          // ── floating chat bubble above the speaker's head (a few seconds) ──
          if(!opts.sys){
            const bubble = { txt:text.length>60?text.slice(0,60)+'…':text, until:Date.now()+5000 };
            if(opts.me){ if(G.player) G._myBubble=bubble; }
            else if(opts.fromId!=null && window.WOLNet.peers){
              const peer = window.WOLNet.peers.get(opts.fromId);
              if(peer) peer._bubble = bubble;
            }
          }
          if(!window._chatOpen && !opts.me && !opts.sys){
            showToast(`💬 ${from}: ${text.length>40?text.slice(0,40)+'…':text}`, '#88ccff');
          }
        };
        // ── SHARED MONSTERS: in social overworld zones, the server owns monsters
        //    so all players fight the SAME ones. Not in town/arena/dungeon. ──
        const NON_SHARED = ['town','arena','forge_dungeon'];
        const tier = Math.max(1, D.WORLDS.findIndex(w=>w.id===worldId)+1);
        // Shared world = a server is configured AND this is a social overworld.
        // (Don't gate on isOnline() — the socket may still be opening; monsters
        //  arrive once connected and we suppress local spawns from the start.)
        const serverConfigured = !!window.WOL_SERVER_URL;
        G.sharedWorld = serverConfigured && !NON_SHARED.includes(worldId) && !wd.dungeon && !wd.pvp && !wd.town;
        G._serverMons = {}; // mid -> local monster object
        if(G.sharedWorld){
          G.monsters = []; // server will populate the shared monsters
          // FALLBACK: if the server is asleep/slow and no monsters arrive within
          // a few seconds, populate LOCAL monsters so the player always has
          // something to fight (prevents "empty map" when the server is waking).
          G._sharedFallbackT = setTimeout(()=>{
            if(G.sharedWorld && Object.keys(G._serverMons).length===0 && G.running){
              const ents = makeWorldEntities(wd, p.level);
              G.monsters = ents.monsters; G.bosses = ents.bosses;
              G._usingFallbackMons = true;
              showToast('⚠️ השרת מתעורר — מפלצות מקומיות זמנית', '#ffcc66');
            }
          }, 6000);
        }
        window.WOLNet.onMonsters=(kind, m)=>{
          if(!G.sharedWorld) return;
          // server monsters arrived — clear any local fallback monsters
          if(G._usingFallbackMons){ G.monsters = []; G.bosses = []; G._usingFallbackMons=false; }
          if(kind==='spawn'){
            if(m.full){ // full reset: drop server monsters not in the list
              const keep=new Set((m.monsters||[]).map(x=>x.mid));
              for(const mid in G._serverMons){ if(!keep.has(mid)){ const mo=G._serverMons[mid]; if(mo) mo._remove=true; delete G._serverMons[mid]; } }
            }
            (m.monsters||[]).forEach(sm=>{
              if(G._serverMons[sm.mid]) return; // already have it
              const base = D.MONSTERS[(sm.kind||0)%D.MONSTERS.length] || D.MONSTERS[0];
              const mo = makeMonster(base, sm.level||1, sm.x, sm.y, 1+(sm.level||1)*0.085, false, wd.xpMul||1);
              mo.mid = sm.mid; mo._server=true;
              mo.hp = sm.hp; mo.maxHp = sm.maxHp;
              G.monsters.push(mo);
              G._serverMons[sm.mid] = mo;
            });
          } else if(kind==='sync'){
            (m.monsters||[]).forEach(sm=>{ const mo=G._serverMons[sm.mid]; if(mo){ mo.hp=sm.hp; mo._tx=sm.x; mo._ty=sm.y; } });
          } else if(kind==='hp'){
            const mo=G._serverMons[m.mid]; if(mo){ mo.hp=m.hp; mo.hurtT=Date.now()+150; }
          } else if(kind==='dead'){
            const mo=G._serverMons[m.mid];
            if(mo && !mo._dying){
              mo._dying=true; mo.hp=0;
              // everyone sees the death + gets credit if THEY landed enough hits
              if(m.byId===window.WOLNet.id){ /* I got the kill credit below via killMonster */ }
              killMonsterShared(mo, m.byId===window.WOLNet.id);
            }
            delete G._serverMons[m.mid];
          }
        };
        // ── ALWAYS-ON party handler: invites must arrive even if the party panel
        //    is closed. Store the invite + show a toast; the panel reads it too. ──
        window.WOLNet.onParty=(pm)=>{
          if(pm.type==='partyInvited'){
            window._partyInvite = pm;
            showToast(`📨 ${pm.fromName} הזמין אותך לקבוצה! פתח 👥 קבוצה כדי להצטרף`, '#5aff8a');
          }
          if(window._onPartyPush) window._onPartyPush(pm);
        };
        // ── PEER ACTIONS: show other players' attacks (slash / projectile flash) ──
        window.WOLNet.onPeerAction=(m)=>{
          const peer = window.WOLNet.peers.get(m.id); if(!peer) return;
          if(m.kind==='melee'){
            G.effects.push({type:'slash', x:peer.x, y:peer.y, dir:m.facing||1, life:0.22, t:0, color:m.color||'#fff', big:true});
          } else if(m.kind==='ranged'){
            // a quick visual bolt in the facing direction
            G.effects.push({type:'cast', x:peer.x, y:peer.y, life:0.18, t:0, color:m.color||'#5affc0'});
            G.projectiles.push({x:peer.x, y:peer.y-6, vx:(m.facing||1)*600, vy:0, life:0.5, dmg:0, color:m.color||'#5affc0', size:5, hits:[], fx:'arrow', _visual:true});
          }
        };
        // ── Stage 1: SERVER-AUTHORITATIVE economy. The server sends the true
        //    gold/xp/level; the client just displays them. ──
        window.WOLNet.onCharState=(m)=>{
          const p=G.player; if(!p) return;
          p.gold = m.gold;
          p.level = m.level;
          p.xp = m.xp;
          p.xpNext = E.xpForLevel(m.level);
          if(m.gainXp || m.gainGold){
            const bonusTxt = m.bonus>1 ? ` (×${m.bonus})` : '';
            showToast(`+${(m.gainXp||0).toLocaleString()} XP +${(m.gainGold||0).toLocaleString()}🪙${bonusTxt}`, '#88ddff');
          }
          if(m.leveled){ showToast(`⬆️ עלית לרמה ${m.level}!`, '#ffd24a'); G.shake=10; }
        };
        window.WOLNet.onKicked=(m)=>{ showToast(`⛔ ${m.reason||'נותקת מהשרת'}`, '#ff5a5a'); };
        // ── PARTY SHARED XP: the server grants XP to every party member on a kill,
        //    with a bonus for bigger/diverse parties (4 distinct classes = ×1.5). ──
        window.WOLNet.onPartyXp=(m)=>{
          if(!G.player) return;
          gainXP(m.xp||0, false);
          if(m.gold){ G.player.gold += m.gold; }
          const bonusTxt = m.bonus>1 ? ` (×${m.bonus} בונוס קבוצה!)` : '';
          showToast(`👥 +${(m.xp||0).toLocaleString()} XP${m.gold?` +${m.gold}🪙`:''} משותף${bonusTxt}`, '#88ddff');
        };
        // ── WORLD BOSS: a giant shared boss that needs a group to defeat ──
        window.WOLNet.onBoss=(kind, m)=>{
          if(kind==='spawn'){
            if(!G.sharedWorld) return;
            const base = (D.BOSSES&&D.BOSSES[0]) || D.MONSTERS[0];
            const wb = makeMonster(base, m.level||50, m.x, m.y, 1+(m.level||50)*0.05, true, 1);
            wb.bid=m.bid; wb._server=true; wb._worldBoss=true; wb.isBoss=true;
            wb.hp=m.hp; wb.maxHp=m.maxHp; wb.size=120; wb._bossName=m.name;
            G.bosses.push(wb); G._worldBoss=wb;
            G.shake=16;
            showToast(`⚠️ בוס עולם: ${m.name}! התאגדו!`, '#ff3a3a');
            log(`⚠️ בוס עולם הופיע: ${m.name} — חזק מאוד, צריך קבוצה!`, 'lg-boss');
          } else if(kind==='hp'){
            if(G._worldBoss && G._worldBoss.bid===m.bid){ G._worldBoss.hp=m.hp; G._worldBoss.hurtT=Date.now()+150; }
          } else if(kind==='dead'){
            if(G._worldBoss && G._worldBoss.bid===m.bid){
              deathBurst(G._worldBoss.x, G._worldBoss.y, '#ff3a3a', true);
              G.bosses = G.bosses.filter(b=>b!==G._worldBoss);
              G._worldBoss=null; G.shake=20;
              showToast(`🏆 ${m.byName} הפיל את בוס העולם!`, '#ffd24a');
            }
          } else if(kind==='gone'){
            if(G._worldBoss && G._worldBoss.bid===m.bid){ G.bosses=G.bosses.filter(b=>b!==G._worldBoss); G._worldBoss=null; }
          } else if(kind==='reward'){
            const p=G.player; if(!p) return;
            gainXP(m.xp||0, false); p.gold += (m.gold||0);
            // bonus: a guaranteed legendary drop for helping kill a world boss
            if(p.inventory && p.inventory.length<40){ p.inventory.push(E.genItem(p.level,'legendary',2)); }
            showToast(`🏆 פרס בוס עולם: +${(m.xp||0).toLocaleString()}XP +${(m.gold||0).toLocaleString()}🪙 + חפץ אגדי!`, '#ffd24a');
            log(`🏆 הבסת את ${m.name}! פרס ענק לכל העוזרים.`, 'lg-leg');
            checkAchievements();
          }
        };
      }
    }catch(e){}
    G.needStart = true;
  };

  // Robustly start the game loop only AFTER the canvas element is mounted & sized.
  useEffect(()=>{
    if(screen!=='game') return;
    let raf;
    const tryStart = ()=>{
      const cv = canvasRef.current;
      if(!cv){ raf = requestAnimationFrame(tryStart); return; }
      const w = window.innerWidth || document.documentElement.clientWidth || 360;
      const h = window.innerHeight || document.documentElement.clientHeight || 640;
      // ensure CSS pixel size matches the drawing buffer
      cv.width = w; cv.height = h;
      cv.style.width = w+'px'; cv.style.height = h+'px';
      if(G.player){
        G.camera.x = G.player.x - w/2;
        G.camera.y = G.player.y - h/2;
      }
      G.needStart = false;
      G.running = true;
      G.lastT = performance.now();
      requestAnimationFrame(loopRef.current);
    };
    raf = requestAnimationFrame(tryStart);
    return ()=>{ if(raf) cancelAnimationFrame(raf); };
  }, [screen]);

  // ════════ TELEPORT ════════
  const teleport = (worldId)=>{
    const wd = D.WORLDS.find(w=>w.id===worldId);
    if(G.player.level < wd.reqLv){ showToast(`דרושה רמה ${wd.reqLv}`, '#ff5a5a'); return; }
    // Stop current loop, rebuild world, then restart the loop on next frame.
    G.running = false;
    enterWorld(worldId, false);
    requestAnimationFrame(()=>{
      const cv = canvasRef.current;
      if(cv){
        const w = window.innerWidth||360, h = window.innerHeight||640;
        cv.width=w; cv.height=h; cv.style.width=w+'px'; cv.style.height=h+'px';
        G.camera.x = G.player.x - w/2; G.camera.y = G.player.y - h/2;
      }
      G.needStart=false; G.running=true; G.lastT=performance.now();
      requestAnimationFrame(loopRef.current);
    });
  };

  // ════════ XP / LEVEL ════════
  const gainXP = useCallback((amt, isKill)=>{
    const p = G.player;
    if(p.level>=250) return;
    // World XP multiplier
    const worldMul = G.worldDef?.xpMul || 1.0;
    amt = Math.round(amt * worldMul);
    if(G.doubleXp) amt *= 2;
    // Kill streak bonus (up to +50% XP)
    if(isKill){
      const now = Date.now();
      if(!G._streakT || now - G._streakT > 4000){ G._streak = 0; }
      G._streak = (G._streak||0) + 1;
      G._streakT = now;
      if(G._streak >= 5){
        const bonus = Math.min(0.20, (G._streak-4)*0.03);
        amt = Math.round(amt * (1 + bonus));
        if(G._streak === 5 || G._streak === 10 || G._streak % 10 === 0){
          showToast(`🔥 רצף ${G._streak}! +${Math.round(bonus*100)}% XP`, '#ff9a3a');
        }
      }
    }
    p.xp += amt;
    // ── Weekly XP tracking for the weekly leaderboard (GM accounts excluded) ──
    if(!p.gm){
      const wk = Math.floor(Date.now()/(7*24*60*60*1000)); // ISO-ish week number
      if(p.weekId !== wk){ p.weekId = wk; p.weeklyXp = 0; } // new week resets
      p.weeklyXp = (p.weeklyXp||0) + amt;
    }
    let leveled=0, guard=0;
    while(p.xp >= E.xpForLevel(p.level) && p.level<250 && guard<300){
      guard++;
      p.xp -= E.xpForLevel(p.level);
      p.level++;
      E.applyLevelGrowth(p);
      leveled++;
    }
    // check gold quests
    if(p.quests && window.GAME_DATA.QUESTS){
      window.GAME_DATA.QUESTS.filter(q=>q.type==='gold').forEach(q=>{
        if(!p.quests[q.id]) p.quests[q.id]={progress:0,done:false,claimed:false};
        const qs=p.quests[q.id];
        if(!qs.done && p.gold>=q.target){ qs.progress=p.gold; qs.done=true; log(`✅ משימת זהב: ${q.name}!`,'lg-leg'); }
      });
    }
    // check level quests
    if(p.quests && window.GAME_DATA.QUESTS){
      window.GAME_DATA.QUESTS.filter(q=>q.type==='level').forEach(q=>{
        if(!p.quests[q.id]) p.quests[q.id]={progress:0,done:false,claimed:false};
        const qs=p.quests[q.id];
        if(!qs.done && p.level>=q.target){ qs.progress=p.level; qs.done=true; log(`✅ משימה: ${q.name}!`,'lg-leg'); }
      });
    }
    if(leveled){
      G.cs = E.computeStats(p);
      p.hp = G.cs.maxHp; p.mp = G.cs.maxMp;
      setLvlupFlash(Date.now());
      setTimeout(()=>setLvlupFlash(0), 2500);
      log(`⭐ עלית לרמה ${p.level}! (+${leveled*5} נקודות סטטיסטיקה)`, 'lg-xp');
      // Milestone messages
      const milestones = {
        10:'🌟 עשרה רמות! הרפתקאי אמיתי!',
        25:'💫 רמה 25 — לוחם מנוסה!',
        50:'🔥 רמה 50 — גיבור של ממש!',
        75:'⚡ רמה 75 — בחירי הגורל!',
        100:'🏆 מאה רמות! אגדה חיה!',
        125:'💎 רמה 125 — כוח בלתי נתפס!',
        150:'👑 רמה 150 — מעבר לאנושי!',
        175:'🌌 רמה 175 — קרוב לקצה...',
        200:'🔱 רמה 200! אל מלחמה!',
        220:'⭐ רמה 220 — עזבת את הגבולות!',
        250:'🌠 רמה 250 — שיא מוחלט!'
      };
      if(milestones[p.level]){ showToast(milestones[p.level], '#ffd24a'); log(milestones[p.level], 'lg-leg'); }
      // ── Level 30: offer the COMBO MASTERY quest (center-screen prompt) ──
      if(p.level>=30 && !p.comboUnlocked && !p.comboQuestActive && !p.comboQuestOffered){
        p.comboQuestOffered = true;
        setComboPrompt(true);
      }
      rerender();
      checkEvolution();
    }
  }, []);

  // ════════ EVOLUTION ════════
  // Are all evolution quests for a given stage level complete?
  const evoQuestsComplete = (p, stageLv)=>{
    const def = D.EVO_QUESTS[stageLv];
    if(!def) return true;
    if(def.epic){ return (p.epicStage||0) >= 4; } // lv220 epic chain (4 stages)
    if(!p.evoQuests) p.evoQuests={};
    return def.quests.every(q=>p.evoQuests[q.id] && p.evoQuests[q.id].done);
  };
  // Update evo quest progress after kills/bosses/gold changes
  const updateEvoQuests = ()=>{
    const p = G.player; if(!p) return;
    if(!p.evoQuests) p.evoQuests={};
    const evos = D.EVOLUTIONS[p.classId]||[];
    const nextStage = evos[p.evoStage||0];
    if(!nextStage) return;
    const def = D.EVO_QUESTS[nextStage.lv];
    if(!def || def.epic) return;
    def.quests.forEach(q=>{
      if(!p.evoQuests[q.id]) p.evoQuests[q.id]={progress:0,done:false};
      const qs=p.evoQuests[q.id]; if(qs.done) return;
      if(q.type==='kill_any') qs.progress = p.kills;
      else if(q.type==='gold') qs.progress = p.gold;
      else if(q.type==='boss_any') qs.progress = p._evoBossKills||0;
      if(qs.progress>=q.target){ qs.done=true; showToast(`✅ משימת התפתחות הושלמה!`,'#5aff8a'); }
    });
  };

  const checkEvolution = useCallback(()=>{
    const p = G.player;
    const evos = D.EVOLUTIONS[p.classId] || [];
    let lastEvo = null;
    // Evolve only if the player reached the level AND completed the evo quests.
    while((p.evoStage||0) < evos.length && p.level >= evos[p.evoStage].lv){
      const stageLv = evos[p.evoStage].lv;
      // Are this stage's quests complete?
      if(!evoQuestsComplete(p, stageLv)){
        // Reached the level but quests pending — flag it, don't evolve yet.
        if(!p.evoReady){
          p.evoReady = true;
          showToast(`⚡ הגעת לרמת התפתחות! השלם משימות אצל הנביא בעיר`, '#ffd24a');
          log(`⚡ אתה מוכן להתפתח לרמה ${stageLv} — דבר עם 📜 נותן המשימות בעיר להשלמת משימות ההתפתחות`, 'lg-leg');
        }
        break;
      }
      // lv220 requires a branch choice — handled by the evo panel, not here
      if(evos[p.evoStage].branch && !p.evoBranch){
        if(!p.evoReady){ p.evoReady=true; showToast('⚡ בחר את מסלול ההתפתחות הסופי שלך!','#ffd24a'); }
        break;
      }
      const evo = evos[p.evoStage];
      // apply branch override at the final stage
      let grantSkill = evo.skill;
      if(evo.branch && p.evoBranch){
        const br = (D.EVO_BRANCHES[p.classId]||[]).find(b=>b.id===p.evoBranch);
        if(br) grantSkill = br.skill;
      }
      p.evoStage = (p.evoStage||0) + 1;
      p.evoReady = false;
      if(grantSkill && !p.skills.includes(grantSkill)){
        p.skills.push(grantSkill);
        if(p.loadout.length<8) p.loadout.push(grantSkill);
        else p.loadout[p.loadout.length-1] = grantSkill;
      }
      lastEvo = evo;
    }
    if(lastEvo){
      G.cs = E.computeStats(p);
      p.hp = G.cs.maxHp; p.mp = G.cs.maxMp;

      // ── BUG FIX: hard-snap camera AND clamp player to safe screen position ──
      const w = window.innerWidth||360, h = window.innerHeight||640;
      // Ensure player won't be within 200px of any screen edge after camera snap
      p.x = E.clamp(p.x, 200, WW-200);
      p.y = E.clamp(p.y, 200, WH-200);
      G.camera.x = p.x - w/2;
      G.camera.y = p.y - h/2;

      // Reset all input so nothing is "stuck" when evo screen closes
      G.keys = {};
      G.joy = {active:false, dx:0, dy:0, id:-1};
      G.atkHeld = false;
      G._moving = false;

      // Pause FIRST so burst/effects don't cause a race with the loop
      G.running = false;
      // Flush any in-flight projectiles/particles so they don't pile up
      G.projectiles = []; G.particles = []; G.effects = []; G.dmgNums = [];
      // single clean ring effect (rendered manually from evo overlay, not the loop)
      G.effects.push({type:'ring', x:p.x, y:p.y, r:0, maxR:200, color:lastEvo.aura, life:1.0, t:0});
      const evoSkill = D.SKILLS[lastEvo.skill] || null;
      setEvoFlash({stage:p.evoStage, name:lastEvo.name, skill:evoSkill, color:lastEvo.color});
      if(evoSkill){
        log(`🌟✨ התפתחת ל${lastEvo.name}! מתקפה חדשה: ${evoSkill.name}`, 'lg-leg');

  // Stable ref to loop so closeEvoFlash always calls the current loop (avoids stale closure)
  const loopRef = useRef(null);

  const closeEvoFlash = useCallback(()=>{

  // ════════ COMBAT: player deals damage ════════
  // isBasic=true → a normal auto-attack. Bosses heavily RESIST basic attacks, so
  // players must use skills & combos to bring a boss down (Dragon-Nest philosophy).
  const hitMonster = useCallback((mon, mult, critChance, isBasic)=>{
    const p = G.player, cs = G.cs;
    const isMagic = (p.classId==='mage') || (p.classId==='paladin' && Math.random()<0.5);
    const power = isMagic ? Math.max(cs.atk, cs.matk) : cs.atk;
    const comboActive = (G._comboMult && Date.now()<(G.comboExpire||0));
    const combo = comboActive ? G._comboMult : 1;
    let dmg = Math.max(1, Math.round(power*mult*combo - mon.def*0.4 + (Math.random()-0.5)*power*0.2));
    // BOSS basic-attack resistance: a normal attack does only ~15% to a boss.
    // Skills do full damage; combo-empowered hits do full+. This makes skills/
    // combos mandatory for boss kills instead of mindless basic-attack spam.
    if((mon.isBoss||mon._worldBoss) && isBasic && !comboActive){ dmg = Math.max(1, Math.round(dmg*0.15)); }
    const crit = Math.random() < (cs.crit + (critChance||0));
    if(crit) dmg = Math.round(dmg*2);
    pushDmgNum(mon.x, mon.y - mon.size, dmg, crit?'#ffd24a':'#fff', crit);
    mon.hurtT = Date.now()+150;
    // ── WORLD BOSS: route damage to the server (shared HP across all players) ──
    if(mon._worldBoss && mon.bid && window.WOLNet && window.WOLNet.isOnline()){
      mon.hp -= dmg; // optimistic
      window.WOLNet.worldBossHit(mon.bid, dmg);
      return;
    }
    // ── SHARED monster: send damage to the server (authoritative HP). The server
    //    broadcasts the new HP/death to everyone so all players fight it together. ──
    if(mon._server && mon.mid && window.WOLNet && window.WOLNet.isOnline()){
      mon.hp -= dmg; // optimistic local update for instant feel; server will correct
      window.WOLNet.monsterHit(mon.mid, dmg);
      // do NOT call killMonster here — wait for the server's 'monsterDead' broadcast
      return;
    }
    // local (offline / non-shared) monster
    mon.hp -= dmg;
    if(mon.hp<=0 && !mon._dying){ mon._dying=true; killMonster(mon); }
  }, []);

  // Check & unlock achievements; grant gold + title. Returns newly unlocked.
  // Push character + leaderboard score to Supabase (no-op if cloud is off)
  const cloudSync = useCallback((p)=>{
    if(!window.WOLCloud || !window.WOLCloud.on || !p || !p.account) return;
    try{
      // 1) save the whole characters array for this account
      const accts = E.loadAccounts();
      const acc = accts[p.account];
      if(acc) window.WOLCloud.saveCharacters(p.account, acc.characters || [p]);
      // 2) upsert this character's public leaderboard row
      const wk = E.currentWeekId();
      const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,Math.round(v||0)));
      window.WOLCloud.pushScore({
        username: p.account,
        slot: clamp(p.charSlot,0,3),
        name: String(p.name||'').slice(0,16),
        class_id: p.classId,
        level: clamp(p.level,1,250),
        kills: clamp(p.kills,0,99999999),
        gold: clamp(p.gold,0,9999999999),
        weekly_xp: clamp(p.weekId===wk ? (p.weeklyXp||0) : 0, 0, 999999999),
        week_id: wk,
        is_gm: !!p.gm,
        updated_at: new Date().toISOString(),
      });
    }catch(e){}
  }, []);

  const checkAchievements = useCallback(()=>{
    const p = G.player; if(!p) return;
    if(!p.achievements) p.achievements=[];
    (D.ACHIEVEMENTS||[]).forEach(a=>{
      if(p.achievements.includes(a.id)) return;
      if(a.check(p)){
        p.achievements.push(a.id);
        p.gold += a.reward;
        if(a.title) p.title = a.title; // latest achievement title becomes active
        showToast(`🏆 הישג: ${a.emoji} ${a.name}! +${a.reward.toLocaleString()}🪙`, '#ffd24a');
        log(`🏆 הישג חדש: ${a.name} — תואר "${a.title}"`, 'lg-leg');
      }
    });
  }, []);

  const giveMaterial = useCallback((matId, count)=>{
    const p = G.player;
    if(!p.materials) p.materials = {};
    p.materials[matId] = (p.materials[matId]||0) + count;
  }, []);

  const killMonster = useCallback((mon)=>{
    const p = G.player;
    const goldAmt = E.randInt(mon.gold[0], mon.gold[1]);
    p.gold += goldAmt; p.kills++;
    if(mon.isBoss){ p._evoBossKills = (p._evoBossKills||0)+1; }
    checkAchievements();
    updateEvoQuests();
    // ── PET PARTS: drop based on world theme + monster type ──
    {
      if(!p.petParts) p.petParts={};
      const give=(id)=>{ p.petParts[id]=(p.petParts[id]||0)+1; showToast(`${D.PET_PARTS[id].emoji} ${D.PET_PARTS[id].name}!`, '#88ffcc'); };
      const tile = G.worldDef?.tile, eg = G.worldDef?.endgame;
      // essence: ~3% in green worlds
      if((tile==='grass'||tile==='forest') && Math.random()<0.03) give('pet_essence');
      // fang: ~2% beasts in forest/swamp/snow
      else if((tile==='forest'||tile==='swamp'||tile==='snow') && Math.random()<0.02) give('beast_fang');
      // ember feather: ~2% fire worlds
      else if((tile==='lava'||tile==='inferno') && Math.random()<0.02) give('ember_feather');
      // spirit dust: ~2% shadow/astral
      else if((tile==='void'||tile==='astral'||tile==='celestial') && Math.random()<0.02) give('spirit_dust');
      // phoenix ash: ~1% from endgame bosses
      if(mon.isBoss && eg && Math.random()<0.01) give('phoenix_ash');
    }
    gainXP(mon.xp, true);
    log(`💀 ${mon.base.name} +${mon.xp}XP +${goldAmt}🪙`, 'lg-xp');
    // ── Quest kill tracking ──
    if(!p.questKills) p.questKills = {};
    if(!p.quests) p.quests = {};
    const _qkid = mon.base.id;
    p.questKills[_qkid] = (p.questKills[_qkid]||0)+1;
    (window.GAME_DATA.QUESTS||[]).forEach(q=>{
      if(q.reqLv > p.level) return;
      if(!p.quests[q.id]) p.quests[q.id] = {progress:0, done:false, claimed:false};
      const qs = p.quests[q.id]; if(qs.done) return;
      if(q.type==='kill'&&q.target===_qkid){ qs.progress=Math.min(q.count,(qs.progress||0)+1); if(qs.progress>=q.count){qs.done=true; log(`✅ משימה: ${q.name}!`,'lg-leg');} }
      if(q.type==='boss'&&q.target===_qkid&&mon.isBoss){ qs.progress=1; qs.done=true; log(`✅ בוס: ${q.name}!`,'lg-leg'); }
    });
    deathBurst(mon.x, mon.y, mon.base.color, mon.isBoss);

    // ── LOOT DROP SYSTEM (tiered by world depth, monster level & boss status) ──
    // Philosophy (Dragon Nest / MU): normal mobs drop occasionally and mostly low
    // rarity; deeper worlds raise both drop rate AND rarity; bosses are the real
    // loot piñata (guaranteed multiple drops incl. a high-rarity piece).
    const worldTier = Math.max(1, (D.WORLDS.findIndex(w=>w.id===(G.worldDef&&G.worldDef.id))+1));
    const eg2 = G.worldDef && G.worldDef.endgame;
    // weighted rarity roll, biased upward by world tier
    const rollRarity = (bonus)=>{
      const t = worldTier + (bonus||0);
      const r = Math.random()*100;
      // higher tier shifts the curve toward better rarities
      const legc = Math.min(18, 0.5 + t*0.9);          // legendary chance %
      const epic = Math.min(34, 4 + t*1.8);            // epic %
      const rare = Math.min(45, 18 + t*1.2);           // rare %
      if(eg2 && r < legc*0.4) return 'mythic';
      if(r < legc) return 'legendary';
      if(r < legc+epic) return 'epic';
      if(r < legc+epic+rare) return 'rare';
      if(r < legc+epic+rare+25) return 'uncommon';
      return 'common';
    };
    if(mon.isBoss){
      // BOSS: 3-5 drops, first is guaranteed epic+ (legendary in higher worlds)
      const n = E.randInt(3,5);
      for(let i=0;i<n;i++){
        const forced = i===0 ? (worldTier>=7?'legendary':'epic') : rollRarity(2);
        const it=E.genItem(mon.lv, forced, 1.5);
        G.groundItems.push({x:mon.x+(Math.random()-0.5)*90, y:mon.y+(Math.random()-0.5)*90, item:it, id:Math.random(), bob:Math.random()*6, t:Date.now()});
        if(['legendary','mythic','epic'].includes(it.rarity)) showToast(`${it.emoji} <b style="color:${D.RARITY[it.rarity].color}">${it.name}</b>`, D.RARITY[it.rarity].color);
      }
    } else {
      // NORMAL MOB: deeper worlds drop more often (35%→~60% at high tier)
      const dropChance = Math.min(0.6, 0.32 + worldTier*0.02);
      if(Math.random() < dropChance){
        const it=E.genItem(mon.lv, rollRarity(0), 0);
        G.groundItems.push({x:mon.x+(Math.random()-0.5)*60, y:mon.y+(Math.random()-0.5)*60, item:it, id:Math.random(), bob:Math.random()*6, t:Date.now()});
        if(['legendary','mythic','epic'].includes(it.rarity)) showToast(`${it.emoji} <b style="color:${D.RARITY[it.rarity].color}">${it.name}</b>`, D.RARITY[it.rarity].color);
      }
    }
    // gold drop chance (bosses always drop gold)
    if(mon.isBoss || Math.random()<0.5){
      G.groundItems.push({x:mon.x+(Math.random()-0.5)*40, y:mon.y+(Math.random()-0.5)*40, gold:goldAmt, id:Math.random(), bob:0, t:Date.now()});
    }

    // ── FORGE DUNGEON: rare material drops ──
    if(G.worldDef && G.worldDef.dungeon){
      const matByZone = ['ember_shard','frost_core','void_essence','titan_ore'];
      const zone = G._dungeonZone || 0;
      if(mon.isBoss){
        // boss drops crafting materials to the whole party + rare unlock items
        const matId = E.pick(matByZone);
        giveMaterial(matId, 4);
        showToast(`🔨 קיבלת 4× ${D.MATERIALS[matId].emoji} ${D.MATERIALS[matId].name}!`, '#ffaa3a');
        log('🔨 הבוס הפיל חומרי יצירה לכל הקבוצה!', 'lg-leg');
        // forge_crystal for endgame crafting
        giveMaterial('forge_crystal', 1);
        showToast(`💎 גביש הנפחייה! (לחפצי endgame)`, '#ff66ff');
        // rare drop chances: 10% rare#1, 5% rare#2
        if(Math.random()<0.10){ const it=E.genItem(mon.lv,'legendary',2); G.groundItems.push({x:mon.x+20,y:mon.y,item:it,id:Math.random(),bob:0,t:Date.now()}); showToast(`🎁 חפץ נדיר #1!`,'#e6cc80'); }
        if(Math.random()<0.05){ const it=E.genItem(mon.lv,'mythic',3); G.groundItems.push({x:mon.x-20,y:mon.y,item:it,id:Math.random(),bob:0,t:Date.now()}); showToast(`🌟 חפץ נדיר #2 מיתי!`,'#ff66ff'); }
        // share materials with party members (multiplayer)
        if(window.WOLNet && window.WOLNet.isOnline() && window.WOLNet.party){ /* server could broadcast; local players get theirs on their own kill credit */ }
      } else {
        // 1% chance for a zone material from normal dungeon monsters
        if(Math.random()<0.01){
          const matId = matByZone[zone % 4];
          giveMaterial(matId, 1);
          showToast(`✨ ${D.MATERIALS[matId].emoji} ${D.MATERIALS[matId].name} נדיר!`, '#5affc0');
        }
      }
    }

    if(mon.isBoss){
      // Endgame: soul devourer drops a random infernal set piece
      if(mon.base.id==='soul_devourer'){
        const setDef = D.SHOP_SETS.find(st=>st.id==='infernal_set');
        const pc = E.pick(setDef.pieces);
        const piece = E.genSetPiece(pc.baseIdx, Math.max(200,mon.lv), 'mythic', 'infernal_set', setDef.name);
        G.groundItems.push({x:mon.x+(Math.random()-0.5)*50, y:mon.y, item:piece, id:Math.random(), bob:Math.random()*6, t:Date.now()});
        showToast(`💀 <b style="color:#e6cc80">${piece.name}</b> — חלק מסט התהום!`, '#e6cc80');
        log('💀 הפיל חלק מסט התהום המיתי!', 'lg-leg');
      }
      G.nearBoss=null;
      mon.hp=0; mon._dying=true;
      // ── DUNGEON BOSS: completing it finishes the dungeon (no respawn) ──
      if(G.worldDef && G.worldDef.dungeon && mon.base.dungeon){
        G._dungeonClear = true;
        // big material reward to the whole party (handled in the dungeon drop block above)
        showToast('🏆 ניצחת את טיטאן הנפחייה! המבוך הושלם!', '#ffd24a');
        log('🏆🔨 השלמת את מבוך הנפחייה! חזור לעיר ליצור חפצים', 'lg-leg');
        // chance to drop a dungeon key for re-entry
        if(Math.random()<0.5){ G.player.dungeonKey=true; showToast('🗝️ קיבלת מפתח מבוך לכניסה נוספת!', '#ffaa3a'); }
        // return to town after a moment
        setTimeout(()=>{ if(G.running) teleport('town'); }, 4000);
        return;
      }
      // normal boss: respawn after 60s
      setTimeout(()=>{
        mon._dying=false; mon.aggro=false; mon.state='idle';
        mon.hp = mon.maxHp;
      }, 60000);
    } else {
      // remove the monster
      const idx = G.monsters.indexOf(mon);
      if(idx>=0) G.monsters.splice(idx,1);
      // ── DUNGEON: don't respawn — check if the zone is cleared ──
      if(G.worldDef && G.worldDef.dungeon){
        const alive = G.monsters.filter(m=>m.hp>0).length;
        if(alive === 0 && (G._dungeonZone||0) < 3 && !G._dungeonGate){
          // open a portal to the next zone
          G._dungeonGate = {x:WW/2, y:WH/2 - 350, r:55};
          showToast('✨ אזור נוקה! עבור דרך השער הזוהר →', '#5aff8a');
          log('✨ ניקית את האזור! שער לאזור הבא נפתח במרכז', 'lg-leg');
        }
        return;
      }
      // normal worlds: respawn to keep the map full (NOT in shared online worlds —
      // the server owns those monsters and spawns them for everyone)
      if(G.sharedWorld) return;
      setTimeout(()=>{
        if(!G.running || !G.worldDef) return;
        const wd = G.worldDef;
        if(wd.dungeon) return;
        const monId = E.pick(wd.monsters);
        const base = D.MONSTERS.find(m=>m.id===monId);
        if(!base) return;
        const lv = E.randInt(wd.monLv[0], wd.monLv[1]);
        const scale = 1 + lv*0.085;
        const ww = G.WW||WW, wh = G.WH||WH;
        let x,y,tries=0;
        do{ x=120+Math.random()*(ww-240); y=120+Math.random()*(wh-240); tries++; }
        while(Math.hypot(x-ww/2,y-wh/2)<SAFE_R+120 && tries<30);
        G.monsters.push(makeMonster(base, lv, x, y, scale, false, wd.xpMul||1));
      }, 8000);
    }
  }, []);

  // Called when the SERVER reports a shared monster died. Everyone sees the death
  // animation; only the killer (iGotKill) receives XP / gold / loot credit.
  const killMonsterShared = useCallback((mon, iGotKill)=>{

    const tile=G.worldDef?.tile;
    if((tile==='grass'||tile==='forest')&&Math.random()<0.03) give('pet_essence');
    else if((tile==='forest'||tile==='swamp'||tile==='snow')&&Math.random()<0.02) give('beast_fang');
    else if((tile==='lava'||tile==='inferno')&&Math.random()<0.02) give('ember_feather');
    else if((tile==='void'||tile==='astral'||tile==='celestial')&&Math.random()<0.02) give('spirit_dust');
    // loot drop
    if(Math.random()<0.35){
      const it=E.genItem(mon.lv||10, null, 0);
      G.groundItems.push({x:mon.x+(Math.random()-0.5)*60,y:mon.y+(Math.random()-0.5)*60,item:it,id:Math.random(),bob:Math.random()*6,t:Date.now()});
      if(['legendary','mythic','epic'].includes(it.rarity)) showToast(`${it.emoji} <b style="color:${D.RARITY[it.rarity].color}">${it.name}</b>`, D.RARITY[it.rarity].color);
    }
    if(Math.random()<0.5) G.groundItems.push({x:mon.x,y:mon.y,gold:goldAmt,id:Math.random(),bob:0,t:Date.now()});
  }, []);
  const monsterHitPlayer = useCallback((mon)=>{
    const p = G.player, cs = G.cs;
    if(G.shield || G.godMode){ return; }
    let dmg = Math.max(0, Math.round(mon.atk - cs.def*0.45 + (Math.random()-0.5)*mon.atk*0.2));
    if(mon._cageDmg) dmg = Math.round(dmg * mon._cageDmg); // pen monsters hit harder
    p.hp = Math.max(0, p.hp - dmg);
    if(dmg>0) pushDmgNum(p.x, p.y-40, dmg, '#ff5a5a', false);
    if(p.hp<=0){
      G.running=false;
      setTimeout(()=>setDead(true), 400);
    }
  }, []);

  // ════════ DAMAGE NUMBERS ════════
  function pushDmgNum(wx, wy, val, color, crit){
    G.dmgNums.push({x:wx, y:wy, val:(crit?'⚡':'')+val, color, crit, life:1.0, vy:-1.2});
    if(G.dmgNums.length>40) G.dmgNums.shift();
  }

  // ════════ PARTICLE / EFFECT HELPERS ════════
  function burst(wx, wy, color, count, speed){
    if(G.particles.length>300) return;
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2, sp = speed*(0.4+Math.random()*0.6);
      G.particles.push({x:wx, y:wy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.5+Math.random()*0.4, color, size:2+Math.random()*4, grav:120});
    }
  }
  function deathBurst(wx, wy, color, big){
    burst(wx, wy, color, big?40:16, big?260:160);
    burst(wx, wy, '#ffffff', big?20:8, big?200:120);
    G.effects.push({type:'ring', x:wx, y:wy, r:0, maxR:big?120:50, color, life:0.5, t:0});
  }

  // ════════ ATTACK (basic + skills) — uses currently equipped skill set ════════
  const doBasicAttack = useCallback(()=>{
    const p = G.player, cs = G.cs, now = Date.now();
    if(now < G.atkCd) return;
    const cls = p.classId;
    // ── Class attack profiles ──
    // archer: fast ranged arrows, medium dmg.  mage: ranged elemental, a bit slower/shorter than archer but strong.
    // warrior: short-range heavy melee.  paladin: medium-range melee + minor heal on hit.
    const allM = [...G.monsters, ...G.bosses.filter(b=>!b._dying)];
    // auto-target only monsters within a realistic range; else fire where facing.
    const nearestIn = (maxR)=>{ let best=null,bd=maxR; allM.forEach(m=>{ if(m.hp>0&&!m._dying){ const d=Math.hypot(m.x-p.x,m.y-p.y); if(d<bd){bd=d;best=m;} } }); return best; };

    if(cls==='archer'){
      // slower at low levels; agi speeds it up but caps higher. weak base dmg.
      const lvSpeed = Math.min(140, p.level*1.4); // low levels are notably slower
      G.atkCd = now + Math.max(300, 560 - cs.tAgi*2.2 - lvSpeed);
      const ARCHER_RANGE = 420;
      const tgt = nearestIn(ARCHER_RANGE);
      const a = tgt ? Math.atan2(tgt.y-p.y, tgt.x-p.x) : (G.facing>0?0:Math.PI);
      const sp = 760;
      G.projectiles.push({x:p.x, y:p.y+ -6, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.85, dmg:0.55, color:'#5affc0', size:5, hits:[], fx:'arrow', _basic:true, crit:Math.random()<cs.crit});
      G.effects.push({type:'slash', x:p.x, y:p.y, dir:G.facing, life:0.12, t:0, color:'#5affc0'});
    } else if(cls==='mage'){
      const lvSpeed = Math.min(130, p.level*1.3);
      G.atkCd = now + Math.max(360, 640 - cs.tAgi*1.8 - lvSpeed);
      const MAGE_RANGE = 340;
      const tgt = nearestIn(MAGE_RANGE);
      const a = tgt ? Math.atan2(tgt.y-p.y, tgt.x-p.x) : (G.facing>0?0:Math.PI);
      const sp = 640;
      const els=[['#ff5a2a','fire'],['#5ad0ff','frost'],['#cc66ff','bolt']];
      const el = els[(G._mageEl=(G._mageEl||0)+1)%3];
      G.projectiles.push({x:p.x, y:p.y-6, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.78, dmg:0.7, color:el[0], size:7, hits:[], aoe:55, fx:el[1], _basic:true, crit:Math.random()<cs.crit});
      G.effects.push({type:'cast', x:p.x, y:p.y, life:0.18, t:0, color:el[0]});
    } else if(cls==='paladin'){
      const lvSpeed = Math.min(140, p.level*1.4);

      const range = 130;
      let hit=false;

  // ── COMBO FINISHERS: each recipe gives a distinct payoff ──

  const useSkill = useCallback((skillId)=>{

    p.mp -= sk.mp;

    if(p.comboQuestActive && !p.comboUnlocked){

    if(p.comboUnlocked){

      G.comboSeq = (G.comboSeq||[]); G.comboSeq.push(skillId);

        const allDiff = new Set(last3).size===3;
