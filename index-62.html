          else if(types.filter(t=>t==='melee'||t==='dash').length>=2) recipe='power';
          else if(types[0]==='aoe' && types[1]==='aoe') recipe='freeze';
          else if(types.includes('dash')) recipe='haste';
          else recipe='crit';
          triggerComboFinisher(recipe);
          G.comboSeq = [];
        }
      }
    }

    const allM = ()=>[...G.monsters, ...G.bosses.filter(b=>!b._dying)].filter(m=>m.hp>0&&!m._dying);

    if(sk.type==='heal'){
      const h = Math.round(cs.maxHp * sk.healPct);
      p.hp = Math.min(cs.maxHp, p.hp+h);
      log(`💚 ריפאת ${h} HP`, 'lg-heal');
      burst(p.x, p.y, sk.color, 24, 120);
      G.effects.push({type:'heal', x:p.x, y:p.y, life:0.9, t:0, color:sk.color, fx:sk.fx});
    } else if(sk.type==='heal_aoe'){
      // mass heal: big self-heal + heal nearby party peers (PvP/co-op)
      const h = Math.round(cs.maxHp * (sk.heal||0.6));
      p.hp = Math.min(cs.maxHp, p.hp+h);
      log(`💚 ריפוי המונים: +${h} HP`, 'lg-heal');
      burst(p.x, p.y, sk.color, 40, 200);
      G.effects.push({type:'aoe', x:p.x, y:p.y, r:0, maxR:sk.range, color:sk.color, life:0.7, t:0, fx:sk.fx});
      G.effects.push({type:'heal', x:p.x, y:p.y, life:1.0, t:0, color:sk.color, fx:sk.fx});
    } else if(sk.type==='buff'){
      if(sk.buffAtk){ G.buffAtk=sk.buffAtk; G.buffEnd=now+sk.buffDur; }
      if(sk.shield){ G.shield=true; G.shieldEnd=now+sk.shieldDur; }
      log(`✨ ${sk.name} הופעל!`, 'lg-heal');
      burst(p.x, p.y, sk.color, 30, 140);
      G.effects.push({type:'cast', x:p.x, y:p.y, life:0.6, t:0, color:sk.color, fx:sk.fx});
      G.effects.push({type:'aura', x:p.x, y:p.y, life:(sk.buffDur?sk.buffDur:sk.shieldDur)/1000, t:0, color:sk.color, fx:sk.fx});
    } else if(sk.type==='aoe'){
      const r = sk.range;
      allM().forEach(m=>{ if(Math.hypot(m.x-p.x,m.y-p.y)<r){ hitMonster(m, sk.dmg, 0); if(sk.slow) m.slowT=now+sk.slow; if(sk.dot) m.dotT=now+2500, m.dotDmg=Math.round(cs.atk*0.3), m.dotColor=sk.color; }});
      hitPeers(r, sk.dmg, 0);
      G.effects.push({type:'aoe', x:p.x, y:p.y, r:0, maxR:r, color:sk.color, life:0.6, t:0, fx:sk.fx});
      burst(p.x, p.y, sk.color, 36, 240);
      log(`💥 ${sk.name}!`, 'lg-dmg');
    } else if(sk.type==='melee'){
      const range = sk.range;
      allM().forEach(m=>{ if(Math.hypot(m.x-p.x,m.y-p.y)<range+m.size*0.5){ hitMonster(m, sk.dmg, sk.crit||0); if(sk.stun) m.stunT=now+sk.stun; }});
      hitPeers(range, sk.dmg, sk.crit||0);
      G.effects.push({type:'slash', x:p.x, y:p.y, dir:G.facing, life:0.32, t:0, color:sk.color, big:true, fx:sk.fx});
      burst(p.x+G.facing*50, p.y, sk.color, 12, 180);
      log(`⚔️ ${sk.name}!`, 'lg-dmg');
    } else if(sk.type==='dash'){
      const tgt = nearestMonster();
      const fromX=p.x, fromY=p.y;
      if(tgt){
        const a = Math.atan2(tgt.y-p.y, tgt.x-p.x);
        p.x += Math.cos(a)*sk.range; p.y += Math.sin(a)*sk.range;
        p.x = E.clamp(p.x, 30, WW-30); p.y = E.clamp(p.y, 30, WH-30);
        allM().forEach(m=>{ if(Math.hypot(m.x-p.x,m.y-p.y)<100) hitMonster(m, sk.dmg, 0); });
        G.effects.push({type:'dash', x:p.x, y:p.y, fromX, fromY, life:0.35, t:0, color:sk.color, fx:sk.fx});
      }
      hitPeers(100, sk.dmg, 0);
      log(`💨 ${sk.name}!`, 'lg-dmg');
    } else if(sk.type==='proj' || sk.type==='multi'){
      fireProjectile(sk);
      log(`🎯 ${sk.name}!`, 'lg-dmg');
    }
    setHudTick(t=>t+1);
  }, []);

  function nearestMonster(maxDist=600){
    const p = G.player;
    let best=null, bd=maxDist;
    [...G.monsters, ...G.bosses.filter(b=>!b._dying)].forEach(m=>{
      if(m.hp<=0||m._dying) return;
      const d = Math.hypot(m.x-p.x, m.y-p.y);
      if(d<bd){ bd=d; best=m; }
    });
    return best;
  }

  function fireProjectile(sk){
    const p = G.player;
    const tgt = nearestMonster();
    let baseA;
    if(tgt) baseA = Math.atan2(tgt.y-p.y, tgt.x-p.x);
    else baseA = G.facing>0 ? 0 : Math.PI;
    const count = sk.count || 1;
    const spread = count>1 ? 0.5 : 0;
    for(let i=0;i<count;i++){
      const a = baseA + (i-(count-1)/2)*(spread/Math.max(1,count-1));
      G.projectiles.push({
        x:p.x, y:p.y, vx:Math.cos(a)*sk.speed, vy:Math.sin(a)*sk.speed,
        dmg:sk.dmg, aoe:sk.aoe, slow:sk.slow, pierce:sk.pierce, chain:sk.chain,
        fx:sk.fx, color:sk.color, life:1.4, size:sk.aoe?12:7,
        hits:[], crit:sk.crit||0,
      });
    }
  }

  // continued in part 2...

  // ════════ GAME LOOP ════════
  // loopRef is created ONCE and never changes.
  // It calls G._loopBody which is reassigned every render to the fresh loopBody closure.
  // This fixes the stale-closure bug where the loop would call old versions of
  // loopBody/render after a React re-render (e.g. after evolution).
  if(!loopRef.current){
    loopRef.current = function loop(ts){
      if(!G.running) return;
      try{ G._loopBody(ts); }
      catch(err){
        // Skip the bad frame but DON'T stop the game — a single render error
        // should never freeze gameplay. Throttle logging to avoid spam.
        if(!G._lastErrLog || Date.now()-G._lastErrLog>1000){ console.error('loop error', err); G._lastErrLog=Date.now(); }
      }
      if(G.running) requestAnimationFrame(loopRef.current);
    };
  }
  const loop = loopRef.current;

  function loopBody(ts){
    if(!G.running) return; // Guard: checkEvolution may have stopped loop mid-frame
    const dt = Math.min((ts - G.lastT)/1000, 0.05);
    G.lastT = ts; G.frame++;
    const now = Date.now();
    const p = G.player, cs = G.cs;
    if(!p || !cs) return; // Guard: player or computed stats not ready

    // buff expiry
    if(G.buffEnd && now>G.buffEnd){ G.buffAtk=0; G.buffEnd=0; }
    if(G.shield && now>G.shieldEnd) G.shield=false;

    // ── MOVEMENT ──
    let mx=0, my=0;
    if(G.keys['w']||G.keys['arrowup']) my-=1;
    if(G.keys['s']||G.keys['arrowdown']) my+=1;
    if(G.keys['a']||G.keys['arrowleft']) mx-=1;
    if(G.keys['d']||G.keys['arrowright']) mx+=1;
    if(G.joy.active){ mx+=G.joy.dx; my+=G.joy.dy; }
    const ml = Math.hypot(mx,my);
    if(ml>1){ mx/=ml; my/=ml; }
    if(mx!==0) G.facing = mx>0?1:-1;
    const moving = (mx!==0||my!==0);
    const mountMul = (p.activeMount && D.MOUNTS[p.activeMount]) ? D.MOUNTS[p.activeMount].speedMul : 1;
    const spd = cs.spd * 56 * mountMul * (G.spdBuff && Date.now()<G.spdBuffEnd ? (1+G.spdBuff) : 1);
    // NaN guard: if player position is corrupt, reset to world center
    if(!isFinite(p.x) || !isFinite(p.y)){ p.x = WW/2; p.y = WH/2; }
    p.x = E.clamp(p.x + mx*spd*dt, 30, WW-30);
    p.y = E.clamp(p.y + my*spd*dt, 30, WH-30);
    G._moving = moving;

    // auto-attack while held
    if(G.atkHeld) doBasicAttack();

    // camera follows
    G.camera.x += (p.x - window.innerWidth/2 - G.camera.x)*0.15;
    G.camera.y += (p.y - window.innerHeight/2 - G.camera.y)*0.15;
    // ── DUNGEON: stepping into the glowing portal advances to the next zone ──
    if(G._dungeonGate){
      const g=G._dungeonGate;
      if(Math.hypot(p.x-g.x, p.y-g.y) < g.r+20){
        G._dungeonGate=null;
        advanceDungeonZone();
      }
    }
    // ── TOWN: walking up to an NPC opens its panel (once, until you walk away) ──
    if(G.worldDef && G.worldDef.town && G._townNpcs){
      let nearAny=null;
      for(const npc of G._townNpcs){ if(Math.hypot(p.x-npc.x,p.y-npc.y)<70){ nearAny=npc; break; } }
      if(nearAny && G._lastNpc!==nearAny.name){
        G._lastNpc=nearAny.name;
        if(openModalRef.current) openModalRef.current(nearAny.modal);
      } else if(!nearAny){ G._lastNpc=null; }
    }
    // ── Multiplayer: broadcast my position (throttled inside WOLNet.move) ──
    if(window.WOLNet && window.WOLNet.connected){ window.WOLNet.move(p.x, p.y, G.facing, p.hp); }

    // ── AI ──
    const inSafe = Math.hypot(p.x-WW/2, p.y-WH/2) < SAFE_R;
    const updRange = 700;
    [...G.monsters, ...G.bosses].forEach(m=>{
      if(m.hp<=0||m._dying) return;
      const d = Math.hypot(m.x-p.x, m.y-p.y);
      if(d>updRange){ return; }
      updateMonsterAI(m, dt, now, inSafe);
    });

    // ── PROJECTILES ──
    updateProjectiles(dt, now);

    // ── PET COMBAT: summoned pet floats near player and auto-attacks ──
    if(p.activePet && D.PETS[p.activePet]){
      const pet = D.PETS[p.activePet];
      if(!G._pet) G._pet = {x:p.x, y:p.y, lastAtk:0};
      const pt = G._pet;
      // follow player with a gentle orbit
      const ang = now/600;
      const tx = p.x + Math.cos(ang)*70, ty = p.y + Math.sin(ang)*70 - 20;
      pt.x += (tx-pt.x)*0.1; pt.y += (ty-pt.y)*0.1;
      // attack nearest enemy in range
      if(now - pt.lastAtk > pet.rate){
        let best=null, bestD=380;
        for(const m of G.monsters){ if(m.hp>0&&!m._dying){ const d=Math.hypot(m.x-pt.x,m.y-pt.y); if(d<bestD){bestD=d;best=m;} } }
        for(const b of G.bosses){ if(b.hp>0&&!b._dying){ const d=Math.hypot(b.x-pt.x,b.y-pt.y); if(d<bestD){bestD=d;best=b;} } }
        if(best){
          pt.lastAtk = now;
          // pr.dmg is a MULTIPLIER of player power (hitMonster multiplies it),
          // so pass the pet's fraction directly — NOT pre-multiplied.
          G.projectiles.push({x:pt.x, y:pt.y, vx:(best.x-pt.x)/bestD*520, vy:(best.y-pt.y)/bestD*520,
            life:1.2, dmg:pet.dmgMul, color:pet.color, size:5, hits:[], pet:true, crit:false});
        }
      }
    } else { G._pet = null; }

    // ── PARTICLES ──
    for(let i=G.particles.length-1;i>=0;i--){
      const pt = G.particles[i];
      pt.x += pt.vx*dt; pt.y += pt.vy*dt; pt.vy += pt.grav*dt; pt.life -= dt;
      if(pt.life<=0) G.particles.splice(i,1);
    }
    // ── EFFECTS ──
    for(let i=G.effects.length-1;i>=0;i--){
      const ef = G.effects[i]; ef.t += dt;
      if(ef.type==='ring'||ef.type==='aoe') ef.r = ef.maxR * (ef.t/ef.life);
      // BOSS DANGER ZONE: when the wind-up ends, explode — damage the player if inside.
      if(ef.type==='danger' && !ef._resolved && Date.now()>=ef.fireAt){
        ef._resolved=true; ef._boom=Date.now();
        const pl=G.player;
        if(pl && !G.godMode){
          const d=Math.hypot(pl.x-ef.x, pl.y-ef.y);
          if(d <= ef.r){
            if(G.shield){ /* shield blocks it */ }
            else {
              const dmg=Math.max(1, Math.round(ef.dmg - (G.cs?G.cs.def*0.3:0)));
              pl.hp=Math.max(0, pl.hp-dmg);
              pushDmgNum(pl.x, pl.y-40, dmg, '#ff2a2a', true);
              G.hurtFlash=Date.now()+220; G.shake=12;
              if(pl.hp<=0){ G.running=false; setTimeout(()=>setDead(true),400); }
            }
          }
        }
        // visual explosion burst
        burst(ef.x, ef.y, ef.kind==='beam'?'#ff8a3a':'#ff3030', 22, 240);
        G.effects.push({type:'ring', x:ef.x, y:ef.y, r:0, maxR:ef.r, color:'#ff3030', life:0.4, t:0});
      }
      if(ef.t>=ef.life) G.effects.splice(i,1);
    }
    // ── DMG NUMBERS ──
    for(let i=G.dmgNums.length-1;i>=0;i--){
      const dn = G.dmgNums[i];
      dn.y += dn.vy; dn.vy += 0.04; dn.life -= dt*1.4;
      if(dn.life<=0) G.dmgNums.splice(i,1);
    }

    // ── pickup ground items (auto when close) ──
    for(let i=G.groundItems.length-1;i>=0;i--){
      const gi = G.groundItems[i];
      if(Math.hypot(gi.x-p.x, gi.y-p.y) < 50){
        if(gi.gold!=null){
          p.gold += gi.gold;
          G.groundItems.splice(i,1);
        } else if(p.inventory.length<40){
          p.inventory.push(gi.item);
          log(`🎒 אספת ${gi.item.emoji} ${gi.item.name}`, D.RARITY[gi.item.rarity].color==='#ff8000'?'lg-leg':'lg-item');
          G.groundItems.splice(i,1);
        }
      }
    }

    // ── regen ──
    p.mp = Math.min(cs.maxMp, p.mp + (2 + cs.tInt*0.1)*dt);
    p.hp = Math.min(cs.maxHp, p.hp + (0.5 + cs.tVit*0.05)*dt);

    // ── boss bar tracking ──
    const nb = G.bosses.find(b=>!b._dying && b.hp>0 && Math.hypot(b.x-p.x,b.y-p.y)<480);
    G.nearBoss = nb || null;

    // cleanup dead monsters periodically
    // poison/DoT ticking (~3x per second)
    if(G.frame%20===0){
      [...G.monsters, ...G.bosses].forEach(m=>{
        if(m.hp>0 && !m._dying && m.dotT && now<m.dotT){
          const dd = m.dotDmg||3;
          pushDmgNum(m.x, m.y-m.size*0.5, dd, m.dotColor||'#88ff00', false);
          // server-owned: send the tick to the server, let it manage HP/death
          if(m._worldBoss && m.bid && window.WOLNet && window.WOLNet.isOnline()){ m.hp-=dd; window.WOLNet.worldBossHit(m.bid, dd); return; }
          if(m._server && m.mid && window.WOLNet && window.WOLNet.isOnline()){ m.hp-=dd; window.WOLNet.monsterHit(m.mid, dd); return; }
          m.hp -= dd;
          if(m.hp<=0 && !m._dying){ m._dying=true; killMonster(m); }
        }
      });
    }
    if(G.frame%180===0) G.monsters = G.monsters.filter(m=>!m._remove && (m._server ? !m._dying : m.hp>0));

    // HUD refresh ~10fps
    if(G.frame%6===0) setHudTick(t=>(t+1)%1000000);

    // autosave every 30s (+ cloud sync if configured)
    if(G.frame%(60*30)===0){ E.save(p); cloudSync(p); }

    if(G.running) render(now);
  }
  // KEY FIX: always point G._loopBody at the freshest loopBody+render closures.
  // The loop (loopRef.current) calls G._loopBody so it never gets stale after a React re-render.
  G._loopBody = loopBody;

  function drawChatBubble(ctx, cx, topY, txt){
    ctx.save();
    ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    const w = Math.min(220, ctx.measureText(txt).width + 18);
    const h = 22, x = cx - w/2, y = topY - h;
    ctx.fillStyle='rgba(12,8,22,0.9)'; ctx.strokeStyle='rgba(180,150,255,0.6)'; ctx.lineWidth=1.5;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke(); }
    else { ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h); }
    // little tail
    ctx.fillStyle='rgba(12,8,22,0.9)'; ctx.beginPath();
    ctx.moveTo(cx-5, y+h-1); ctx.lineTo(cx+5, y+h-1); ctx.lineTo(cx, y+h+6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#e8e0ff'; ctx.fillText(txt, cx, y+15);
    ctx.textAlign='left'; ctx.restore();
  }

  // ── BOSS SPECIAL ATTACKS — telegraphed danger zones the player must dodge
  //    (Dragon-Nest style). The boss periodically marks a red zone on the ground;
  //    after a wind-up it explodes for heavy damage. Phases get more aggressive
  //    as the boss loses HP (enrage). ──
  function updateBossSpecials(m, now, p){
    if(!m._nextSpecial) m._nextSpecial = now + 3000 + Math.random()*2000;
    // enrage: below 50% HP fires specials more often + a "berserk" tint
    const hpPct = m.hp / (m.maxHp||1);
    const enraged = hpPct < 0.5;
    if(!m._enraged && enraged){ m._enraged=true; showToast(`🔥 ${m.base?m.base.name:'הבוס'} משתולל!`, '#ff3a3a'); G.shake=14; }
    if(now < m._nextSpecial) return;
    // pick a special based on phase
    const cd = enraged ? 2600 : 4200;
    m._nextSpecial = now + cd + Math.random()*1200;
    const roll = Math.random();
    if(roll < 0.5){
      // SLAM: a big red circle at the player's current position (telegraph → boom)
      const tx=p.x, ty=p.y, radius = m.isBoss?150:120;
      spawnDangerZone(tx, ty, radius, now, enraged?700:1000, Math.round(m.atk*2.2), 'slam');
    } else if(roll < 0.8){
      // LINE SWEEP: 3 zones in a line toward the player (a "breath/beam")
      const ang=Math.atan2(p.y-m.y, p.x-m.x);
      for(let i=1;i<=3;i++){
        const zx=m.x+Math.cos(ang)*i*130, zy=m.y+Math.sin(ang)*i*130;
        spawnDangerZone(zx, zy, 90, now+i*90, (enraged?700:1000), Math.round(m.atk*1.8), 'beam');
      }
    } else {
      // SUMMON RING: zones in a ring around the boss (must run out)
      const N=6;
      for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; const zx=m.x+Math.cos(a)*180, zy=m.y+Math.sin(a)*180;
        spawnDangerZone(zx, zy, 100, now, enraged?650:950, Math.round(m.atk*1.6), 'ring'); }
    }
  }
  // Create a telegraphed danger zone that explodes after `delay` ms.
  function spawnDangerZone(x, y, radius, fireAt, delay, dmg, kind){
    G.effects.push({ type:'danger', x, y, r:radius, fireAt: fireAt+delay, born: fireAt,
      delay, dmg, kind, life: (delay/1000)+0.35, t:0, _resolved:false });
  }

  function updateMonsterAI(m, dt, now, playerInSafe){
    if(now < m.stunT) return;
    const p = G.player;
    // ── SHARED (server-owned) monster ──
    if(m._server){
      // Determine host first (closest player runs the AI; others mirror position).
      let iAmClosest = true;
      const myD = Math.hypot(p.x-m.x, p.y-m.y);
      if(window.WOLNet && window.WOLNet.peers){
        for(const peer of window.WOLNet.peers.values()){
          if(Math.hypot(peer.x-m.x, peer.y-m.y) < myD){ iAmClosest=false; break; }
        }
      }
      if(iAmClosest){
        // HOST: run real chase AI and OWN the position (no smoothing pull-back).
        const dx=p.x-m.x, dy=p.y-m.y, d=Math.hypot(dx,dy);
        const aggroR = m.isBoss?440:360;  // monsters notice & chase the player
        const atkR = m.isBoss?90:64; const sp=m.spd*52*(now<m.slowT?0.5:1);
        if((d<aggroR||m.aggro) && !playerInSafe){
          m.aggro=true;
          if(m.isBoss || m._worldBoss){ updateBossSpecials(m, now, p); }
          if(d>atkR){ m.x+=dx/d*sp*dt; m.y+=dy/d*sp*dt; m.state='chase'; }
          else { m.state='attack'; if(now>m.atkT){ m.atkT=now+(m.isBoss?1100:1200)+Math.random()*300; monsterHitPlayer(m); } }
          if(d>aggroR*4) m.aggro=false;
        } else {
          // idle wander so the world feels alive
          m.state='idle';
          m.wt=(m.wt||0)-dt*1000;
          if(m.wt<=0){ m.wt=2000+Math.random()*2000; const a=Math.random()*Math.PI*2; m.wx=Math.cos(a); m.wy=Math.sin(a); }
          m.x += (m.wx||0)*16*dt; m.y += (m.wy||0)*16*dt;
        }
        if(!m._lastRep || now-m._lastRep>180){ m._lastRep=now; if(window.WOLNet) window.WOLNet.monsterMove(m.mid, m.x, m.y); }
      } else {
        // NON-HOST: mirror the server's authoritative position (smooth), and still
        // take a hit if the monster is right on top of me.
        if(m._tx!=null){
          m.x += (m._tx - m.x) * Math.min(1, dt*10);
          m.y += (m._ty - m.y) * Math.min(1, dt*10);
        }
        const d=Math.hypot(p.x-m.x,p.y-m.y);
        if(d < (m.isBoss?90:64) && !playerInSafe && now>m.atkT){ m.atkT=now+(m.isBoss?1100:1200); monsterHitPlayer(m); m.state='attack'; }
        else m.state = 'chase';
      }
      return;
    }
    // keep out of safe zone
    const dsafe = Math.hypot(m.x-WW/2, m.y-WH/2);
    if(dsafe < SAFE_R){
      const a = Math.atan2(m.y-WH/2, m.x-WW/2);
      m.x = WW/2 + Math.cos(a)*(SAFE_R+12);
      m.y = WH/2 + Math.sin(a)*(SAFE_R+12);
      m.aggro=false; return;
    }
    const dx=p.x-m.x, dy=p.y-m.y, d=Math.hypot(dx,dy);
    let aggroR = m.isBoss?440:360;  // monsters notice & chase the player
    const atkR = m.isBoss?90:64;
    const slowF = now<m.slowT?0.5:1;
    const sp = m.spd*52*slowF;

    if(playerInSafe){ m.aggro=false; }

    if((d<aggroR||m.aggro) && !playerInSafe){
      m.aggro=true;
      // ── BOSS SPECIAL ATTACKS (telegraphed, Dragon-Nest style) ──
      if(m.isBoss){ updateBossSpecials(m, now, p); }
      if(d>atkR){
        m.x += dx/d*sp*dt; m.y += dy/d*sp*dt; m.state='chase';
      } else {
        m.state='attack';
        if(now>m.atkT){ m.atkT = now + (m.isBoss?1100:1400) + Math.random()*400; monsterHitPlayer(m); }
      }
      if(d>aggroR*3) m.aggro=false;
    } else {
      m.state='idle';
      m.wt -= dt*1000;
      if(m.wt<=0){ m.wt=2000+Math.random()*2500; const a=Math.random()*Math.PI*2; m.wx=Math.cos(a); m.wy=Math.sin(a); }
      // caged monsters stay inside their fenced pen
      if(m._cage){
        const c=m._cage;
        if(m.x < c.x-c.half+30 || m.x > c.x+c.half-30){ m.wx=-m.wx; }
        if(m.y < c.y-c.half+30 || m.y > c.y+c.half-30){ m.wy=-m.wy; }
        m.x = E.clamp(m.x + m.wx*16*dt, c.x-c.half+30, c.x+c.half-30);
        m.y = E.clamp(m.y + m.wy*16*dt, c.y-c.half+30, c.y+c.half-30);
      } else {
        m.x = E.clamp(m.x + m.wx*16*dt, 50, WW-50);
        m.y = E.clamp(m.y + m.wy*16*dt, 50, WH-50);
      }
    }
  }

  function updateProjectiles(dt, now){
    const allM = [...G.monsters, ...G.bosses.filter(b=>!b._dying)];
    for(let i=G.projectiles.length-1;i>=0;i--){
      const pr = G.projectiles[i];
      pr.x += pr.vx*dt; pr.y += pr.vy*dt; pr.life -= dt;
      // motion trail history (last few positions)
      if(!pr.hist) pr.hist=[];
      pr.hist.push({x:pr.x,y:pr.y}); if(pr.hist.length>7) pr.hist.shift();
      let dead = pr.life<=0;
      if(pr._visual){ if(dead) G.projectiles.splice(i,1); continue; } // peer-attack visual: no collision/damage
      for(const m of allM){
        if(m.hp<=0||m._dying) continue;
        if(pr.hits.includes(m.id)) continue;
        if(Math.hypot(m.x-pr.x, m.y-pr.y) < m.size*0.5 + pr.size+6){
          if(pr.aoe){
            allM.forEach(am=>{ if(am.hp>0&&!am._dying&&Math.hypot(am.x-pr.x,am.y-pr.y)<pr.aoe){ hitMonster(am, pr.dmg, pr.crit?1:0, pr._basic); }});
            G.effects.push({type:'explosion', x:pr.x, y:pr.y, r:0, maxR:pr.aoe, color:pr.color, life:0.4, t:0});
            burst(pr.x, pr.y, pr.color, 18, 200);
            dead=true; break;
          } else {
            hitMonster(m, pr.dmg, pr.crit?1:0, pr._basic);
            if(pr.slow) m.slowT = now+pr.slow;
            pr.hits.push(m.id);
            burst(pr.x, pr.y, pr.color, 6, 120);
            if(pr.chain && pr.hits.length<pr.chain){
              // redirect to next nearby monster
              const next = allM.find(am=>am.hp>0&&!am._dying&&!pr.hits.includes(am.id)&&Math.hypot(am.x-pr.x,am.y-pr.y)<200);
              if(next){ const a=Math.atan2(next.y-pr.y,next.x-pr.x); const sp=Math.hypot(pr.vx,pr.vy); pr.vx=Math.cos(a)*sp; pr.vy=Math.sin(a)*sp; }
              else dead=true;
            } else if(!pr.pierce){ dead=true; }
            if(!pr.pierce && !pr.chain) break;
          }
        }
      }
      if(dead) G.projectiles.splice(i,1);
    }
  }

  // ════════ RENDER ════════
  // Deterministic scenery: which props appear per world, placed on a coarse grid.
  const SCENERY_BY_TILE = {
    grass:   [{t:'tree',w:6},{t:'tree2',w:4},{t:'rock',w:2},{t:'lamp',w:1}],
    forest:  [{t:'pine',w:6},{t:'darktree',w:5},{t:'rock',w:2},{t:'tree',w:2}],
    swamp:   [{t:'darktree',w:5},{t:'rock',w:3},{t:'pine',w:2}],
    stone:   [{t:'building',w:4},{t:'house',w:4},{t:'tower',w:2},{t:'fountain',w:1},{t:'lamp',w:3}],
    castle:  [{t:'tower',w:5},{t:'building',w:3},{t:'lamp',w:3},{t:'rock',w:1}],
    snow:    [{t:'pine',w:4},{t:'icerock',w:5},{t:'rock',w:1}],
    lava:    [{t:'darkrock',w:6},{t:'firecrystal',w:3}],
    inferno: [{t:'darkrock',w:6},{t:'firecrystal',w:4}],
    void:    [{t:'crystal',w:5},{t:'darkrock',w:3}],
    celestial:[{t:'crystal',w:6},{t:'tower',w:2}],
    astral:  [{t:'crystal',w:6},{t:'firecrystal',w:2}],
    oblivion:[{t:'darkrock',w:4},{t:'crystal',w:4}],
    metal:   [{t:'tower',w:4},{t:'darkrock',w:4}],
  };
  // Town gets a hand-placed village look
  function _hashSc(gx,gy){ const v=Math.sin(gx*127.1+gy*311.7)*43758.5453; return v-Math.floor(v); }
  function drawScenery(ctx, W, H, cam, wd, now){
    const GRID = 360; // prop spacing
    const tile = wd.tile;
    const palette = SCENERY_BY_TILE[tile] || SCENERY_BY_TILE.grass;
    const startGX = Math.floor(cam.x/GRID)-1, startGY = Math.floor(cam.y/GRID)-1;
    const cols = Math.ceil(W/GRID)+3, rows = Math.ceil(H/GRID)+3;
    const props = [];
    for(let cy=0; cy<rows; cy++){
      for(let cx=0; cx<cols; cx++){
        const gx=startGX+cx, gy=startGY+cy;
        const h=_hashSc(gx*1.7, gy*2.3);
        if(h > 0.55) continue;
        const wx = gx*GRID + _hashSc(gx*5+1,gy*3)*GRID*0.7 + GRID*0.15;
        const wy = gy*GRID + _hashSc(gx*3,gy*5+2)*GRID*0.7 + GRID*0.15;
        if(Math.hypot(wx-WW/2, wy-WH/2) < (wd.town?260:SAFE_R+80)) continue;
        const h2=_hashSc(gx*11+7, gy*13+3);
        let total=palette.reduce((s,p)=>s+p.w,0), r=h2*total, pick=palette[0].t;
        for(const p of palette){ if(r<p.w){ pick=p.t; break; } r-=p.w; }
        const s = 70 + _hashSc(gx+9,gy+4)*50;
        props.push({x:wx, y:wy, s, type:pick});
      }
    }
    props.sort((a,b)=>a.y-b.y);
    props.forEach(pr=>{
      const sx=pr.x-cam.x, sy=pr.y-cam.y;
      if(sx<-120||sx>W+120||sy<-160||sy>H+120) return;
      ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(sx, sy+4, pr.s*0.32, pr.s*0.12, 0,0,Math.PI*2); ctx.fill(); ctx.restore();
      SP.drawProp(ctx, pr.type, sx, sy, pr.s, now);
    });
  }

  function render(now){
    const cv = canvasRef.current; if(!cv) return;
    // Guard: if the canvas lost its size (e.g. mounted at 0x0), fix it before drawing.
    const want_w = window.innerWidth || 360, want_h = window.innerHeight || 640;
    if(cv.width !== want_w || cv.height !== want_h){
      cv.width = want_w; cv.height = want_h;
      cv.style.width = want_w+'px'; cv.style.height = want_h+'px';
    }
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    if(W===0 || H===0) return; // nothing to draw onto yet
    const wd = G.worldDef, p = G.player, cam = G.camera;
    // NaN guard: if camera or player position is corrupt, reset before drawing
    if(!isFinite(cam.x) || !isFinite(cam.y)){
      cam.x = isFinite(p?.x) ? p.x - W/2 : 0;
      cam.y = isFinite(p?.y) ? p.y - H/2 : 0;
    }
    if(p && (!isFinite(p.x) || !isFinite(p.y))){ p.x = WW/2; p.y = WH/2; }
    // screen shake (decays each frame) — applied as a temporary offset on G.camera
    // that is restored at the END of render so it never accumulates/drifts.
    let _shakeX=0, _shakeY=0;
    if(G.shake>0){
      _shakeX = (Math.random()-0.5)*G.shake;
      _shakeY = (Math.random()-0.5)*G.shake;
      cam.x += _shakeX; cam.y += _shakeY;
      G.shake *= 0.82; if(G.shake<0.5) G.shake=0;
    }
    ctx.clearRect(0,0,W,H);

    // ── RICH ATMOSPHERIC BACKGROUND ──
    const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.75);
    bgGrad.addColorStop(0, SP.lighten(wd.bg, 14));
    bgGrad.addColorStop(0.6, wd.bg);
    bgGrad.addColorStop(1, SP.darken(wd.bg, 12));
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0,0,W,H);

    // ── RICH TEXTURED GROUND (filled cells with per-tile detail) ──
    SP.drawGround(ctx, W, H, cam, wd, now);

    // ── SCENERY PROPS (trees, buildings, rocks — deterministic, depth-sorted) ──
    drawScenery(ctx, W, H, cam, wd, now);

    // (drawTileDecor disabled — the cached drawGround now provides rich terrain
    //  detail; running the old per-cell decor with shadowBlur every frame caused lag)

    // world border (subtle, no heavy glow)
    ctx.save();
    ctx.strokeStyle=SP.lighten(wd.bg,30); ctx.lineWidth=6;
    ctx.strokeRect(-cam.x, -cam.y, WW, WH);
    ctx.restore();

    // ── AMBIENT WEATHER & ATMOSPHERE per world ──
    ctx.save();
    if(wd.tile==='snow'||wd.tile==='tundra'){
      // falling snowflakes
      for(let i=0;i<28;i++){
        const spx = (i*197 + now*0.022*(0.5+(i%4)*0.3)) % (W+20);
        const spy = (i*313 + now*0.04*(0.8+(i%3)*0.4)) % (H+20);
        ctx.globalAlpha=0.3+0.2*Math.sin(now/500+i);
        ctx.fillStyle='#ddeeff';
        const ssz=1+i%3;
        ctx.beginPath(); ctx.arc(spx, spy, ssz, 0, Math.PI*2); ctx.fill();
      }
    } else if(wd.tile==='lava'||wd.tile==='inferno'){
      // rising embers
      for(let i=0;i<20;i++){
        const epx = (i*233 + now*0.008*(i%3+1)) % W;
        const epy = H - (i*197 + now*0.055*(0.5+i%4*0.5)) % (H+40);
        ctx.globalAlpha=0.4+0.3*Math.sin(now/300+i);
        ctx.fillStyle=i%3===0?'#ff8800':i%3===1?'#ffcc00':'#ff4400';
        ctx.shadowColor='#ff6600'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(epx, epy, 1.5+i%2, 0, Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0;
    } else if(wd.tile==='void'||wd.tile==='celestial'){
      // drifting stars/motes
      for(let i=0;i<18;i++){
        const vpx=(i*271+now*0.006*((i%3)+0.5))%(W+20);
        const vpy=(i*373-now*0.009*((i%2)+0.5)+H)%(H+20);
        ctx.globalAlpha=0.1+0.15*Math.sin(now/600+i*0.7);
        ctx.fillStyle=wd.tile==='celestial'?'#ffeeaa':'#c060ff';
        ctx.beginPath(); ctx.arc(vpx, vpy, 1+(i%3)*0.5, 0, Math.PI*2); ctx.fill();
      }
    } else if(wd.tile==='forest'||wd.tile==='swamp'){
      // drifting leaves / spores
      for(let i=0;i<16;i++){
        const lpx=(i*241+now*0.01*(i%3+0.5)+Math.sin(now/800+i)*20)%(W+30);
        const lpy=(i*317+now*0.013*(i%2+0.5))%(H+30);
        ctx.globalAlpha=0.12+0.1*Math.sin(now/400+i);
        ctx.fillStyle=wd.tile==='swamp'?'#88ff44':'#88cc44';
        ctx.beginPath(); ctx.ellipse(lpx,lpy,3,1.5,now/1000+i,0,Math.PI*2); ctx.fill();
      }
    } else {
      // default gentle motes
      const ambCol = wd.tile==='stone'?'#8a7aa0':wd.tile==='castle'?'#aa8888':'#9affc0';
      for(let i=0;i<10;i++){
        const px=(i*271+now*0.012*((i%3)+1))%(W+40)-20;
        const py=(i*373-now*0.018*((i%2)+1)+H)%(H+40)-20;
        ctx.globalAlpha=0.04+0.04*Math.sin(now/700+i);
        ctx.fillStyle=ambCol;
        ctx.beginPath(); ctx.arc(px, py, 1+(i%2), 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();

    // safe zone (only in meadow) — subtle ground tint + thin ring
    if(wd.id==='meadow'){
      const ssx = WW/2-cam.x, ssy = WH/2-cam.y;
      if(isFinite(ssx) && isFinite(ssy)){
      const g = ctx.createRadialGradient(ssx,ssy,SAFE_R*0.7,ssx,ssy,SAFE_R);
      g.addColorStop(0,'rgba(90,220,130,0)'); g.addColorStop(1,'rgba(90,220,130,0.05)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ssx,ssy,SAFE_R,0,Math.PI*2); ctx.fill();
      ctx.save();
      ctx.setLineDash([10,14]); ctx.lineDashOffset=-(now/40)%24;
      ctx.strokeStyle=`rgba(120,255,160,${0.18+Math.sin(now/800)*0.07})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ssx,ssy,SAFE_R,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      }
      if(Math.hypot(p.x-WW/2,p.y-WH/2)<SAFE_R+250){
        ctx.font='600 12px Heebo'; ctx.textAlign='center';
        ctx.fillStyle=`rgba(120,255,160,${0.5+Math.sin(now/500)*0.2})`;
        ctx.fillText('🌿 אזור מוגן', ssx, ssy-SAFE_R-10);
      }
    }

    // ── TOWN NPCs (visible figures you walk up to) ──
    if(G.worldDef && G.worldDef.town){
      const npcs=[
        {x:WW/2-300, y:WH/2-200, emoji:'🔨', name:'הנפח', color:'#ff8800', modal:'blacksmith'},
        {x:WW/2+300, y:WH/2-200, emoji:'🗝️', name:'שומר המבוך', color:'#ff66ff', modal:'dungeon'},
        {x:WW/2, y:WH/2-320, emoji:'📜', name:'נותן המשימות', color:'#5affc0', modal:'quests'},
        {x:WW/2+150, y:WH/2-300, emoji:'🔮', name:'נביא ההתפתחות', color:'#ffd24a', modal:'evolution'},
        {x:WW/2-300, y:WH/2+200, emoji:'🏪', name:'הסוחר', color:'#ffd24a', modal:'shopGear'},
      ];
      G._townNpcs = npcs;
      npcs.forEach(npc=>{
        const nx=npc.x-cam.x, ny=npc.y-cam.y;
        if(nx<-60||nx>W+60||ny<-60||ny>H+60) return;
        // glow pad
        const near=Math.hypot(p.x-npc.x,p.y-npc.y)<90;
        ctx.save();
        const pulse=near?0.5+Math.sin(now/200)*0.3:0.25;
        const gr=ctx.createRadialGradient(nx,ny+10,0,nx,ny+10,50);
        gr.addColorStop(0,SP.withAlpha(npc.color,pulse)); gr.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(nx,ny+10,50,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // body
        ctx.font='34px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(npc.emoji, nx, ny);
        // name
        ctx.font='bold 12px sans-serif'; ctx.fillStyle=npc.color;
        ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=3;
        ctx.strokeText(npc.name, nx, ny-32); ctx.fillText(npc.name, nx, ny-32);
        if(near){ ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.fillText('▶ לחץ לפתיחה', nx, ny+38); }
        ctx.textBaseline='alphabetic'; ctx.textAlign='left';
      });
    }
    // dungeon portal to next zone
    if(G._dungeonGate){
      const g=G._dungeonGate, gx=g.x-cam.x, gy=g.y-cam.y;
      const pulse=0.6+Math.sin(now/200)*0.4;
      const grd=ctx.createRadialGradient(gx,gy,0,gx,gy,g.r);
      grd.addColorStop(0, SP.withAlpha('#88ffcc',pulse));
      grd.addColorStop(0.6, SP.withAlpha('#33aa88',pulse*0.6));
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(gx,gy,g.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=SP.withAlpha('#aaffdd',pulse); ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(gx,gy,g.r*(0.7+Math.sin(now/300)*0.2),0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('→ אזור הבא', gx, gy-g.r-10); ctx.textAlign='left';
    }
    // ground items
    G.groundItems.forEach(gi=>{
      const ix=gi.x-cam.x, iy=gi.y-cam.y;
      if(ix<-40||ix>W+40||iy<-40||iy>H+40) return;
      const bob = Math.sin(now/350+gi.bob)*5;
      ctx.save();
      if(gi.gold!=null){
        ctx.shadowColor='#ffd24a'; ctx.shadowBlur=14;
        ctx.font='18px serif'; ctx.textAlign='center';
        ctx.fillText('🪙', ix, iy-bob+6);
      } else {
        const rc = D.RARITY[gi.item.rarity].color;
        ctx.shadowColor=rc; ctx.shadowBlur=18;
        ctx.fillStyle=SP.withAlpha(rc,0.13); ctx.beginPath(); ctx.arc(ix,iy-bob,15,0,Math.PI*2); ctx.fill();
        ctx.font='20px serif'; ctx.textAlign='center';
        ctx.fillText(gi.item.emoji, ix, iy-bob+7);
        if(['legendary','mythic'].includes(gi.item.rarity)){
          ctx.fillStyle=rc; ctx.font='9px serif';
          ctx.fillText('★', ix, iy-bob-14);
        }
      }
      ctx.restore();
    });

    // ── CAGE PENS: draw a fence around each pen with ONE entrance gap ──
    if(G._cages && G._cages.length){
      G._cages.forEach(c=>{
        const L=c.x-c.half-cam.x, R=c.x+c.half-cam.x, T=c.y-c.half-cam.y, B=c.y+c.half-cam.y;
        // cull if off-screen
        if(R<-50||L>W+50||B<-50||T>H+50) return;
        const gap=110; // entrance width
        ctx.save();
        ctx.strokeStyle='#6b4a2a'; ctx.lineWidth=7; ctx.shadowColor='#000'; ctx.shadowBlur=6;
        ctx.lineCap='round';
        const seg=(x1,y1,x2,y2,side)=>{
          if(c.gateSide===side){
            // draw the side with a gap in the middle (the entrance)
            if(side===0||side===2){ const mid=(x1+x2)/2; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(mid-gap/2,y1); ctx.moveTo(mid+gap/2,y2); ctx.lineTo(x2,y2); ctx.stroke(); }
            else { const mid=(y1+y2)/2; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1,mid-gap/2); ctx.moveTo(x2,mid+gap/2); ctx.lineTo(x2,y2); ctx.stroke(); }
          } else { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        };
        seg(L,T,R,T,0); // top
        seg(R,T,R,B,1); // right
        seg(L,B,R,B,2); // bottom
        seg(L,T,L,B,3); // left
        // fence posts
        ctx.fillStyle='#4a3018';
        [[L,T],[R,T],[L,B],[R,B]].forEach(([px,py])=>{ ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fill(); });
        // danger label
        ctx.shadowBlur=0; ctx.globalAlpha=0.5; ctx.fillStyle='#ff6a4a';
        ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
        ctx.fillText('⚠ אזור מפלצות', (L+R)/2, T-10);
        ctx.textAlign='left';
        ctx.restore();
      });
    }

    // monsters
    [...G.monsters, ...G.bosses].forEach(m=>{
      if(m.hp<=0||m._dying) return;
      const ix=m.x-cam.x, iy=m.y-cam.y;
      if(!isFinite(ix)||!isFinite(iy)) return; // skip if coords are NaN/Inf
      if(ix<-160||ix>W+160||iy<-160||iy>H+160) return;
      // boss aura glow
      if(m.isBoss){
        ctx.save();
        const pulse=0.5+Math.sin(now/300)*0.5;
        ctx.globalAlpha=0.12+pulse*0.08;
        const bg=ctx.createRadialGradient(ix,iy,0,ix,iy,m.size*1.8);
        bg.addColorStop(0,m.base.color); bg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(ix,iy,m.size*1.8,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      // slow/frozen tint
      if(now<m.slowT){ ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#33ccff'; ctx.beginPath(); ctx.arc(ix,iy,m.size*0.9,0,Math.PI*2); ctx.fill(); ctx.restore(); }
      // ground shadow (depth)
      ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(ix, iy+m.size*0.82, m.size*0.62, m.size*0.22, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // hurt flash (red tint via composite)
      const hurt = now<m.hurtT;
      SP.drawMonster(ctx, m, ix, iy, m.size, now);
      if(hurt){
        ctx.save(); ctx.globalCompositeOperation='source-atop'; ctx.globalAlpha=0.45;
        ctx.fillStyle='#ff3030'; ctx.fillRect(ix-m.size, iy-m.size, m.size*2, m.size*2);
        ctx.restore();
      }
      // hp bar (rounded, glowing)
      const bw = m.isBoss? m.size*1.5 : m.size*1.1;
      const bh = m.isBoss?7:4;
      const by = iy - m.size - (m.isBoss?20:14);
      const hpct = Math.max(0, m.hp/m.maxHp);
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(ix-bw/2-1.5, by-1.5, bw+3, bh+3);
      const hc = hpct>0.5?'#3dd94a':hpct>0.25?'#e8a838':'#e0444e';
      ctx.fillStyle=hc; ctx.fillRect(ix-bw/2, by, bw*hpct, bh);
      ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(ix-bw/2, by, bw*hpct, bh*0.4);
      // level + name
      ctx.textAlign='center';
      ctx.font=`700 ${m.isBoss?11:8}px Heebo`;
      ctx.fillStyle = m.lv>p.level+5 ? '#ff6a6a' : '#f5c563';
      ctx.fillText(`Lv ${m.lv}`, ix, by-4);
      if(m.isBoss){
        ctx.font='700 12px Cinzel'; ctx.fillStyle='#ff9a3a';
        ctx.shadowColor='#ff6a2a'; ctx.shadowBlur=8;
        ctx.fillText(m.base.name, ix, by-18); ctx.shadowBlur=0;
      }
    });

    // projectiles
    G.projectiles.forEach(pr=>{
      const ix=pr.x-cam.x, iy=pr.y-cam.y;
      if(!isFinite(ix)||!isFinite(iy)) return; // skip if coords are NaN/Inf
      const ang=Math.atan2(pr.vy,pr.vx);
      // glowing motion trail
      if(pr.hist && pr.hist.length>1){
        ctx.save(); ctx.lineCap='round'; ctx.shadowColor=pr.color; ctx.shadowBlur=12;
        for(let t=1;t<pr.hist.length;t++){
          const a=(t/pr.hist.length); ctx.globalAlpha=a*0.5;
          ctx.strokeStyle=pr.color; ctx.lineWidth=pr.size*1.6*a;
          ctx.beginPath(); ctx.moveTo(pr.hist[t-1].x-cam.x,pr.hist[t-1].y-cam.y); ctx.lineTo(pr.hist[t].x-cam.x,pr.hist[t].y-cam.y); ctx.stroke();
        }
        ctx.restore();
      }
      ctx.save();
      if(pr.fx==='fire'){
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=22;
        const g=ctx.createRadialGradient(ix,iy,0,ix,iy,pr.size*1.6);
        g.addColorStop(0,'#fff'); g.addColorStop(0.4,'#ffcc00'); g.addColorStop(1,'#ff2200');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ix,iy,pr.size*1.4,0,Math.PI*2); ctx.fill();
      } else if(pr.fx==='frost'){
        ctx.shadowColor='#33ccff'; ctx.shadowBlur=18; ctx.translate(ix,iy); ctx.rotate(ang);
        ctx.fillStyle='#aaeeff'; ctx.beginPath();
        for(let i=0;i<6;i++){ ctx.rotate(Math.PI/3); ctx.moveTo(0,0); ctx.lineTo(pr.size*1.4,0); }
        ctx.lineWidth=2; ctx.strokeStyle='#fff'; ctx.stroke();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,pr.size*0.6,0,Math.PI*2); ctx.fill();
      } else if(pr.fx==='bolt'){
        ctx.shadowColor='#ffee00'; ctx.shadowBlur=20; ctx.strokeStyle='#ffff88'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(ix-Math.cos(ang)*18,iy-Math.sin(ang)*18);
        for(let i=1;i<=4;i++){ const t=i/4; ctx.lineTo(ix-Math.cos(ang)*18*(1-t)+(Math.random()-0.5)*8, iy-Math.sin(ang)*18*(1-t)+(Math.random()-0.5)*8); }
        ctx.stroke();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ix,iy,pr.size*0.7,0,Math.PI*2); ctx.fill();
      } else if(pr.fx==='arrow'){
        ctx.translate(ix,iy); ctx.rotate(ang); ctx.shadowColor=pr.color; ctx.shadowBlur=8;
        ctx.strokeStyle=pr.color; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(8,0); ctx.stroke();
        ctx.fillStyle=pr.color; ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(2,-4); ctx.lineTo(2,4); ctx.fill();
        ctx.strokeStyle='#fff8'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-12,-3); ctx.lineTo(-8,0); ctx.lineTo(-12,3); ctx.stroke();
      } else if(pr.fx==='pierce'){
        ctx.translate(ix,iy); ctx.rotate(ang); ctx.shadowColor=pr.color; ctx.shadowBlur=20;
        const g=ctx.createLinearGradient(-20,0,16,0); g.addColorStop(0,'transparent'); g.addColorStop(1,pr.color);
        ctx.strokeStyle=g; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(-22,0); ctx.lineTo(14,0); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(6,-5); ctx.lineTo(6,5); ctx.fill();
      } else if(pr.fx==='judge'){
        ctx.shadowColor='#fff'; ctx.shadowBlur=26;
        const g=ctx.createRadialGradient(ix,iy,0,ix,iy,pr.size*2);
        g.addColorStop(0,'#fff'); g.addColorStop(0.5,'#ffffcc'); g.addColorStop(1,'rgba(255,255,200,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ix,iy,pr.size*1.8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.fillRect(ix-2,iy-pr.size*2,4,pr.size*4);
      } else {
        ctx.shadowColor=pr.color; ctx.shadowBlur=16; ctx.fillStyle=pr.color;
        ctx.beginPath(); ctx.arc(ix,iy,pr.size,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ix,iy,pr.size*0.4,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });

    // effects (under/over player)
    drawEffects(ctx, cam, now);

    // player
    // ── Draw OTHER PLAYERS (multiplayer peers in this world) ──
    if(window.WOLNet && window.WOLNet.peers.size){
      const myParty = window.WOLNet.party && window.WOLNet.party.partyId;
      window.WOLNet.peers.forEach(peer=>{
        if(peer.world && G.worldDef && peer.world!==G.worldDef.id) return;
        const px=peer.x-cam.x, py=peer.y-cam.y;
        if(px<-80||px>W+80||py<-80||py>H+80) return; // cull off-screen
        ctx.save();
        if(peer._dead) ctx.globalAlpha=0.3;
        SP.drawPlayer(ctx, px, py, peer.cls||'warrior', false, now, peer.facing||1, peer.evoStage||0);
        ctx.restore();
        // name + level (party members in green, enemies in red on PvP maps)
        const isParty = myParty && peer.partyId===myParty;
        const isPvp = G.worldDef && G.worldDef.pvp;
        ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
        ctx.fillStyle = isParty ? '#5aff8a' : (isPvp ? '#ff6a6a' : '#ffe0a0');
        ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=3;
        const label=`${peer.name} [${peer.level}]`;
        ctx.strokeText(label, px, py-44); ctx.fillText(label, px, py-44);
        // HP bar
        if(peer.maxHp){
          const bw=46, hpPct=Math.max(0,Math.min(1,peer.hp/peer.maxHp));
          ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px-bw/2, py-38, bw, 5);
          ctx.fillStyle=isParty?'#5aff8a':'#ff4444'; ctx.fillRect(px-bw/2, py-38, bw*hpPct, 5);
        }
        ctx.textAlign='left';
        // floating chat bubble above this peer
        if(peer._bubble && now < peer._bubble.until){ drawChatBubble(ctx, px, py-52, peer._bubble.txt); }
      });
    }
    // mount (drawn under the player when riding)
    if(p.activeMount){ SP.drawMount(ctx, p.x-cam.x, p.y-cam.y+12, p.activeMount, G.facing, now); }
    // pet (floats near player)
    if(p.activePet && G._pet && D.PETS[p.activePet]){
      const pet=D.PETS[p.activePet], px=G._pet.x-cam.x, py=G._pet.y-cam.y;
      ctx.save();
      const gl=0.4+Math.sin(now/300)*0.2;
      ctx.fillStyle=SP.withAlpha(pet.color,gl);
      ctx.beginPath(); ctx.arc(px,py,16,0,Math.PI*2); ctx.fill();
      ctx.font='22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pet.emoji, px, py);
      ctx.textBaseline='alphabetic'; ctx.textAlign='left';
      ctx.restore();
    }
    SP.drawPlayer(ctx, p.x-cam.x, p.y-cam.y, p.classId, G._moving, now, G.facing, p.evoStage||0);
    // my own floating chat bubble
    if(G._myBubble && now < G._myBubble.until){ drawChatBubble(ctx, p.x-cam.x, p.y-cam.y-52, G._myBubble.txt); }
    // shield ring
    if(G.shield){
      ctx.save(); ctx.strokeStyle=`rgba(255,238,136,${0.5+Math.sin(now/100)*0.4})`;
      ctx.lineWidth=4; ctx.shadowColor='#ffee88'; ctx.shadowBlur=16;
      ctx.beginPath(); ctx.arc(p.x-cam.x, p.y-cam.y, 42, 0, Math.PI*2); ctx.stroke(); ctx.restore();
    }
    // buff aura
    if(G.buffAtk){
      ctx.save(); ctx.strokeStyle=`rgba(255,0,64,${0.4+Math.sin(now/120)*0.3})`;
      ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x-cam.x, p.y-cam.y, 38, 0, Math.PI*2); ctx.stroke(); ctx.restore();
    }
    // player name
    ctx.font='bold 12px Cinzel'; ctx.textAlign='center';
    ctx.fillStyle='#ffd24a'; ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(p.name, p.x-cam.x, p.y-cam.y-46); ctx.shadowBlur=0;

    // GM cloud above admin head
    if(p.gm){
      const gx = p.x-cam.x, gy = p.y-cam.y-72 + Math.sin(now/400)*3;
      ctx.save();
      // cloud puffs
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.shadowColor='#fff'; ctx.shadowBlur=10;
      [[-14,2,9],[0,-2,12],[14,2,9],[-6,6,8],[7,6,8]].forEach(([dx,dy,r])=>{
        ctx.beginPath(); ctx.arc(gx+dx,gy+dy,r,0,Math.PI*2); ctx.fill();
      });
      ctx.shadowBlur=0;
      // GM text
      ctx.fillStyle='#c0392b'; ctx.font='900 13px Cinzel'; ctx.textAlign='center';
      ctx.fillText('GM', gx, gy+5);
      ctx.restore();
    }

    // particles
    G.particles.forEach(pt=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,pt.life);
      ctx.fillStyle=pt.color;
      ctx.beginPath(); ctx.arc(pt.x-cam.x, pt.y-cam.y, pt.size*Math.max(0.2,pt.life), 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // damage numbers
    G.dmgNums.forEach(dn=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,dn.life);
      ctx.font=`900 ${dn.crit?24:15}px Cinzel`; ctx.textAlign='center';
      ctx.lineJoin='round';
      ctx.strokeStyle='#000'; ctx.lineWidth=4;
      ctx.strokeText(dn.val, dn.x-cam.x, dn.y-cam.y);
      if(dn.crit){ ctx.shadowColor=dn.color; ctx.shadowBlur=12; }
      ctx.fillStyle=dn.color;
      ctx.fillText(dn.val, dn.x-cam.x, dn.y-cam.y);
      ctx.restore();
    });

    // ── DYNAMIC LIGHTING (soft warm light around the hero + glow on bosses) ──
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const plx=p.x-cam.x, ply=p.y-cam.y;
    const lr = 200 + Math.sin(now/600)*12;
    if(isFinite(plx) && isFinite(ply)){
      const lg = ctx.createRadialGradient(plx, ply, 0, plx, ply, lr);
      const evoLight = (p.evoStage>0 && (window.GAME_DATA.EVOLUTIONS[p.classId]||[])[p.evoStage-1]);
      const lightColor = evoLight ? evoLight.aura : '#ffd9a0';
      lg.addColorStop(0, SP.withAlpha(lightColor,0.13));
      lg.addColorStop(0.5, SP.withAlpha(lightColor,0.055));
      lg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(plx,ply,lr,0,Math.PI*2); ctx.fill();
    }
    // boss light pools
    G.bosses.forEach(m=>{ if(m.hp>0&&!m._dying){ const bx=m.x-cam.x,by=m.y-cam.y; if(isFinite(bx)&&isFinite(by)&&bx>-200&&bx<W+200&&by>-200&&by<H+200){ const bl=ctx.createRadialGradient(bx,by,0,bx,by,160); bl.addColorStop(0,SP.withAlpha(m.base.color||'#ff5a3a',0.11)); bl.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=bl; ctx.beginPath(); ctx.arc(bx,by,160,0,Math.PI*2); ctx.fill(); } } });
    ctx.restore();

    // ── CINEMATIC VIGNETTE (depth + focus) ──
    const vig = ctx.createRadialGradient(W/2, H*0.46, Math.min(W,H)*0.32, W/2, H/2, Math.max(W,H)*0.7);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.42)');
    ctx.fillStyle = vig;
    ctx.fillRect(0,0,W,H);

    // ── COLOR GRADE (subtle cool-shadow / warm-light filmic tint) ──
    ctx.save();
    ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.08;
    const grade=ctx.createLinearGradient(0,0,0,H);
    grade.addColorStop(0,'#3a5a8a'); grade.addColorStop(1,'#8a5a3a');
    ctx.fillStyle=grade; ctx.fillRect(0,0,W,H);
    ctx.restore();

    // ── DAY/NIGHT CYCLE (outdoor worlds only; ~4 min full cycle) ──
    if(!wd.town && !wd.pvp && !wd.dungeon && !wd.endgame){
      const cycle = (now % 240000) / 240000; // 0..1 over 4 minutes
      const night = Math.max(0, -Math.cos(cycle*Math.PI*2)) ; // peaks at night
      if(night>0.02){
        ctx.save();
        ctx.fillStyle = SP.withAlpha('#0a1030', night*0.5);
        ctx.fillRect(0,0,W,H);
        ctx.restore();
        G._isNight = night>0.5;
      } else G._isNight=false;
    }

    ctx.textAlign='left';
    renderMinimap(now);

    // restore camera after shake offset so it never drifts
    if(_shakeX||_shakeY){ cam.x -= _shakeX; cam.y -= _shakeY; }
  }

  function drawTileDecor(ctx, W, H, cam, wd, now){
    const TS=140;
    const startX = Math.floor(cam.x/TS)*TS;
    const startY = Math.floor(cam.y/TS)*TS;
    const rnd = (gx,gy)=>{ const v=Math.sin(gx*12.9898+gy*78.233)*43758.5453; return v-Math.floor(v); };
    for(let gx=startX; gx<cam.x+W+TS; gx+=TS){
      for(let gy=startY; gy<cam.y+H+TS; gy+=TS){
        const seed = rnd(gx,gy);
        const sx=gx-cam.x, sy=gy-cam.y;
        const seed2 = rnd(gx+7,gy+3);
        ctx.save();

        if(wd.tile==='grass'){
          // grass tufts + flowers + bushes
          if(seed>0.55){
            ctx.globalAlpha=0.55; ctx.strokeStyle=SP.lighten(wd.accent,25); ctx.lineWidth=2.5; ctx.lineCap='round';
            for(let b=-1;b<=1;b++){ ctx.beginPath(); ctx.moveTo(sx+b*5,sy+6); ctx.quadraticCurveTo(sx+b*5+Math.sin(now/900+gx)*3,sy-6,sx+b*5+4,sy-12); ctx.stroke(); }
          }
          if(seed2>0.85){ // flower
            ctx.globalAlpha=0.7; const fc=['#ff6a8a','#ffd24a','#c77dff'][Math.floor(seed*3)];
            ctx.fillStyle=fc; for(let pp=0;pp<5;pp++){ const a=pp/5*Math.PI*2; ctx.beginPath(); ctx.arc(sx+Math.cos(a)*4,sy+Math.sin(a)*4,2.5,0,Math.PI*2); ctx.fill(); }
            ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
          }
        } else if(wd.tile==='forest'){
          // pine trees + mushrooms + fallen logs
          if(seed>0.62){
            ctx.globalAlpha=0.6;
            ctx.fillStyle=SP.darken(wd.accent,10); ctx.fillRect(sx-2,sy,4,10); // trunk
            ctx.fillStyle=SP.lighten(wd.accent,10);
            for(let l=0;l<3;l++){ const ly=sy-l*8; const lw=14-l*3; ctx.beginPath(); ctx.moveTo(sx-lw,ly); ctx.lineTo(sx+lw,ly); ctx.lineTo(sx,ly-14); ctx.fill(); }
          }
          if(seed2>0.88){ ctx.globalAlpha=0.7; ctx.fillStyle='#d04545'; ctx.beginPath(); ctx.arc(sx,sy,4,Math.PI,0); ctx.fill(); ctx.fillStyle='#fff'; ctx.fillRect(sx-1.5,sy,3,5); }
        } else if(wd.tile==='lava'||wd.tile==='inferno'){
          // glowing cracks + bubbling magma + embers
          const glow = 0.4+Math.sin(now/400+gx*0.3)*0.3;
          ctx.globalAlpha=glow*0.5;
          ctx.strokeStyle=`rgba(255,${100+glow*120},0,1)`; ctx.lineWidth=3; ctx.shadowColor='#ff5500'; ctx.shadowBlur=12;
          ctx.beginPath(); ctx.moveTo(sx-20,sy+10); ctx.lineTo(sx-5,sy-4); ctx.lineTo(sx+8,sy+6); ctx.lineTo(sx+22,sy-8); ctx.stroke();
          if(seed>0.7){ ctx.globalAlpha=glow; ctx.fillStyle='#ffaa20'; ctx.beginPath(); ctx.arc(sx,sy,3+Math.sin(now/200+gx)*2,0,Math.PI*2); ctx.fill(); }
        } else if(wd.tile==='snow'){
          // ice cracks + snow drifts + crystals
          ctx.globalAlpha=0.4;
          if(seed>0.6){ ctx.fillStyle='rgba(220,240,255,0.5)'; ctx.beginPath(); ctx.ellipse(sx,sy,12,5,0,0,Math.PI*2); ctx.fill(); }
          if(seed2>0.82){ // ice crystal
            ctx.globalAlpha=0.6; ctx.strokeStyle='#bfe8ff'; ctx.lineWidth=2; ctx.shadowColor='#88ccff'; ctx.shadowBlur=8;
            for(let c=0;c<3;c++){ const a=c/3*Math.PI; ctx.beginPath(); ctx.moveTo(sx-Math.cos(a)*8,sy-Math.sin(a)*8); ctx.lineTo(sx+Math.cos(a)*8,sy+Math.sin(a)*8); ctx.stroke(); }
          }
        } else if(wd.tile==='stone'){
          // cobblestone + bones + cracks
          ctx.globalAlpha=0.35;
          if(seed>0.5){ ctx.fillStyle=SP.lighten(wd.accent,8); ctx.beginPath(); ctx.ellipse(sx,sy,10,8,seed*3,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=SP.darken(wd.accent,15); ctx.lineWidth=1.5; ctx.stroke(); }
          if(seed2>0.9){ ctx.globalAlpha=0.5; ctx.strokeStyle='#cfc8b8'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(sx-6,sy); ctx.lineTo(sx+6,sy); ctx.moveTo(sx-6,sy-3); ctx.lineTo(sx-6,sy+3); ctx.moveTo(sx+6,sy-3); ctx.lineTo(sx+6,sy+3); ctx.stroke(); }
        } else if(wd.tile==='void'){
          // floating runes + portals + cosmic dust
          const pulse=0.3+Math.sin(now/500+gx*0.2)*0.25;
          if(seed>0.6){
            ctx.globalAlpha=pulse; ctx.strokeStyle=`rgba(180,80,255,1)`; ctx.lineWidth=2; ctx.shadowColor='#cc66ff'; ctx.shadowBlur=14;
            ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2); ctx.stroke();
            for(let r=0;r<4;r++){ const a=r/4*Math.PI*2+now/1000; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+Math.cos(a)*8,sy+Math.sin(a)*8); ctx.stroke(); }
          }
          if(seed2>0.85){ ctx.globalAlpha=pulse*1.5; ctx.fillStyle='#e0a0ff'; ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill(); }
        } else if(wd.tile==='swamp'){
          // toxic bubbles + twisted roots + murky water
          const bubble=0.3+Math.sin(now/300+gx*0.5)*0.3;
          if(seed>0.5){ ctx.globalAlpha=0.4; ctx.fillStyle='#3a5a1a'; ctx.beginPath(); ctx.ellipse(sx,sy,14,8,0,0,Math.PI*2); ctx.fill(); }
          if(seed>0.7){ ctx.globalAlpha=bubble; ctx.strokeStyle='#88ff44'; ctx.lineWidth=1.5; ctx.shadowColor='#44aa00'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(sx,sy,4+Math.sin(now/200+gx)*2,0,Math.PI*2); ctx.stroke(); }
          if(seed2>0.88){ ctx.globalAlpha=0.6; ctx.strokeStyle='#4a3a20'; ctx.lineWidth=2; ctx.lineCap='round'; const angle=seed*Math.PI; for(let r=0;r<3;r++){ const a2=angle+r*0.6; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx+Math.cos(a2)*10,sy+Math.sin(a2)*10-5,sx+Math.cos(a2)*18,sy+Math.sin(a2)*8); ctx.stroke(); } }
        } else if(wd.tile==='castle'){
          // stone blocks + torches + iron bars
          ctx.globalAlpha=0.3;
          if(seed>0.55){ ctx.fillStyle='#4a3a3a'; ctx.fillRect(sx-10,sy-6,20,12); ctx.strokeStyle='#2a2020'; ctx.lineWidth=1; ctx.strokeRect(sx-10,sy-6,20,12); }
          if(seed2>0.88){ const flicker=0.6+Math.sin(now/100+gx)*0.4; ctx.globalAlpha=flicker*0.8; ctx.fillStyle='#ff8800'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=12; ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#6a4a20'; ctx.fillRect(sx-1.5,sy,3,8); }
        } else if(wd.tile==='celestial'){
          // golden runes + heavenly light beams + star patterns
          const hpulse=0.4+Math.sin(now/400+gx*0.15)*0.35;
          if(seed>0.55){ ctx.globalAlpha=hpulse*0.6; ctx.strokeStyle='#ffee88'; ctx.lineWidth=2; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=16;
            for(let s2=0;s2<5;s2++){ const a=s2/5*Math.PI*2; ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*3,sy+Math.sin(a)*3); ctx.lineTo(sx+Math.cos(a)*10,sy+Math.sin(a)*10); ctx.stroke(); }
            ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill(); }
          if(seed2>0.85){ ctx.globalAlpha=hpulse; ctx.fillStyle='#ffffaa'; ctx.shadowColor='#ffff00'; ctx.shadowBlur=20; ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }
        }
        ctx.restore();
      }
    }
  }

  function drawEffects(ctx, cam, now){
    G.effects.forEach(ef=>{
      const ix=ef.x-cam.x, iy=ef.y-cam.y;
      if(!isFinite(ix)||!isFinite(iy)) return; // skip if coords are NaN/Inf
      const prog = ef.t/ef.life;
      const fade = Math.max(0, 1-prog);
      const fx = ef.fx;
      ctx.save();

      // ── COMBO FINISHER blast: expanding shockwave + bright flash ──
      if(ef.type==='combo_blast'){
        const r = Math.max(2, ef.maxR * (ef.t/ef.life));
        ctx.globalAlpha = fade*0.9;
        ctx.strokeStyle = ef.color; ctx.lineWidth = 8*fade+2; ctx.shadowColor=ef.color; ctx.shadowBlur=24;
        ctx.beginPath(); ctx.arc(ix,iy,r,0,Math.PI*2); ctx.stroke();
        // inner filled flash
        ctx.globalAlpha = fade*0.35;
        const g=ctx.createRadialGradient(ix,iy,0,ix,iy,r);
        g.addColorStop(0, ef.color); g.addColorStop(0.6, SP.withAlpha(ef.color,0.4)); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ix,iy,r,0,Math.PI*2); ctx.fill();
        ctx.restore();
        return;
      }

      // ── AOE-type ground effects, each fx unique ──
      if(ef.type==='aoe'){
        if(fx==='whirl'){
          // spinning blades
          ctx.globalAlpha=fade; ctx.translate(ix,iy); ctx.rotate(now/80);
          ctx.strokeStyle=ef.color; ctx.lineWidth=5; ctx.shadowColor=ef.color; ctx.shadowBlur=16;
          for(let i=0;i<4;i++){ ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(ef.r*0.7,ef.r*0.2,ef.r,0); ctx.stroke(); }
        } else if(fx==='quake'){
          // cracking ground rings
          ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=6; ctx.shadowColor=ef.color; ctx.shadowBlur=18;
          for(let k=0;k<3;k++){ const rr=ef.r*(0.4+k*0.3); ctx.beginPath();
            for(let a=0;a<Math.PI*2;a+=0.3){ const jag=rr+Math.sin(a*5+k)*8; const px=ix+Math.cos(a)*jag, py=iy+Math.sin(a)*jag; a===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.closePath(); ctx.stroke(); }
        } else if(fx==='meteor'){
          // impact crater + fire
          ctx.globalAlpha=fade*0.6; const g=ctx.createRadialGradient(ix,iy,0,ix,iy,ef.r);
          g.addColorStop(0,'#fff'); g.addColorStop(0.3,ef.color); g.addColorStop(1,'rgba(255,40,0,0)');
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=fade; ctx.strokeStyle='#ffaa00'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.stroke();
        } else if(fx==='blizzard'){
          ctx.globalAlpha=fade*0.5; ctx.fillStyle=ef.color; ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=fade; ctx.fillStyle='#fff';
          for(let i=0;i<14;i++){ const a=i*2.3+now/200; const rr=(i/14)*ef.r; ctx.fillRect(ix+Math.cos(a)*rr,iy+Math.sin(a)*rr,3,3); }
        } else if(fx==='rain'){
          // falling arrows
          ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=2;
          for(let i=0;i<16;i++){ const a=(i/16)*Math.PI*2; const rr=Math.random()*ef.r; const px=ix+Math.cos(a)*rr, py=iy+Math.sin(a)*rr;
            ctx.beginPath(); ctx.moveTo(px,py-24+prog*24); ctx.lineTo(px,py+prog*24); ctx.stroke(); }
          ctx.strokeStyle=SP.withAlpha(ef.color,0.33); ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.stroke();
        } else if(fx==='consecrate'){
          // holy ground with cross
          ctx.globalAlpha=fade*0.5; const g=ctx.createRadialGradient(ix,iy,0,ix,iy,ef.r);
          g.addColorStop(0,'#fff8'); g.addColorStop(1,'rgba(255,221,68,0)'); ctx.fillStyle=g;
          ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=4; ctx.shadowColor=ef.color; ctx.shadowBlur=20;
          for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(ix+Math.cos(a)*ef.r,iy+Math.sin(a)*ef.r); ctx.stroke(); }
        } else if(fx==='poison'){
          ctx.globalAlpha=fade*0.5; ctx.fillStyle=ef.color; ctx.shadowColor=ef.color; ctx.shadowBlur=20;
          for(let i=0;i<10;i++){ const a=i*2.1+now/400; const rr=ef.r*(0.3+0.6*((i%3)/3)); ctx.beginPath(); ctx.arc(ix+Math.cos(a)*rr,iy+Math.sin(a)*rr,ef.r*0.18,0,Math.PI*2); ctx.fill(); }
        } else {
          // generic expanding ring
          ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=5; ctx.shadowColor=ef.color; ctx.shadowBlur=16;
          ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.stroke();
          ctx.globalAlpha=fade*0.3; ctx.fillStyle=ef.color; ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.fill();
        }
      }
      else if(ef.type==='ring'||ef.type==='explosion'){
        ctx.globalAlpha=fade*0.8;
        ctx.strokeStyle=ef.color; ctx.lineWidth=3; ctx.shadowColor=ef.color; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.stroke();
      }
      else if(ef.type==='slash'){
        ctx.globalAlpha=fade;
        const r = ef.big?86:58;
        const a0 = ef.dir>0 ? -1.2 : Math.PI+1.2;
        const a1 = ef.dir>0 ? 1.2 : Math.PI-1.2;
        // layered glowing arcs
        if(fx==='smash'){
          // heavy downward crush + shockwave
          ctx.strokeStyle=ef.color; ctx.lineWidth=10; ctx.shadowColor=ef.color; ctx.shadowBlur=20;
          ctx.beginPath(); ctx.arc(ix+ef.dir*20, iy, r*(0.6+prog*0.5), a0, a1, ef.dir<0); ctx.stroke();
          ctx.globalAlpha=fade*0.5; ctx.lineWidth=3;
          ctx.beginPath(); ctx.arc(ix, iy+20, r*(0.8+prog*0.6), 0.2, Math.PI-0.2); ctx.stroke();
        } else if(fx==='holy'){
          ctx.strokeStyle='#fff'; ctx.lineWidth=7; ctx.shadowColor=ef.color; ctx.shadowBlur=24;
          ctx.beginPath(); ctx.arc(ix+ef.dir*30, iy, r*(0.6+prog*0.4), a0, a1, ef.dir<0); ctx.stroke();
          ctx.strokeStyle=ef.color; ctx.lineWidth=3;
          ctx.beginPath(); ctx.arc(ix+ef.dir*30, iy, r*(0.6+prog*0.4)*0.7, a0, a1, ef.dir<0); ctx.stroke();
        } else {
          ctx.strokeStyle='#fff'; ctx.lineWidth=ef.big?7:4; ctx.shadowColor=ef.color; ctx.shadowBlur=14;
          ctx.beginPath(); ctx.arc(ix+ef.dir*30, iy, r*(0.6+prog*0.4), a0, a1, ef.dir<0); ctx.stroke();
          ctx.strokeStyle=ef.color; ctx.lineWidth=ef.big?3:2;
          ctx.beginPath(); ctx.arc(ix+ef.dir*30, iy, r*(0.6+prog*0.4)*1.15, a0, a1, ef.dir<0); ctx.stroke();
        }
      }
      else if(ef.type==='danger'){
        // expanding red telegraph: ring + filling interior shows time-to-boom
        const tNow=Date.now();
        const prog2 = ef._resolved ? 1 : Math.max(0, Math.min(1, 1-(ef.fireAt-tNow)/ef.delay));
        ctx.globalAlpha = ef._resolved ? Math.max(0, 1-(tNow-ef._boom)/350) : 0.5;
        // outline
        ctx.strokeStyle='#ff3030'; ctx.lineWidth=3; ctx.shadowColor='#ff0000'; ctx.shadowBlur=12;
        ctx.beginPath(); ctx.arc(ix,iy,ef.r,0,Math.PI*2); ctx.stroke();
        // filling interior (danger building up)
        ctx.globalAlpha = (ef._resolved?0.5:0.22+prog2*0.3);
        ctx.fillStyle = ef._resolved ? '#ffffff' : '#ff2a2a';
        ctx.beginPath(); ctx.arc(ix,iy, ef._resolved?ef.r:ef.r*prog2, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
      else if(ef.type==='heal'){
        ctx.globalAlpha=fade; ctx.fillStyle=ef.color; ctx.shadowColor=ef.color; ctx.shadowBlur=12;
        ctx.font='bold 16px serif'; ctx.textAlign='center';
        for(let i=0;i<7;i++){ const a=i/7*Math.PI*2+now/300; const rr=20+prog*36; ctx.fillText('✚', ix+Math.cos(a)*rr, iy+Math.sin(a)*rr-prog*40); }
        ctx.textAlign='left';
      }
      else if(ef.type==='cast'){
        // expanding glyph circle when buff/cast starts
        ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=3; ctx.shadowColor=ef.color; ctx.shadowBlur=18;
        const rr=20+prog*40; ctx.beginPath(); ctx.arc(ix,iy,rr,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); for(let i=0;i<6;i++){ const a=i/6*Math.PI*2-now/200; (i?ctx.lineTo:ctx.moveTo).call(ctx, ix+Math.cos(a)*rr, iy+Math.sin(a)*rr); } ctx.closePath(); ctx.stroke();
      }
      else if(ef.type==='dash'){
        ctx.globalAlpha=fade; ctx.strokeStyle=ef.color; ctx.lineWidth=8; ctx.shadowColor=ef.color; ctx.shadowBlur=16;
        const fx0=(ef.fromX!=null?ef.fromX:ef.x)-cam.x, fy0=(ef.fromY!=null?ef.fromY:ef.y)-cam.y;
        ctx.beginPath(); ctx.moveTo(fx0,fy0); ctx.lineTo(ix,iy); ctx.stroke();
        // afterimages
        ctx.globalAlpha=fade*0.4; ctx.lineWidth=3;
        for(let i=1;i<=3;i++){ ctx.beginPath(); ctx.moveTo(fx0,fy0-i*4); ctx.lineTo(ix,iy-i*4); ctx.stroke(); }
      }
      else if(ef.type==='aura'){
        // persistent buff/shield ring under player (follows player)
        const px=G.player.x-cam.x, py=G.player.y-cam.y;
        ctx.globalAlpha=0.35+Math.sin(now/150)*0.15; ctx.strokeStyle=ef.color; ctx.lineWidth=3; ctx.shadowColor=ef.color; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.arc(px,py,40+Math.sin(now/180)*5,0,Math.PI*2); ctx.stroke();
        // orbiting motes
        ctx.globalAlpha=0.6; ctx.fillStyle=ef.color;
        for(let i=0;i<4;i++){ const a=now/300+i*Math.PI/2; ctx.beginPath(); ctx.arc(px+Math.cos(a)*42, py+Math.sin(a)*42, 3, 0, Math.PI*2); ctx.fill(); }
      }
      ctx.restore();
    });
  }

  function renderMinimap(now){
    const mm = minimapRef.current; if(!mm) return;
    const mx = mm.getContext('2d');
    const W=mm.width, H=mm.height;
    if(W===0||H===0) return;
    const wd = G.worldDef, p=G.player;
    // BUG FIX: clearRect before redraw to avoid ghost trails
    mx.clearRect(0,0,W,H);
    mx.fillStyle=wd.bg; mx.fillRect(0,0,W,H);
    mx.strokeStyle=wd.accent; mx.lineWidth=1; mx.strokeRect(0,0,W,H);
    // safe zone
    if(wd.id==='meadow'){
      mx.fillStyle='rgba(80,255,120,0.15)';
      mx.beginPath(); mx.arc(WW/2/WW*W, WH/2/WH*H, SAFE_R/WW*W, 0, Math.PI*2); mx.fill();
    }
    G.monsters.forEach(m=>{ if(m.hp>0){ mx.fillStyle='#c0392baa'; mx.fillRect(m.x/WW*W-1, m.y/WH*H-1, 2,2); }});
    G.bosses.forEach(b=>{ if(b.hp>0&&!b._dying){ mx.fillStyle='#ff8000'; mx.beginPath(); mx.arc(b.x/WW*W, b.y/WH*H, 3, 0, Math.PI*2); mx.fill(); }});
    G.groundItems.forEach(gi=>{ mx.fillStyle=gi.gold!=null?'#ffd24a':'#fff'; mx.fillRect(gi.x/WW*W-1, gi.y/WH*H-1, 2,2); });

    mx.fillStyle='#5aff8a'; mx.shadowColor='#5aff8a'; mx.shadowBlur=6;

  // continued in part 3 (UI render)...

  // ════════ EQUIP / INVENTORY / SHOP ACTIONS ════════
  const equipItem = (item)=>{
    const p = G.player;
    const chk = E.canEquip(p, item);
    if(!chk.ok){ showToast(chk.reason, '#ff5a5a'); return; }
    const cur = p.equipped[item.slot];
    // remove from inventory
    p.inventory = p.inventory.filter(i=>i.uid!==item.uid);
    if(cur) p.inventory.push(cur);
    p.equipped[item.slot] = item;
    G.cs = E.computeStats(p);
    p.hp = Math.min(p.hp, G.cs.maxHp); p.mp = Math.min(p.mp, G.cs.maxMp);

  const unequip = (slot)=>{

  const allocStat = (stat, amt=1)=>{
    const p = G.player;
    amt = Math.min(amt, p.statPoints);
    if(p.statPoints<=0 || amt<=0) return;
    p.statPoints -= amt;
    p.stats[stat] = (p.stats[stat]||0) + amt;
    G.cs = E.computeStats(p);
    if(stat==='vit') p.hp = Math.min(G.cs.maxHp, p.hp + 9);
    if(stat==='int') p.mp = Math.min(G.cs.maxMp, p.mp + 5);
    rerender();
  };
  // Recommended stat priorities per class (damage stat heavy + survivability),
  // inspired by Dragon Nest / MU builds: a clear main stat, some VIT to live.
  const RECOMMENDED_BUILD = {
    warrior: {str:0.6, vit:0.3, agi:0.1, int:0},   // melee power + toughness
    mage:    {int:0.65, vit:0.25, agi:0.1, str:0}, // magic power + survival
    archer:  {agi:0.65, vit:0.25, str:0.1, int:0}, // ranged power + speed
    paladin: {str:0.4, vit:0.35, int:0.25, agi:0}, // bruiser + holy support
  };
  const autoFillStats = ()=>{
    const p = G.player;
    let pts = p.statPoints;
    if(pts<=0){ showToast('אין נקודות פנויות', '#ff5a5a'); return; }
    const build = RECOMMENDED_BUILD[p.classId] || {str:0.4,vit:0.3,agi:0.15,int:0.15};
    // distribute proportionally, largest-remainder so nothing is wasted
    const order = Object.keys(build).sort((a,b)=>build[b]-build[a]);
    const alloc = {str:0,agi:0,int:0,vit:0};
    let used=0;
    order.forEach(s=>{ const n=Math.floor(pts*build[s]); alloc[s]=n; used+=n; });
    let leftover = pts-used;
    // hand leftovers to the main stat first
    for(let i=0; leftover>0; i=(i+1)%order.length){ alloc[order[i]]++; leftover--; }
    Object.keys(alloc).forEach(s=>{ p.stats[s]=(p.stats[s]||0)+alloc[s]; });
    p.statPoints = 0;
    G.cs = E.computeStats(p);
    p.hp = G.cs.maxHp; p.mp = G.cs.maxMp;
    rerender();
    const cls = D.CLASSES.find(c=>c.id===p.classId);
    showToast(`💪 ${pts} נקודות חולקו אוטומטית לפי build ${cls?cls.name:''}`, '#5aff8a');
  };
  const buySkill = (skillId)=>{
    const p = G.player; const sk = D.SKILLS[skillId];
    if(p.skills.includes(skillId)){ showToast('כבר יש לך', '#ff5a5a'); return; }
    if(p.level<sk.reqLv){ showToast(`דרושה רמה ${sk.reqLv}`, '#ff5a5a'); return; }
    if(p.gold<sk.price){ showToast('אין מספיק זהב', '#ff5a5a'); return; }
    p.gold -= sk.price;
    p.skills.push(skillId);
    log(`📖 רכשת מתקפה: ${sk.name}`, 'lg-item');
    showToast(`${sk.emoji} ${sk.name} נרכש!`, '#5aff8a');
    rerender();
  };
  const buySet = (set)=>{
    const p = G.player;
    if(p.level<set.reqLv){ showToast(`דרושה רמה ${set.reqLv}`, '#ff5a5a'); return; }
    if(p.gold<set.price){ showToast('אין מספיק זהב', '#ff5a5a'); return; }
    const freeSlots = 40 - p.inventory.length;
    if(freeSlots < set.pieces.length){ showToast(`התיק מלא! פנה ${set.pieces.length} מקומות`, '#ff5a5a'); return; }
    p.gold -= set.price;
    set.pieces.forEach(pc=>{
      const it = E.genSetPiece(pc.baseIdx, set.reqLv+5, set.rarity, set.id, set.name);
      p.inventory.push(it);

    showToast(`${set.emoji} ${set.name} נכנס לתיק!`, '#5aff8a');
    rerender();
  };
  const buyConsumable = (c)=>{
    const p = G.player;
    if(p.gold<c.price){ showToast('אין מספיק זהב', '#ff5a5a'); return; }
    p.gold -= c.price;
    p.consumables[c.id] = (p.consumables[c.id]||0)+1;
    rerender();
  };
  const useConsumable = (cid)=>{
    const p = G.player; const c = D.CONSUMABLES.find(x=>x.id===cid);
    if(!p.consumables[cid] || p.consumables[cid]<=0) return;
    p.consumables[cid]--;
    if(c.full){ p.hp=G.cs.maxHp; p.mp=G.cs.maxMp; }
    else { if(c.heal) p.hp=Math.min(G.cs.maxHp, p.hp+c.heal); if(c.mana) p.mp=Math.min(G.cs.maxMp, p.mp+c.mana); }

    if(c.shield){ G.shield=true; G.shieldEnd=Date.now()+(c.shieldDur||5000); }
    if(c.buffSpd){ G.spdBuff=c.buffSpd; G.spdBuffEnd=Date.now()+(c.buffDur||10000); }
    showToast(`${c.emoji} השתמשת ב${c.name}`, '#5aff8a');
    rerender();
  };

  // ════════ INPUT HANDLERS ════════
  useEffect(()=>{

    const rs = ()=>{ const cv=canvasRef.current; if(cv){
      const w = window.innerWidth, h = (window.visualViewport && window.visualViewport.height) ? Math.round(window.visualViewport.height) : window.innerHeight;
      cv.width=w; cv.height=h; cv.style.width=w+"px"; cv.style.height=h+"px";

    window.addEventListener('orientationchange', ()=>setTimeout(rs,200));
    if(window.visualViewport) window.visualViewport.addEventListener('resize', rs);

  // joystick touch
  const joyRef = useRef(null);
  const onJoyStart = (e)=>{
    e.preventDefault();
    const t = e.changedTouches?e.changedTouches[0]:e;
    G.joy.id = t.identifier!=null?t.identifier:-1;
    G.joy.active = true;
    updateJoy(t);
  };
  const onJoyMove = (e)=>{
    e.preventDefault();
    if(!G.joy.active) return;
    const touches = e.changedTouches || [e];
    for(let i=0;i<touches.length;i++){
      if(touches[i].identifier===G.joy.id || G.joy.id===-1){ updateJoy(touches[i]); break; }
    }
  };
  const updateJoy = (t)=>{
    const base = joyRef.current; if(!base) return;
    const r = base.getBoundingClientRect();
    const cx = r.left+r.width/2, cy = r.top+r.height/2;
    let dx = t.clientX-cx, dy = t.clientY-cy;
    const max = r.width/2;
    const d = Math.hypot(dx,dy);
    if(d>max){ dx=dx/d*max; dy=dy/d*max; }
    G.joy.dx = dx/max; G.joy.dy = dy/max;
    const stick = base.querySelector('.joy-stick');
    if(stick) stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  };
  const onJoyEnd = (e)=>{
    // Only clear if the joystick's own touch ended (or no id tracking).
    if(e && e.changedTouches && G.joy.id!==-1){
      let mine=false;
      for(let i=0;i<e.changedTouches.length;i++){ if(e.changedTouches[i].identifier===G.joy.id){ mine=true; break; } }
      if(!mine) return; // a different finger lifted — keep moving
    }
    G.joy.active=false; G.joy.dx=0; G.joy.dy=0; G.joy.id=-1;
    const stick = joyRef.current && joyRef.current.querySelector('.joy-stick');
    if(stick) stick.style.transform = 'translate(-50%,-50%)';
  };
  // iOS SAFETY NET: Safari sometimes drops touchend on the joystick element when
  // the finger slides off. Listen on window so a release ANYWHERE stops movement.
  useEffect(()=>{
    const stop = (e)=>{
      if(!G.joy.active) return;
      // if the tracked finger is gone from the active touch list, stop
      if(e.touches && G.joy.id!==-1){
        let still=false;
        for(let i=0;i<e.touches.length;i++){ if(e.touches[i].identifier===G.joy.id){ still=true; break; } }
        if(still) return;
      }
      G.joy.active=false; G.joy.dx=0; G.joy.dy=0; G.joy.id=-1;
      const stick = joyRef.current && joyRef.current.querySelector('.joy-stick');
      if(stick) stick.style.transform='translate(-50%,-50%)';
    };
    window.addEventListener('touchend', stop, {passive:true});
    window.addEventListener('touchcancel', stop, {passive:true});
    return ()=>{ window.removeEventListener('touchend', stop); window.removeEventListener('touchcancel', stop); };
  }, []);

  // ════════════════════════════════════════════════

        {isAdmin && <button className="btn btn-main btn-ghost" onClick={()=>setAdminPanel(true)}>🛡️ פאנל אדמין</button>}

        {weeklyAnnounce && (
