<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>⚔️ World of Legends</title>
<!-- Own favicon (crossed swords) so the browser/home-screen icon is the game's,
     not whatever other site shares this GitHub domain. -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a0e2e'/><text y='.9em' x='12' font-size='62'>⚔️</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a0e2e'/><text y='.9em' x='12' font-size='62'>⚔️</text></svg>">
<meta name="apple-mobile-web-app-title" content="World of Legends">
<meta name="application-name" content="World of Legends">
<meta name="theme-color" content="#1a0e2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Cinzel+Decorative:wght@700;900&family=Marcellus&family=Heebo:wght@400;500;700;800&display=swap');
:root{
  --gold:#f5c563;--gold2:#e0a030;--gold-deep:#8a6420;
  --bg:#080611;--bg2:#0d0a18;--panel:#140f20;--panel2:#1c1530;--panel3:#241a3a;
  --border:#332447;--border2:#4a3565;--border-glow:#6b4a8f;
  --text:#ece4d8;--text2:#c4b8d0;--dim:#8a7ca0;
  --teal:#4ad6c8;--ember:#ff7a45;
  --hp:#e0444e;--mp:#4a90e2;--xp:#a865d8;
  --str:#e0556a;--agi:#3dc97a;--int:#4a90e2;--vit:#e8a838;
  --common:#9d9d9d;--uncommon:#3dd94a;--rare:#3a8fe8;--epic:#b35aef;--legendary:#ff9020;--mythic:#ffe08a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Heebo','Cinzel',serif;color:var(--text);touch-action:none;position:fixed;}
#root{width:100%;height:100%;}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:auto;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}

/* TITLE */
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#2a0f28 0%,#0a0510 70%);z-index:0;}
.title-bg::after{content:'';position:absolute;inset:0;background-image:radial-gradient(2px 2px at 20% 30%,#ffd24a44,transparent),radial-gradient(2px 2px at 70% 60%,#9b59b644,transparent),radial-gradient(1px 1px at 40% 80%,#ffffff33,transparent),radial-gradient(2px 2px at 85% 25%,#ffd24a33,transparent);background-size:400px 400px;animation:drift 20s linear infinite;}
@keyframes drift{to{background-position:400px 400px;}}
.logo{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,9vw,5rem);font-weight:900;color:var(--gold);text-shadow:0 0 40px #ffd24a99,0 4px 0 #000,0 0 80px #ffaa0055;text-align:center;line-height:1;position:relative;z-index:2;letter-spacing:2px;animation:logoGlow 4s ease-in-out infinite;}
@keyframes logoGlow{0%,100%{text-shadow:0 0 40px #ffd24a99,0 4px 0 #000;}50%{text-shadow:0 0 70px #ffd24acc,0 4px 0 #000,0 0 120px #ffaa0088;}}
.logo-sword{font-size:clamp(3rem,12vw,7rem);display:block;text-align:center;animation:swordFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 30px #ffd24a88);}
@keyframes swordFloat{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-12px) rotate(8deg);}}
.logo-sub{font-size:clamp(0.6rem,3vw,1rem);color:var(--dim);letter-spacing:5px;margin:12px 0 36px;text-transform:uppercase;position:relative;z-index:2;}

.btn{font-family:'Cinzel',serif;font-weight:700;cursor:pointer;transition:all .2s;border:none;position:relative;z-index:2;}
.btn-main{font-size:clamp(0.85rem,3vw,1.1rem);padding:clamp(12px,2.5vw,16px) clamp(30px,6vw,56px);background:linear-gradient(135deg,#5a1840,#9b2860,#5a1840);border:2px solid var(--gold);color:var(--gold);letter-spacing:2px;margin:6px;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);}
.btn-main:active{transform:scale(0.96);background:linear-gradient(135deg,#9b2860,#c0398a,#9b2860);box-shadow:0 0 25px #ffd24a66;}
.btn-ghost{background:linear-gradient(135deg,#1f1628,#2a1e38);border:2px solid var(--border2);color:var(--dim);}

/* CHAR SELECT */
.char-scr{background:linear-gradient(160deg,#0a0510,#160d20,#0a0510);overflow-y:auto;padding:20px 14px;gap:14px;justify-content:flex-start;padding-top:max(20px,env(safe-area-inset-top));}
.scr-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,5vw,2rem);color:var(--gold);text-shadow:0 0 25px #ffd24a55;text-align:center;}
.cls-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:520px;}
@media(min-width:640px){.cls-grid{grid-template-columns:repeat(4,1fr);max-width:900px;}}
.cls-card{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:14px 8px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden;}
.cls-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--cls-glow,transparent),transparent 70%);opacity:0;transition:opacity .3s;}
.cls-card.sel,.cls-card:active{border-color:var(--cls-color);transform:translateY(-3px);box-shadow:0 6px 20px var(--cls-glow);}
.cls-card.sel::before{opacity:0.25;}
.cls-emoji{font-size:clamp(2.2rem,7vw,3.2rem);position:relative;z-index:1;filter:drop-shadow(0 0 12px var(--cls-glow));}
.cls-name{font-size:clamp(0.85rem,3vw,1.1rem);font-weight:700;margin-top:4px;color:var(--cls-color);position:relative;z-index:1;}
.cls-desc{font-size:clamp(0.6rem,2vw,0.72rem);color:var(--dim);margin-top:4px;line-height:1.4;position:relative;z-index:1;}
.cls-stats{display:flex;flex-direction:column;gap:3px;margin-top:8px;position:relative;z-index:1;}
.statbar-row{display:flex;align-items:center;gap:4px;font-size:0.58rem;}
.statbar-row span{width:26px;color:var(--dim);}
.statbar{flex:1;height:5px;background:#0a0510;border-radius:3px;overflow:hidden;}
.statbar-f{height:100%;border-radius:3px;}
.name-box{display:flex;gap:8px;align-items:center;width:100%;max-width:420px;}
.name-box label{font-size:0.85rem;color:var(--gold);white-space:nowrap;}
.name-in{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:6px;color:var(--text);padding:10px 14px;font-family:'Cinzel',serif;font-size:0.9rem;outline:none;min-width:0;}
.name-in:focus{border-color:var(--gold);}
.saved-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:520px;}
.saved-card{background:var(--panel2);border:2px solid var(--border);border-radius:6px;padding:10px 16px;cursor:pointer;text-align:center;transition:all .2s;}
.saved-card:active{border-color:var(--gold);}
.saved-card b{color:var(--gold);font-size:0.85rem;}
.saved-card small{display:block;color:var(--dim);font-size:0.65rem;margin-top:2px;}

/* ── GAME HUD ── */
.hud{position:absolute;pointer-events:none;z-index:40;}
.hud-tl{top:env(safe-area-inset-top,8px);left:8px;display:flex;flex-direction:column;gap:5px;}
.pf{background:rgba(10,5,16,0.75);border:2px solid var(--border);border-radius:8px;padding:7px 10px;min-width:min(210px,52vw);backdrop-filter:blur(8px);}
.pf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pf-name{font-size:clamp(0.7rem,2.6vw,0.88rem);color:var(--gold);font-weight:700;}
.lv-pill{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a00;font-size:0.62rem;font-weight:900;padding:2px 7px;border-radius:10px;}
.barwrap{margin:3px 0;}
.barlbl{display:flex;justify-content:space-between;font-size:0.56rem;color:var(--dim);margin-bottom:1px;}
.bar{height:9px;background:#0a0510;border-radius:5px;overflow:hidden;position:relative;border:1px solid #00000060;}
.barf{height:100%;border-radius:5px;transition:width .25s;position:relative;}
.barf::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.3),transparent 60%);}
.hp-f{background:linear-gradient(90deg,#8b1a1a,var(--hp));}
.mp-f{background:linear-gradient(90deg,#1a4a8b,var(--mp));}
.xp-f{background:linear-gradient(90deg,#5a2a8a,var(--xp));}

.statpts-btn{pointer-events:all;background:linear-gradient(135deg,#2a7a3a,#33a04a);border:2px solid #5aff8a;border-radius:8px;color:#fff;font-family:'Cinzel',serif;font-weight:700;font-size:0.72rem;padding:6px 10px;cursor:pointer;animation:ptsPulse 1.5s infinite;}
@keyframes ptsPulse{0%,100%{box-shadow:0 0 8px #33ff6688;}50%{box-shadow:0 0 18px #33ff66cc;}}

.hud-tr{top:env(safe-area-inset-top,8px);right:8px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.minimap{background:rgba(10,5,16,0.75);border:2px solid var(--border);border-radius:8px;padding:4px;backdrop-filter:blur(8px);pointer-events:all;cursor:pointer;transition:border-color .2s;}
.minimap:active{border-color:var(--gold);}
.minimap-lbl{font-size:0.52rem;color:var(--gold);text-align:center;margin-bottom:2px;}

.mini-btn{pointer-events:all;background:rgba(10,5,20,0.8);border:1px solid var(--border2);border-radius:7px;color:var(--silver);font-size:0.58rem;padding:5px 7px;cursor:pointer;display:block;white-space:nowrap;text-align:center;flex-shrink:0;}
.mini-btn:active{transform:scale(0.93);}
.gold-disp{background:rgba(10,5,16,0.75);border:2px solid var(--border);border-radius:8px;padding:4px 10px;font-size:0.72rem;color:var(--gold);font-weight:700;backdrop-filter:blur(8px);display:flex;align-items:center;gap:4px;}

.zone-tag{position:absolute;top:env(safe-area-inset-top,8px);left:50%;transform:translateX(-50%);background:rgba(10,5,16,0.75);border:1px solid var(--border);border-radius:14px;padding:4px 16px;font-size:0.7rem;color:var(--gold);backdrop-filter:blur(6px);z-index:39;white-space:nowrap;}

/* boss bar */
.boss-bar{position:absolute;top:46px;left:50%;transform:translateX(-50%);width:min(420px,88vw);z-index:41;text-align:center;}
.boss-name{font-size:clamp(0.72rem,2.8vw,0.9rem);color:var(--legendary);font-weight:900;margin-bottom:3px;text-shadow:0 0 12px var(--legendary);}
.boss-track{height:16px;background:#0a0510;border:2px solid var(--legendary);border-radius:8px;overflow:hidden;}
.boss-f{height:100%;background:linear-gradient(90deg,#6b0000,#ff4400,#ff8800);transition:width .2s;}

/* combat log */
.clog{position:absolute;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:8px;width:min(240px,46vw);max-height:78px;overflow:hidden;font-size:0.6rem;line-height:1.5;pointer-events:none;z-index:38;display:flex;flex-direction:column;justify-content:flex-end;}
.clog div{text-shadow:0 1px 2px #000;opacity:0.9;}
.lg-dmg{color:#ff7a6a;}.lg-heal{color:#5aff8a;}.lg-xp{color:#c77dff;}.lg-item{color:var(--gold);}.lg-rare{color:#4ab8ff;}.lg-epic{color:#c77dff;}.lg-leg{color:#ff9a3a;font-weight:700;}.lg-boss{color:#ff9a3a;font-weight:900;}

/* ── BOTTOM CONTROLS ── */
.btm{position:absolute;bottom:calc(8px + env(safe-area-inset-bottom));left:0;right:0;padding:6px 8px;z-index:38;pointer-events:none;}
/* Horizontal scrollable strip of menu buttons, kept clear of the joystick (left)
   and attack button (right) so nothing overlaps on small iPhones. */
.btn-bar{display:flex;flex-wrap:nowrap;gap:6px;pointer-events:all;overflow-x:auto;overflow-y:hidden;
  padding:4px calc(132px + env(safe-area-inset-right,0px)) 4px calc(132px + env(safe-area-inset-left,0px));
  -webkit-overflow-scrolling:touch;scrollbar-width:none;mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);}
.btn-bar::-webkit-scrollbar{display:none;}
.mini-btn{background:rgba(10,5,16,0.85);border:2px solid var(--border2);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;font-size:0.64rem;padding:7px 10px;cursor:pointer;backdrop-filter:blur(6px);transition:transform .1s;flex:0 0 auto;white-space:nowrap;}
.mini-btn:active{transform:scale(0.92);}

/* joystick */
.joy-base{position:absolute;bottom:calc(80px + env(safe-area-inset-bottom));left:18px;width:clamp(96px,22vw,118px);height:clamp(96px,22vw,118px);border-radius:50%;background:rgba(10,5,16,0.55);border:2px solid var(--border2);backdrop-filter:blur(6px);z-index:45;touch-action:none;}
.joy-stick{position:absolute;top:50%;left:50%;width:42%;height:42%;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffe88a,#ffd24a);border:2px solid var(--gold);transform:translate(-50%,-50%);box-shadow:0 0 16px #ffd24a66;}

/* attack + skill buttons */
.atk-zone{position:absolute;bottom:calc(80px + env(safe-area-inset-bottom));right:16px;z-index:45;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.skill-ring{display:grid;grid-template-columns:repeat(2,auto);gap:6px;justify-items:center;align-items:end;}
.skill-btn{width:clamp(48px,11vw,58px);height:clamp(48px,11vw,58px);border-radius:50%;background:rgba(10,5,16,0.8);border:2px solid var(--border2);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:clamp(1.1rem,3vw,1.5rem);cursor:pointer;position:relative;touch-action:none;overflow:hidden;}
.skill-btn:active{transform:scale(0.9);border-color:var(--gold);}
.skill-cd{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#fff;font-weight:700;}
.atk-main{width:clamp(72px,16vw,90px);height:clamp(72px,16vw,90px);border-radius:50%;background:radial-gradient(circle at 38% 32%,#ff6b5b,#9b1a1a);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:clamp(1.6rem,4.5vw,2.2rem);cursor:pointer;box-shadow:0 0 24px #ff444466;touch-action:none;}
.atk-main:active{transform:scale(0.9);}

/* ── MODALS / PANELS ── */
.modal-bg{position:absolute;inset:0;background:rgba(5,2,10,0.82);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:12px;}
.modal{background:linear-gradient(160deg,var(--panel2),var(--panel));border:2px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 50px #000a, 0 0 60px #9b2860 inset;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:2px solid var(--border);background:linear-gradient(90deg,#9b286033,transparent);}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--gold);}
.modal-x{width:32px;height:32px;border-radius:8px;background:#3a1a2a;border:1px solid #6a2a3a;color:#ff7a8a;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-x:active{transform:scale(0.9);}
.modal-body{padding:14px;overflow-y:auto;flex:1;}
.modal-tabs{display:flex;gap:4px;padding:8px 14px 0;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:8px;text-align:center;font-size:0.72rem;font-weight:700;color:var(--dim);cursor:pointer;border-radius:8px 8px 0 0;border:2px solid transparent;border-bottom:none;transition:all .2s;}
.tab.active{color:var(--gold);background:var(--panel);border-color:var(--border);}

/* stat allocation */
.stat-alloc{display:flex;flex-direction:column;gap:10px;}
.alloc-pts{text-align:center;font-size:0.9rem;color:#5aff8a;font-weight:700;margin-bottom:6px;}
.stat-line{display:flex;align-items:center;gap:10px;background:var(--panel);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.stat-icon{font-size:1.3rem;width:32px;text-align:center;}
.stat-info{flex:1;}
.stat-nm{font-size:0.82rem;font-weight:700;}
.stat-sub{font-size:0.6rem;color:var(--dim);}
.stat-val{font-size:1.1rem;font-weight:900;min-width:32px;text-align:center;}
.stat-plus{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#2a7a3a,#33a04a);border:1px solid #5aff8a;color:#fff;font-size:1.2rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stat-plus:active{transform:scale(0.88);}
.stat-plus:disabled{opacity:0.3;cursor:default;}

/* inventory grid */
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
@media(min-width:440px){.inv-grid{grid-template-columns:repeat(6,1fr);}}
.inv-cell{aspect-ratio:1;background:#0c0712;border:2px solid #251830;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .1s;overflow:hidden;}
.inv-cell:active{transform:scale(0.92);}
.inv-cell .emj{font-size:clamp(1.2rem,4vw,1.6rem);}
.inv-cell .nm{font-size:0.42rem;color:var(--dim);text-align:center;line-height:1;padding:0 2px;max-height:1.2em;overflow:hidden;}
.inv-cell.equipped-mark::after{content:'✓';position:absolute;top:1px;right:3px;color:#5aff8a;font-size:0.6rem;font-weight:900;}
.r-common{border-color:#5a5a5a;}.r-uncommon{border-color:#1eff00;box-shadow:0 0 6px #1eff0044 inset;}.r-rare{border-color:#0070dd;box-shadow:0 0 8px #0070dd55 inset;}.r-epic{border-color:#a335ee;box-shadow:0 0 8px #a335ee66 inset;}.r-legendary{border-color:#ff8000;box-shadow:0 0 12px #ff800077 inset;}.r-mythic{border-color:#e6cc80;box-shadow:0 0 14px #e6cc8088 inset;animation:mythGlow 2s infinite;}
@keyframes mythGlow{0%,100%{box-shadow:0 0 14px #e6cc8088 inset;}50%{box-shadow:0 0 24px #e6cc80cc inset;}}

/* equipped slots */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.eq-slot{background:#0c0712;border:2px solid #251830;border-radius:8px;padding:8px 10px;cursor:pointer;min-height:56px;display:flex;align-items:center;gap:8px;transition:border-color .2s;}
.eq-slot:active{border-color:var(--gold);}
.eq-slot .se{font-size:1.5rem;}
.eq-lbl{font-size:0.58rem;color:var(--dim);}
.eq-nm{font-size:0.7rem;}

/* item detail card */
.item-detail{background:#0c0712;border-radius:10px;padding:12px;margin-bottom:10px;border:2px solid var(--rar-color,#444);}
.id-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.id-emoji{font-size:2.2rem;}
.id-name{font-size:0.95rem;font-weight:700;color:var(--rar-color);}
.id-rar{font-size:0.65rem;font-style:italic;}
.id-req{font-size:0.66rem;margin:2px 0;}
.id-req.met{color:#5aff8a;}.id-req.unmet{color:#ff5a5a;}
.id-stat{font-size:0.7rem;color:#aac;}
.id-stat b{color:#5aff8a;}
.id-actions{display:flex;gap:6px;margin-top:10px;}
.id-btn{flex:1;padding:8px;border-radius:8px;font-family:'Cinzel',serif;font-weight:700;font-size:0.72rem;cursor:pointer;border:none;}
.id-equip{background:linear-gradient(135deg,#2a6a8a,#3a8aba);color:#fff;}
.id-equip:disabled{background:#333;color:#777;}
.id-sell{background:linear-gradient(135deg,#7a5a2a,#aa8a3a);color:#fff;}
.id-use{background:linear-gradient(135deg,#2a7a3a,#3a9a4a);color:#fff;}

/* shop items */
.shop-item{display:flex;align-items:center;gap:10px;background:#0c0712;border:2px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;}
.shop-emoji{font-size:2rem;width:44px;text-align:center;}
.shop-info{flex:1;min-width:0;}
.shop-nm{font-size:0.82rem;font-weight:700;}
.shop-desc{font-size:0.62rem;color:var(--dim);line-height:1.3;}
.shop-buy{background:linear-gradient(135deg,#7a5a1a,#c8a020);border:1px solid var(--gold);color:#1a0a00;font-family:'Cinzel',serif;font-weight:700;font-size:0.72rem;padding:8px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:1px;}
.shop-buy:active{transform:scale(0.94);}
.shop-buy:disabled{background:#333;color:#777;border-color:#555;}
.shop-buy small{font-size:0.6rem;}

/* world map list */
.world-item{display:flex;align-items:center;gap:12px;background:#0c0712;border:2px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.world-item:active{transform:scale(0.98);}
.world-item.locked{opacity:0.5;}
.world-item.current{border-color:var(--gold);box-shadow:0 0 14px #ffd24a44;}
.world-emoji{font-size:2.4rem;}
.world-info{flex:1;}
.world-nm{font-size:0.92rem;font-weight:700;}
.world-lv{font-size:0.66rem;color:var(--dim);}
.world-go{font-size:0.7rem;color:#5aff8a;font-weight:700;}
.world-lock{font-size:0.7rem;color:#ff5a5a;}

/* ── Quick Potion Buttons ── */
.quick-pots{display:flex;gap:5px;margin-top:5px;pointer-events:all;}
.qpot{width:38px;height:38px;border-radius:10px;background:rgba(10,5,16,0.85);border:2px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;touch-action:manipulation;transition:transform .1s,border-color .15s;}
.qpot:active{transform:scale(0.88);}
.qpot.hp-pot{border-color:#c0392b;}
.qpot.mp-pot{border-color:#2e86c1;}
.qpot .qp-emj{font-size:1.1rem;line-height:1;}
.qpot .qp-cnt{font-size:0.52rem;font-weight:900;position:absolute;bottom:2px;right:4px;color:#fff;}
.qpot.empty{opacity:0.35;}

/* level up flash */
.lvlup{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);z-index:90;pointer-events:none;font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,7vw,3rem);font-weight:900;color:var(--gold);text-shadow:0 0 40px var(--gold),0 0 80px #ffaa00;animation:lvlupA 2.5s ease forwards;}
.combo-ind{position:absolute;top:30%;left:50%;transform:translateX(-50%);z-index:88;pointer-events:none;font-family:'Cinzel Decorative',serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:900;color:#ffaa3a;text-shadow:0 0 16px #ff6a2a,0 0 32px #ff4400;animation:comboPop .3s ease;}
@keyframes comboPop{0%{transform:translateX(-50%) scale(1.5);}100%{transform:translateX(-50%) scale(1);}}
@keyframes lvlupA{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0;}20%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}75%{opacity:1;}100%{transform:translate(-50%,-50%) scale(0.9);opacity:0;}}

/* drop toast */
.drop-toast{position:absolute;top:74px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(12,7,18,0.92);border:2px solid var(--gold);border-radius:10px;padding:6px 18px;font-size:0.78rem;backdrop-filter:blur(8px);animation:toastIn .3s;white-space:nowrap;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-15px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

/* death */
.death{position:absolute;inset:0;background:rgba(8,2,6,0.88);backdrop-filter:blur(6px);z-index:95;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.death-t{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,8vw,3.4rem);color:#c0392b;text-shadow:0 0 40px #c0392b;animation:deathP 1.2s infinite;}
@keyframes deathP{0%,100%{text-shadow:0 0 40px #c0392b;}50%{text-shadow:0 0 70px #ff4040;}}

/* damage numbers (canvas-drawn now, this is fallback) */
.toast-msg{position:absolute;top:50%;left:50%;transform:translateX(-50%);z-index:70;background:rgba(12,7,18,0.92);border:2px solid var(--border2);border-radius:8px;padding:8px 16px;font-size:0.78rem;animation:toastIn .3s;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.empty-note{text-align:center;color:var(--dim);font-size:0.75rem;padding:30px 10px;}
.divider{height:1px;background:var(--border);margin:12px 0;}
.section-h{font-size:0.78rem;color:var(--gold);font-weight:700;margin:10px 0 6px;}

/* ── PROFESSIONAL REFINEMENTS ── */
/* item comparison verdict badge */
.verdict{font-size:0.6rem;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap;letter-spacing:0.5px;}
.v-better{color:#0a2a12;background:linear-gradient(135deg,#3dd94a,#5aff8a);box-shadow:0 0 12px #3dd94a66;}
.v-worse{color:#2a0a0a;background:linear-gradient(135deg,#e0556a,#ff8a9a);}
.v-equal{color:#1a1a1a;background:linear-gradient(135deg,#9a8aa8,#c4b8d0);}

/* skill loadout slots */
.loadout-row{display:flex;gap:8px;justify-content:center;margin:6px 0 4px;}
.loadout-slot{width:56px;height:56px;border-radius:14px;background:linear-gradient(160deg,#1c1530,#0d0a18);border:2px solid #2a1e38;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:inset 0 2px 8px #0008;}
.ls-num{position:absolute;top:3px;right:6px;font-size:0.55rem;color:var(--dim);font-weight:700;}
.ls-emoji{font-size:1.7rem;filter:drop-shadow(0 0 6px currentColor);}
.ls-empty{font-size:1.6rem;color:#3a2d4a;}

/* refined panels with layered depth */
.modal{background:linear-gradient(165deg,#1c1530 0%,#140f20 100%);border:1px solid var(--border2);border-radius:18px;box-shadow:0 20px 70px #000c, 0 0 0 1px #ffffff08 inset, 0 1px 0 #ffffff10 inset;}
.modal-head{background:linear-gradient(100deg,#2a1a3e,transparent);border-bottom:1px solid var(--border);}
.modal-title{font-family:'Cinzel',serif;font-weight:700;letter-spacing:0.5px;text-shadow:0 0 20px #f5c56344;}

/* glassy HUD frames */
.pf{background:linear-gradient(150deg,rgba(28,21,48,0.88),rgba(13,10,24,0.82));border:1px solid var(--border2);box-shadow:0 6px 24px #0008, 0 0 0 1px #ffffff06 inset;border-radius:12px;}
.minimap,.gold-disp{background:linear-gradient(150deg,rgba(28,21,48,0.88),rgba(13,10,24,0.82))!important;border:1px solid var(--border2)!important;box-shadow:0 4px 16px #0008, 0 0 0 1px #ffffff06 inset;}
.zone-tag{background:linear-gradient(150deg,rgba(28,21,48,0.9),rgba(13,10,24,0.85));border:1px solid var(--border2);box-shadow:0 4px 16px #0008;font-family:'Cinzel',serif;letter-spacing:1px;}

/* refined bars with inner glow */
.bar{box-shadow:inset 0 1px 4px #000a, 0 1px 0 #ffffff08;}
.hp-f{background:linear-gradient(90deg,#7a1520,#e0444e,#ff6a72)!important;}
.mp-f{background:linear-gradient(90deg,#163a6a,#4a90e2,#6ab0ff)!important;}
.xp-f{background:linear-gradient(90deg,#4a1a7a,#a865d8,#c88aff)!important;}

/* buttons refined */
.mini-btn{background:linear-gradient(160deg,rgba(36,26,58,0.92),rgba(20,15,32,0.92));border:1px solid var(--border2);box-shadow:0 3px 12px #0008, 0 1px 0 #ffffff0a inset;border-radius:10px;letter-spacing:0.3px;color:var(--gold);transition:all .15s;}
.mini-btn:active{transform:scale(0.93);border-color:var(--gold);box-shadow:0 0 14px #f5c56355;}

/* skill + attack buttons get richer styling */
.skill-btn{background:radial-gradient(circle at 40% 30%,rgba(40,30,60,0.95),rgba(15,10,24,0.95));border:2px solid var(--border2);box-shadow:0 4px 16px #000a, 0 0 0 1px #ffffff08 inset;}
.atk-main{background:radial-gradient(circle at 38% 30%,#ff8a6a,#c0392b 60%,#7a1818);border:3px solid var(--gold);box-shadow:0 6px 28px #ff444455, 0 0 0 1px #ffffff15 inset, 0 0 30px #ff4a3a44;}
.joy-base{background:radial-gradient(circle,rgba(28,21,48,0.6),rgba(13,10,24,0.5));border:1px solid var(--border2);box-shadow:inset 0 2px 12px #000a;}
.joy-stick{background:radial-gradient(circle at 38% 32%,#ffe8a8,#f5c563 60%,#c89020);box-shadow:0 4px 16px #f5c56366, 0 0 0 1px #ffffff20 inset;}

/* class cards refined */
.cls-card{background:linear-gradient(165deg,#1c1530,#100c1c);border:1px solid var(--border);box-shadow:0 6px 20px #0006, 0 0 0 1px #ffffff05 inset;border-radius:14px;}
.cls-card.sel{box-shadow:0 8px 30px var(--cls-glow), 0 0 0 1px #ffffff10 inset;}

/* shop/world items refined */
.shop-item,.world-item,.eq-slot,.inv-cell,.stat-line,.item-detail{background:linear-gradient(160deg,#1a1330,#0e0a1a)!important;box-shadow:0 3px 12px #0006, 0 0 0 1px #ffffff05 inset;}
.shop-buy{background:linear-gradient(135deg,#c89030,#f5c563);box-shadow:0 3px 12px #f5c56344;border-radius:10px;}

/* logo refresh */
.logo{font-family:'Cinzel Decorative',serif;color:var(--gold);text-shadow:0 0 50px #f5c56388,0 3px 0 #5a3a10,0 0 100px #e0a03044;}
.btn-main{background:linear-gradient(135deg,#3a1530,#6b2050,#3a1530);border:1.5px solid var(--gold);color:var(--gold);border-radius:4px;box-shadow:0 4px 20px #0008, 0 0 0 1px #ffffff08 inset;letter-spacing:2px;}
.btn-main:active{background:linear-gradient(135deg,#6b2050,#9a2f70,#6b2050);box-shadow:0 0 30px #f5c56366;}
.scr-title{font-family:'Cinzel Decorative',serif;text-shadow:0 0 30px #f5c56344;}

/* ── EVOLUTION FLASH ── */
.evo-overlay{position:absolute;inset:0;z-index:120;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(20,10,40,0.82),rgba(5,2,12,0.96));backdrop-filter:blur(2px);animation:evoIn .5s ease;}
@keyframes evoIn{from{opacity:0;}to{opacity:1;}}
.evo-rays{position:absolute;width:min(70vw,300px);height:min(70vw,300px);border-radius:50%;background:radial-gradient(circle,var(--evo-c) 0%,transparent 60%);opacity:0.18;animation:evoPulse 2s ease-in-out infinite;will-change:transform,opacity;top:50%;left:50%;transform:translate(-50%,-50%);}
@keyframes evoPulse{0%,100%{transform:translate(-50%,-50%) scale(0.9);opacity:0.12;}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.22;}}
.evo-burst{font-size:clamp(3rem,16vw,8rem);filter:drop-shadow(0 0 40px var(--evo-c));animation:evoBurst 1s ease;z-index:2;}
@keyframes evoBurst{0%{transform:scale(0) rotate(-180deg);opacity:0;}60%{transform:scale(1.3) rotate(10deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.evo-label{font-family:'Cinzel Decorative',serif;font-size:clamp(0.8rem,3.5vw,1.3rem);color:var(--dim);letter-spacing:4px;z-index:2;margin-top:8px;animation:evoUp .8s ease .2s both;}
.evo-name{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,7vw,3rem);font-weight:900;color:var(--evo-c);text-shadow:0 0 40px var(--evo-c),0 0 80px var(--evo-c);z-index:2;animation:evoUp .8s ease .35s both;}
.evo-skill{margin-top:18px;background:linear-gradient(160deg,#1c1530,#0d0a18);border:2px solid var(--evo-c);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:2;box-shadow:0 0 30px var(--evo-c);animation:evoUp .8s ease .5s both;}
.evo-skill-emj{font-size:2.4rem;filter:drop-shadow(0 0 12px var(--evo-c));}
.evo-skill-txt b{color:var(--evo-c);font-size:1rem;}
.evo-skill-txt small{display:block;color:var(--dim);font-size:0.66rem;margin-top:2px;}
@keyframes evoUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.evo-cont{margin-top:24px;z-index:2;animation:evoUp .8s ease .7s both;}

/* ── Quest Panel ── */
.quest-list{display:flex;flex-direction:column;gap:6px;}
/* BLACKSMITH */
.bs-panel{display:flex;flex-direction:column;gap:12px;}
.bs-guide{background:linear-gradient(160deg,#2a1808,#1a0e04);border:1px solid #5a3a18;border-radius:10px;padding:12px;font-size:0.72rem;line-height:1.5;color:#e8d0a8;}
.bs-mats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;}
.bs-mat{display:flex;align-items:center;gap:5px;background:#140e1a;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:0.68rem;}
.bs-mat-n{flex:1;color:#c8bce0;}
.bs-mat-c{font-weight:800;}
.bs-recipes{display:flex;flex-direction:column;gap:8px;}
.bs-recipe{background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;padding:10px;}
.bs-r-head{display:flex;align-items:center;gap:8px;}
.bs-r-emoji{font-size:1.3rem;}
.bs-r-name{font-weight:800;font-size:0.82rem;}
.bs-r-desc{font-size:0.66rem;color:#9a8aa8;margin:4px 0;}
.bs-r-cost{font-size:0.72rem;color:#ffd24a;margin-bottom:6px;}
.bs-craft{width:100%;background:linear-gradient(135deg,#7a4a18,#c97a2a);border:none;border-radius:8px;color:#fff;padding:9px;font-weight:700;font-family:inherit;cursor:pointer;}
.bs-craft:disabled{opacity:0.45;}
/* DUNGEON GATE */
.dg-panel{display:flex;flex-direction:column;gap:14px;}
.dg-info{background:linear-gradient(160deg,#2a0e08,#1a0604);border:1px solid #6a2a18;border-radius:10px;padding:12px;font-size:0.74rem;line-height:1.5;color:#ffc0a0;}
.dg-entry{display:flex;flex-direction:column;gap:10px;}
.dg-opt{background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px;align-items:center;}
.dg-opt-t{font-weight:800;font-size:0.9rem;}
.dg-opt-s{font-size:0.68rem;color:#9a8aa8;}
/* CHAT */
.chat-panel{display:flex;flex-direction:column;height:60vh;max-height:460px;}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:4px;}
.chat-msg{font-size:0.72rem;line-height:1.3;padding:4px 8px;border-radius:8px;background:#140e24;word-break:break-word;}
.chat-msg.me{background:#15302a;align-self:flex-end;max-width:85%;}
.chat-msg.sys{background:transparent;color:#7a6a9a;font-style:italic;font-size:0.64rem;text-align:center;}
.chat-who{font-weight:700;margin-left:5px;}
.chat-txt{color:#e8e0f0;}
.chat-input-row{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--border);}
.chat-input{flex:1;background:#0c0712;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:#fff;font-size:0.8rem;font-family:inherit;}
.chat-send{background:linear-gradient(135deg,#2a6a3a,#33a04a);border:none;border-radius:8px;color:#fff;padding:0 18px;font-weight:700;font-family:inherit;cursor:pointer;}
/* PVP */
.pvp-panel{display:flex;flex-direction:column;gap:12px;}
.pvp-rank{text-align:center;color:#c9a84a;font-size:0.8rem;font-weight:700;}
.pvp-lobby{display:flex;flex-direction:column;gap:16px;align-items:center;padding:20px 0;}
.pvp-info{color:#9a8aa8;font-size:0.75rem;text-align:center;line-height:1.5;}
.pvp-fighters{display:flex;align-items:center;gap:8px;}
.pvp-fighter{flex:1;background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;padding:10px;}
.pvp-name{font-size:0.78rem;font-weight:700;color:#fff;margin-bottom:6px;}
.pvp-lv{color:#c9a84a;font-size:0.66rem;}
.pvp-hpbar{height:14px;background:#0c0712;border-radius:7px;overflow:hidden;border:1px solid var(--border2);}
.pvp-hpf{height:100%;transition:width 0.3s;}
.pvp-hpf.me{background:linear-gradient(90deg,#2a8a4a,#5aff8a);}
.pvp-hpf.enemy{background:linear-gradient(90deg,#8a2a2a,#ff5a5a);}
.pvp-hptxt{font-size:0.62rem;color:#9a8aa8;text-align:center;margin-top:3px;}
.pvp-vs{font-size:1.4rem;}
.pvp-log{background:#0c0712;border-radius:8px;padding:8px;min-height:90px;max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.pvp-log-line{font-size:0.7rem;color:#c8bce0;}
.pvp-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pvp-act{background:linear-gradient(135deg,#3a2a5a,#5a3da0);border:1px solid var(--border2);border-radius:10px;color:#fff;padding:12px 6px;font-size:0.74rem;font-weight:700;font-family:inherit;cursor:pointer;}
.pvp-act.heavy{background:linear-gradient(135deg,#7a2a2a,#c0392b);}
.pvp-act.skill{background:linear-gradient(135deg,#2a5a7a,#3d8ab3);}
.pvp-act:disabled{opacity:0.5;}
.pvp-result{text-align:center;font-size:1rem;font-weight:800;display:flex;flex-direction:column;gap:12px;align-items:center;padding:10px;}
.pvp-result.win{color:#5aff8a;}
.pvp-result.lose{color:#ff5a5a;}
/* CHAR SLOTS */
.char-slots{display:flex;flex-direction:column;gap:8px;width:min(340px,90vw);margin:10px 0;position:relative;z-index:3;}
.char-slot{background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;min-height:54px;display:flex;align-items:center;overflow:hidden;}
.char-slot.filled{border-color:#3a5a8a;}
.cs-info{flex:1;padding:10px 14px;cursor:pointer;}
.cs-name{font-weight:800;color:#ffe0a0;font-size:0.9rem;}
.cs-meta{font-size:0.66rem;color:#9a8aa8;}
.cs-del{background:none;border:none;color:#ff6a6a;font-size:1.1rem;padding:0 14px;cursor:pointer;align-self:stretch;}
.cs-empty{flex:1;padding:12px;text-align:center;color:#7a6a9a;cursor:pointer;font-size:0.8rem;line-height:1.4;}
.cs-empty:active{color:#aaa;}
/* ADMIN PRO */
.admin-pro{max-width:min(560px,96vw);}
.admin-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}
.admin-stat{background:#140e24;border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;}
.admin-stat b{display:block;font-size:1rem;color:#5affc0;}
.admin-stat span{font-size:0.56rem;color:#9a8aa8;}
.admin-section{background:#140e24;border:1px solid #3a5a8a;border-radius:10px;padding:10px;margin-bottom:12px;}
.admin-sec-t{font-weight:700;color:#88ccff;margin-bottom:8px;font-size:0.8rem;}
.admin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.admin-btn{background:linear-gradient(135deg,#2a3a6a,#3d5a9a);border:1px solid var(--border2);border-radius:8px;color:#fff;padding:9px 4px;font-size:0.68rem;font-weight:700;font-family:inherit;cursor:pointer;}
.admin-btn.sm{padding:6px 8px;font-size:0.64rem;}
.admin-btn:active{transform:scale(0.96);}
.admin-accts{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.admin-acct{background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.admin-acct.sel{border-color:#5a8aca;}
.admin-acct.banned{opacity:0.6;border-color:#7a2a2a;}
.admin-acct-head{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.admin-acct-sub{font-size:0.62rem;color:#9a8aa8;}
.admin-acct-expand{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.admin-char{font-size:0.66rem;color:#c8bce0;background:#0c0712;border-radius:6px;padding:5px 8px;}
.admin-grant{display:flex;flex-direction:column;gap:6px;}
.admin-grant-row{display:flex;gap:6px;}
.admin-num{flex:1;background:#0c0712;border:1px solid var(--border2);border-radius:6px;color:#fff;padding:6px 8px;font-family:inherit;font-size:0.72rem;}
.admin-acct-actions{display:flex;gap:6px;flex-wrap:wrap;}
.ban-tag{background:#7a2a2a;color:#fff;font-size:0.55rem;padding:1px 5px;border-radius:4px;margin-left:4px;}
.lb-tab{flex:1;background:#1a1330;border:1px solid var(--border);border-radius:8px;color:#c8bce0;padding:8px;font-size:0.74rem;font-weight:700;font-family:inherit;cursor:pointer;}
.quest-item{background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.quest-item.done{border-color:#5aff8a;}
.quest-item.claimed{opacity:0.4;}
.quest-emj{font-size:1.4rem;min-width:28px;text-align:center;}
.quest-info{flex:1;min-width:0;}
.quest-name{font-size:0.78rem;font-weight:700;color:var(--gold);}
.quest-desc{font-size:0.6rem;color:var(--dim);margin-top:2px;}
.quest-prog{height:5px;background:#0a0510;border-radius:3px;margin-top:4px;overflow:hidden;}
.quest-prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,#5aff8a,#2ea050);transition:width .3s;}
.quest-prog-txt{font-size:0.55rem;color:var(--dim);margin-top:1px;}
.quest-claim{padding:6px 12px;border-radius:8px;background:linear-gradient(135deg,#2a7a3a,#33a04a);border:1px solid #5aff8a;color:#fff;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.quest-claim:active{transform:scale(0.9);}
.quest-reward{font-size:0.6rem;color:#ffd24a;}
.quest-locked{opacity:0.4;font-size:0.6rem;color:var(--dim);}

/* evolution badge in HUD */
.evo-badge{display:inline-flex;align-items:center;gap:3px;font-size:0.56rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-right:4px;}

/* ── LOGIN SCREEN ── */
.login-box{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;background:linear-gradient(160deg,rgba(28,21,48,0.92),rgba(13,10,24,0.92));border:1px solid var(--border2);border-radius:16px;padding:20px;position:relative;z-index:2;box-shadow:0 12px 40px #000a,0 0 0 1px #ffffff08 inset;}
.login-tabs{display:flex;gap:6px;margin-bottom:4px;}
.login-tab{flex:1;text-align:center;padding:9px;font-size:0.8rem;font-weight:700;color:var(--dim);cursor:pointer;border-radius:10px;border:1px solid transparent;transition:all .2s;}
.login-tab.active{color:var(--gold);background:var(--panel);border-color:var(--border2);}
.login-msg{font-size:0.72rem;color:#ff8a8a;text-align:center;}
.login-hint{font-size:0.6rem;color:var(--dim);text-align:center;line-height:1.5;margin-top:4px;}

/* account bar on title */
.acct-bar{position:absolute;top:max(12px,env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:3;font-size:0.78rem;color:var(--text2);}
.acct-logout{background:rgba(40,26,40,0.8);border:1px solid var(--border2);color:var(--dim);font-family:'Heebo';font-size:0.68rem;padding:5px 12px;border-radius:8px;cursor:pointer;}
.acct-logout:active{transform:scale(0.94);}
.gm-tag{display:inline-block;background:linear-gradient(135deg,#c0392b,#ff6a5a);color:#fff;font-size:0.58rem;font-weight:900;padding:1px 6px;border-radius:6px;margin-left:4px;letter-spacing:1px;box-shadow:0 0 8px #c0392b88;}

/* admin account rows */
.acct-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(160deg,#1a1330,#0e0a1a);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.acct-name{font-size:0.82rem;font-weight:700;color:var(--text);}
.acct-sub{font-size:0.62rem;color:var(--dim);margin-top:2px;}
.acct-actions{display:flex;gap:6px;}
.acct-act{background:var(--panel2);border:1px solid var(--border2);color:var(--text2);font-family:'Heebo';font-size:0.66rem;font-weight:700;padding:7px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.acct-act:active{transform:scale(0.93);}

/* ── GM PANEL ── */
.gm-body{display:flex;flex-direction:column;}
.gm-sec{font-size:0.74rem;font-weight:700;color:var(--gold);margin:12px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.gm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
@media(min-width:420px){.gm-grid{grid-template-columns:repeat(4,1fr);}}
.gm-btn{background:linear-gradient(160deg,#241a3a,#140f20);border:1px solid var(--border2);color:var(--text);font-family:'Heebo';font-weight:700;font-size:0.72rem;padding:11px 6px;border-radius:10px;cursor:pointer;transition:all .12s;box-shadow:0 2px 8px #0006;}
.gm-btn:active{transform:scale(0.93);border-color:var(--gold);}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
// ENGINE — item generation, stats, persistence
// ═══════════════════════════════════════════════════════════════
window.ENGINE = (function(){
const D = window.GAME_DATA;

let uidCounter = 1;
function uid(){ return 'i'+(uidCounter++)+'_'+Math.floor(Math.random()*99999); }

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

const RARITY_WEIGHTS = {
  common:50, uncommon:28, rare:14, epic:6, legendary:1.8, mythic:0.2
};

function rollRarity(luckBonus=0){
  // luckBonus shifts toward higher rarity (boss drops)
  const entries = Object.entries(RARITY_WEIGHTS);
  let total = 0;
  const adjusted = entries.map(([k,w])=>{
    const idx = Object.keys(D.RARITY).indexOf(k);
    const adj = w * (1 + luckBonus*idx*0.5);
    total += adj;
    return [k, adj];
  });
  let r = Math.random()*total;
  for(const [k,w] of adjusted){
    r -= w;
    if(r<=0) return k;
  }
  return 'common';
}

// Generate an item scaled to a given level
function genItem(itemLv, rarityOverride, luckBonus=0){
  const baseT = pick(D.ITEM_BASES);
  const rar = rarityOverride || rollRarity(luckBonus);
  const rInfo = D.RARITY[rar];
  const lvScale = 1 + itemLv*0.12;

  // Main stat value
  const mainVal = Math.round(baseT.baseVal * rInfo.mult * lvScale);

  // Stat requirements scale with item level and rarity
  const reqStat = {};
  for(const [k,v] of Object.entries(baseT.reqStat)){
    reqStat[k] = Math.round(v * (1 + itemLv*0.10) * (0.8 + rInfo.mult*0.15));
  }
  // Higher rarity items also get bonus stat requirements
  if(rInfo.mult >= 2.6 && baseT.class){
    reqStat[baseT.class] = (reqStat[baseT.class]||0) + Math.round(itemLv*0.3);
  }

  const reqLv = Math.max(1, Math.round(itemLv * (0.7 + rInfo.mult*0.05)));

  // Bonus stats based on rarity
  const stats = { [baseT.stat]: mainVal };
  const numBonus = ({common:0,uncommon:1,rare:2,epic:3,legendary:4,mythic:5})[rar];
  const bonusPool = ['str','agi','int','vit','crit','spd'];
  for(let i=0;i<numBonus;i++){
    const s = pick(bonusPool);
    const val = Math.round((2 + itemLv*0.25) * rInfo.mult * (0.5+Math.random()*0.5));
    stats[s] = (stats[s]||0) + val;
  }

  // Name
  let name = baseT.base;
  if(rar==='legendary' || rar==='mythic'){
    name = pick(D.ITEM_PREFIXES.filter(p=>p)) + ' ' + name + ' ' + pick(D.ITEM_SUFFIXES.filter(s=>s));
  } else if(numBonus>0){
    const pre = pick(D.ITEM_PREFIXES); const suf = pick(D.ITEM_SUFFIXES);
    name = (pre?pre+' ':'') + name + (suf?' '+suf:'');
  }

  return {
    uid: uid(),
    name: name.trim(),
    emoji: baseT.emoji,
    slot: baseT.slot,
    rarity: rar,
    itemLv,
    reqLv,
    reqStat,
    stats,
    sellPrice: Math.round(mainVal * rInfo.mult * 2 + itemLv*5),
  };
}

// Generate a specific shop set piece.
// IMPORTANT: every piece in a set requires the SAME stat, scaled gently so a
// player who dumps their level-up points into that stat can always wear the
// FULL set at the set's required level (with points to spare).
function genSetPiece(baseIdx, itemLv, rarity, setId, setName){
  const baseT = D.ITEM_BASES[baseIdx];
  const rInfo = D.RARITY[rarity];
  const lvScale = 1 + itemLv*0.12;
  const mainVal = Math.round(baseT.baseVal * rInfo.mult * lvScale);
  // The set's theme stat = the piece's class stat (str/agi/int), default str.
  const themeStat = baseT.class || 'str';
  // Requirement scales with item level but stays well within a single stat's
  // reachable value: a player gets 5 points/level, so even putting HALF of them
  // into one stat reaches ~2.5*level. We require ~1.1*level, always reachable.
  const reqStat = {};
  reqStat[themeStat] = Math.max(5, Math.round(8 + itemLv*1.1));
  const stats = { [baseT.stat]: mainVal };
  const numBonus = ({common:0,uncommon:1,rare:2,epic:3,legendary:4,mythic:5})[rarity];
  for(let i=0;i<numBonus;i++){
    const s = pick(['str','agi','int','vit','crit','spd']);
    stats[s] = (stats[s]||0) + Math.round((2+itemLv*0.25)*rInfo.mult*0.7);
  }
  return {
    uid: uid(), name: setName ? `${baseT.base} ${setName}` : baseT.base, emoji: baseT.emoji, slot: baseT.slot,
    rarity, itemLv, reqLv: Math.max(1,Math.round(itemLv*0.75)), reqStat, stats,
    sellPrice: Math.round(mainVal*rInfo.mult*2),
    setId: setId||null,
  };
}

// Check if player can equip an item
function canEquip(player, item){
  if(player.level < item.reqLv) return {ok:false, reason:`דרושה רמה ${item.reqLv}`};
  for(const [k,v] of Object.entries(item.reqStat||{})){
    if((player.stats[k]||0) < v){
      const names = {str:'STR',agi:'AGI',int:'INT',vit:'VIT'};
      return {ok:false, reason:`דרוש ${names[k]} ${v}`};
    }
  }
  return {ok:true};
}

// Compute total derived stats from base stats + equipment
function computeStats(player){
  const cls = D.CLASSES.find(c=>c.id===player.classId);
  const s = {...player.stats}; // str, agi, int, vit

  // Add equipment stat bonuses
  const eqStats = {str:0,agi:0,int:0,vit:0,atk:0,matk:0,def:0,spd:0,crit:0};
  for(const item of Object.values(player.equipped)){
    if(!item) continue;
    for(const [k,v] of Object.entries(item.stats)){
      eqStats[k] = (eqStats[k]||0) + v;
    }
  }
  const tStr = s.str + eqStats.str;
  const tAgi = s.agi + eqStats.agi;
  const tInt = s.int + eqStats.int;
  const tVit = s.vit + eqStats.vit;

  // Derived
  let maxHp = Math.round(cls.hpBase + tVit*9 + player.level*8);
  const maxMp = Math.round(cls.mpBase + tInt*5 + player.level*4);
  // Physical attack: STR and AGI both contribute strongly so str-classes (warrior/
  // paladin) and agi-classes (archer) scale comparably. Archer leans on AGI.
  let atk   = Math.round(tStr*1.6 + tAgi*1.4 + eqStats.atk);
  let matk  = Math.round(tInt*2.0 + eqStats.matk);
  const def   = Math.round(tVit*1.2 + tStr*0.3 + eqStats.def);
  // speed uses diminishing returns so high agility doesn't make the player teleport.
  // base 3.0, agility contributes via sqrt curve, gear adds a modest flat bonus.
  let spd   = +(3.0 + Math.sqrt(Math.max(0,tAgi))*0.32 + eqStats.spd*0.05).toFixed(2);
  spd = Math.min(spd, 9.5); // hard cap on the stat itself
  const crit  = clamp(0.05 + tAgi*0.004 + eqStats.crit*0.01, 0, 0.75);

  // Evolution multipliers (cumulative through stages reached)
  const evos = (D.EVOLUTIONS[player.classId]||[]);
  for(let i=0; i<(player.evoStage||0) && i<evos.length; i++){
    maxHp = Math.round(maxHp * evos[i].hpMul);
    atk   = Math.round(atk   * evos[i].atkMul);
    matk  = Math.round(matk  * evos[i].atkMul);
    // evolution gives a small speed boost but stays under the cap
    spd   = +(Math.min(spd * Math.min(evos[i].spdMul,1.12), 11)).toFixed(2);
  }

  // ── SET BONUS: count equipped pieces per setId; full set grants the bonus ──
  let activeSet = null;
  const setCounts = {};
  for(const item of Object.values(player.equipped)){
    if(item && item.setId){ setCounts[item.setId] = (setCounts[item.setId]||0)+1; }
  }
  for(const setId in setCounts){
    const setDef = (D.SHOP_SETS||[]).find(st=>st.id===setId);
    if(setDef && setDef.bonus && setCounts[setId] >= setDef.pieces.length){
      const bn = setDef.bonus;
      if(bn.atk){ atk=Math.round(atk*(1+bn.atk)); matk=Math.round(matk*(1+bn.atk)); }
      if(bn.hp){ maxHp=Math.round(maxHp*(1+bn.hp)); }
      activeSet = setDef;
    }
  }
  const setCrit = activeSet && activeSet.bonus.crit ? activeSet.bonus.crit : 0;
  const finalCrit = clamp(crit + setCrit, 0, 0.9);

  return {tStr,tAgi,tInt,tVit, maxHp,maxMp,atk,matk,def,spd,crit:finalCrit, activeSet:activeSet?activeSet.id:null};
}

// XP needed for a level
// Rebalanced for a proper grind — each tier is significantly harder than before.
// Lv 1-30:   exponential ramp-up (slightly steeper base)
// Lv 31-80:  linear growth, +12% per level
// Lv 81-130: moderate exponential ×1.055 per level
// Lv 131-200: heavy exponential ×1.075 per level — each 10 levels ~doubles cost
// Lv 201+:   endgame grind — ×1.10 per level (brutal)
function xpForLevel(lv){
  if(lv <= 30)  return Math.round(80 * Math.pow(1.15, lv-1));
  const b30 = 80 * Math.pow(1.15, 29);
  if(lv <= 80)  return Math.round(b30 * (1 + (lv-30)*0.12));
  const b80 = b30 * (1 + 50*0.12);
  if(lv <= 130) return Math.round(b80 * Math.pow(1.055, lv-80));
  const b130 = b80 * Math.pow(1.055, 50);
  if(lv <= 200) return Math.round(b130 * Math.pow(1.045, lv-130));
  // endgame (200+): linear-ish growth so each level is a handful of bosses, not hundreds
  const b200 = b130 * Math.pow(1.045, 70);
  return Math.round(b200 * (1 + (lv-200)*0.08));
}

function createPlayer(classId, name){
  const cls = D.CLASSES.find(c=>c.id===classId);
  const p = {
    classId, name,
    level:1, xp:0,
    stats:{...cls.base}, // str agi int vit (rounded)
    statPoints:0,
    quests: {},        // {questId: {progress:N, done:bool, claimed:bool}}
    questKills: {},    // {monsterId: count}
    gold:100,
    hp:0, mp:0,
    inventory:[],
    equipped:{weapon:null,chest:null,helm:null,boots:null,ring:null,amulet:null},
    skills:[...cls.startSkills],
    loadout:[...cls.startSkills.slice(0,8)],
    evoStage:0,
    consumables:{hp_pot_s:3, hp_pot_m:2, mp_pot_s:2, mp_pot_m:1, food:2},
    kills:0,
    world:'meadow',
    unlockedWorlds:['meadow'],
    materials:{},          // crafting materials: matId -> count
    craftedUniques:[],     // ids of unique items already crafted (so they stay unique)
    dungeonKey:false,      // has the rare drop that unlocks the forge dungeon
    lastDungeonEntry:0,    // timestamp for the 3-day free-entry cooldown
    mounts:['horse'],      // owned mounts (horse free to start)
    activeMount:null,      // currently riding (null = on foot)
    pets:[],               // owned pet ids
    activePet:null,        // currently summoned pet
    petParts:{},           // pet crafting parts: partId -> count
    achievements:[],       // unlocked achievement ids
    title:'',              // active title from achievements
    pvpKills:0,            // PvP kill count
    dailyClaim:0,          // last daily-reward claim timestamp
    dailyStreak:0,         // consecutive daily logins
    dailyQuests:null,      // today's daily quests
    weeklyXp:0,            // XP earned this week (for the weekly leaderboard)
    weekId:0,              // which ISO week the weeklyXp belongs to
    weeklyRewardClaimed:0, // weekId of the last claimed weekly-winner reward
    evoQuests:{},          // evolution quest progress: {questId:{progress,done}}
    evoBranch:null,        // chosen lv220 branch id
    evoReady:false,        // true when level reached but quests pending
    epicStage:0,           // progress through the lv220 epic chain (0-4)
  };
  // round base stats
  for(const k in p.stats) p.stats[k] = Math.round(p.stats[k]);
  const cs = computeStats(p);
  p.hp = cs.maxHp; p.mp = cs.maxMp;
  return p;
}

function applyLevelGrowth(player){
  // Each level grants stat points to spend manually + small auto growth
  player.statPoints += 5;
}

function save(player){
  try{
    localStorage.setItem('wol3_save', JSON.stringify(player)); // legacy/current
    // also save into the account store, in the player's character slot
    if(player.account){
      const accts = loadAccounts();
      const acc = accts[player.account];
      if(acc){
        if(!acc.characters) acc.characters=[acc.player||null,null,null,null];
        const slot = (player.charSlot!=null) ? player.charSlot : 0;
        acc.characters[slot] = player;
        delete acc.player;
        saveAccounts(accts);
      }
    }
    return true;
  } catch(e){ return false; }
}
function load(){
  try{ const s = localStorage.getItem('wol3_save'); return s?JSON.parse(s):null; }
  catch(e){ return null; }
}
function clearSave(){ try{ localStorage.removeItem('wol3_save'); }catch(e){} }

// ── ACCOUNT SYSTEM (local, browser-stored) ──
// NOTE: passwords are stored locally only. This is NOT real online security —
// real multiplayer auth needs a server. Good enough for local profiles.
const ADMIN_CODE = 'lidor-gm'; // secret code to grant admin/GM
function hashPw(s){ // simple non-crypto hash, just to avoid plaintext
  let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h=h&0xffffffff; }
  return (h>>>0).toString(16);
}
function loadAccounts(){
  try{ const s=localStorage.getItem('wol3_accounts'); return s?JSON.parse(s):{}; }
  catch(e){ return {}; }
}
function saveAccounts(a){ try{ localStorage.setItem('wol3_accounts', JSON.stringify(a)); }catch(e){} }

// ── WEEKLY WINNER SYSTEM ──
function currentWeekId(){ return Math.floor(Date.now()/(7*24*60*60*1000)); }
function loadWeekly(){
  try{ const s=localStorage.getItem('wol3_weekly'); return s?JSON.parse(s):{lastResolvedWeek:currentWeekId(), history:[], pending:null}; }
  catch(e){ return {lastResolvedWeek:currentWeekId(), history:[], pending:null}; }
}
function saveWeekly(w){ try{ localStorage.setItem('wol3_weekly', JSON.stringify(w)); }catch(e){} }
// Resolve any completed weeks: find last week's top non-GM XP earner, record
// them in the hall of fame, and flag a pending reward for that account.
// Returns {announce:{name,xp,week}} if a NEW winner was just crowned, else null.
function resolveWeekly(){
  const wk = currentWeekId();
  const W = loadWeekly();
  if(W.lastResolvedWeek == null) W.lastResolvedWeek = wk;
  if(wk <= W.lastResolvedWeek){ saveWeekly(W); return null; } // no new week yet
  // a new week (or more) has begun → crown the winner of the most recent finished week
  const prevWeek = wk - 1;
  const accts = loadAccounts();
  let best = null;
  Object.keys(accts).forEach(u=>{
    if(accts[u].isAdmin) return; // GM excluded
    (accts[u].characters||[accts[u].player]).filter(Boolean).forEach((c,slot)=>{
      const xp = (c.weekId===prevWeek) ? (c.weeklyXp||0) : 0;
      if(xp>0 && (!best || xp>best.xp)){ best = {name:c.name, account:u, slot, xp}; }
    });
  });
  let announce = null;
  if(best){
    W.history.unshift({week:prevWeek, winnerName:best.name, winnerAccount:best.account, xp:best.xp, ts:Date.now()});
    if(W.history.length>20) W.history.pop();
    W.pending = {account:best.account, slot:best.slot, week:prevWeek, name:best.name, xp:best.xp};
    announce = {name:best.name, xp:best.xp, week:prevWeek};
  }
  W.lastResolvedWeek = wk;
  saveWeekly(W);
  return announce;
}
function claimWeeklyPending(account){
  const W = loadWeekly();
  if(W.pending && W.pending.account===account){ const p=W.pending; W.pending=null; saveWeekly(W); return p; }
  return null;
}

// Names that impersonate staff are forbidden (checked as substrings, case-insensitive,
// also catching leet-speak like 4dmin / 0wner and spaced/underscored variants).
const RESERVED_NAME_PATTERNS = [
  /g\s*m\b/i, /\bgm\b/i, /game\s*master/i,
  /a\s*d\s*m\s*i\s*n/i, /4dm[i1]n/i,
  /m\s*o\s*d\b/i, /moderat/i,
  /o\s*w\s*n\s*e\s*r/i, /0wner/i,
  /staff/i, /support/i, /official/i, /system/i, /server/i,
  /lidor/i, /developer/i, /\bdev\b/i, /root/i, /administrator/i,
];
function isReservedName(name){
  const n = (name||'').trim();
  // strip common separators/leet to catch evasions like "A_d_m_i_n" / "G.M"
  const norm = n.toLowerCase().replace(/[\s._\-|]/g,'').replace(/0/g,'o').replace(/1/g,'i').replace(/3/g,'e').replace(/4/g,'a').replace(/5/g,'s').replace(/7/g,'t');
  if(/(^|[^a-z])(gm|admin|owner|mod|staff|support|official|system|server|root|developer|dev|administrator|moderator|gamemaster|lidor)([^a-z]|$)/.test(norm)) return true;
  if(/(gm|admin|owner|mod|staff|owner|root|gamemaster)/.test(norm) && norm.length<=12) return true;
  return RESERVED_NAME_PATTERNS.some(re=>re.test(n));
}
function registerAccount(username, password){
  username=(username||'').trim();
  if(username.length<2) return {ok:false, reason:'שם משתמש קצר מדי'};
  if((password||'').length<3) return {ok:false, reason:'סיסמה קצרה מדי (לפחות 3 תווים)'};
  if(isReservedName(username)) return {ok:false, reason:'שם זה שמור ואינו זמין (אסור להתחזות לצוות)'};
  const accts=loadAccounts();
  if(accts[username]) return {ok:false, reason:'שם המשתמש כבר תפוס'};
  // NEW accounts are ALWAYS non-admin. GM is granted only via the external tool.
  accts[username]={ pw:hashPw(password), characters:[null,null,null,null], isAdmin:false, banned:false, created:Date.now() };
  saveAccounts(accts);
  return {ok:true};
}
function loginAccount(username, password){
  username=(username||'').trim();
  const accts=loadAccounts();
  const a=accts[username];
  if(!a) return {ok:false, reason:'שם משתמש לא קיים'};
  if(a.pw!==hashPw(password)) return {ok:false, reason:'סיסמה שגויה'};
  if(a.banned) return {ok:false, reason:'⛔ החשבון הורחק מהמשחק'};
  // migrate old single-player accounts to the 4-slot format
  if(!a.characters){ a.characters=[a.player||null,null,null,null]; delete a.player; saveAccounts(accts); }
  return {ok:true, account:a, username};
}
function setAdmin(username, on){
  const accts=loadAccounts();
  if(accts[username]){ accts[username].isAdmin=!!on; saveAccounts(accts); return true; }
  return false;
}
function isAdmin(username){ const a=loadAccounts()[username]; return !!(a&&a.isAdmin); }
function listAccounts(){
  const a=loadAccounts();
  return Object.keys(a).map(u=>{
    const acc=a[u];
    const chars=(acc.characters||[acc.player]).filter(Boolean);
    return {username:u, isAdmin:acc.isAdmin, banned:!!acc.banned,
      charCount:chars.length, maxLevel:chars.reduce((m,c)=>Math.max(m,c?c.level:0),0),
