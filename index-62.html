    ctx.strokeStyle='#f0f0e0'; ctx.lineWidth=s*0.1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-s*0.3,-s*0.5); ctx.quadraticCurveTo(-s*0.7,-s*0.6,-s*0.65,-s*0.25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.3,-s*0.5); ctx.quadraticCurveTo(s*0.7,-s*0.6,s*0.65,-s*0.25); ctx.stroke();
    // eyes
    ctx.fillStyle='#ff3300';
    ctx.beginPath(); ctx.arc(-s*0.16,-s*0.38,s*0.07,0,Math.PI*2); ctx.arc(s*0.16,-s*0.38,s*0.07,0,Math.PI*2); ctx.fill();
  },
  drake(ctx,s,c,t){
    shadow(ctx,s);
    const fl=Math.sin(t/150)*0.15;
    // wings
    ctx.fillStyle=darken(c,20);
    ctx.save(); ctx.rotate(-fl);
    ctx.beginPath(); ctx.moveTo(-s*0.2,-s*0.1); ctx.lineTo(-s*1.2,-s*0.6); ctx.lineTo(-s*1.0,s*0.1); ctx.lineTo(-s*0.7,-s*0.2); ctx.lineTo(-s*0.8,s*0.3); ctx.lineTo(-s*0.4,0); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(fl);
    ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.1); ctx.lineTo(s*1.2,-s*0.6); ctx.lineTo(s*1.0,s*0.1); ctx.lineTo(s*0.7,-s*0.2); ctx.lineTo(s*0.8,s*0.3); ctx.lineTo(s*0.4,0); ctx.closePath(); ctx.fill();
    ctx.restore();
    // body
    const g=ctx.createRadialGradient(-s*0.1,-s*0.1,0,0,0,s*0.7);
    g.addColorStop(0,lighten(c,40)); g.addColorStop(1,c);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(0,s*0.2,s*0.5,s*0.55,0,0,Math.PI*2); ctx.fill();
    // belly scales
    ctx.fillStyle=lighten(c,30);
    ctx.beginPath(); ctx.ellipse(0,s*0.3,s*0.3,s*0.4,0,0,Math.PI*2); ctx.fill();
    // neck + head
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-s*0.35,s*0.35,s*0.4,0,0,Math.PI*2); ctx.fill();
    // snout
    ctx.beginPath(); ctx.moveTo(-s*0.1,-s*0.4); ctx.lineTo(-s*0.5,-s*0.3); ctx.lineTo(-s*0.1,-s*0.15); ctx.fill();
    // horns
    ctx.fillStyle=darken(c,30);
    ctx.beginPath(); ctx.moveTo(s*0.1,-s*0.6); ctx.lineTo(s*0.3,-s*0.9); ctx.lineTo(s*0.25,-s*0.55); ctx.fill();
    // eye
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.arc(-s*0.05,-s*0.4,s*0.07,0,Math.PI*2); ctx.fill();
  },
  lich(ctx,s,c,t){
    const float=Math.sin(t/250)*s*0.08;
    ctx.save(); ctx.translate(0,float);
    // robe
    const g=ctx.createLinearGradient(0,-s*0.4,0,s*0.8);
    g.addColorStop(0,c); g.addColorStop(1,darken(c,40));
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(-s*0.15,-s*0.4);
    ctx.lineTo(-s*0.6,s*0.8); ctx.lineTo(s*0.6,s*0.8); ctx.lineTo(s*0.15,-s*0.4);
    ctx.fill();
    // floating orbs
    for(let i=0;i<3;i++){
      const a=t/400+i*2.1;
      ctx.fillStyle='#aa66ff'; ctx.shadowColor='#aa66ff'; ctx.shadowBlur=s*0.3;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*0.7, Math.sin(a)*s*0.5+s*0.1, s*0.08,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
    // skull head
    ctx.fillStyle='#e8e0d0';
    ctx.beginPath(); ctx.arc(0,-s*0.4,s*0.28,0,Math.PI*2); ctx.fill();
    // crown
    ctx.fillStyle='#ffcc00';
    ctx.beginPath(); ctx.moveTo(-s*0.25,-s*0.55); ctx.lineTo(-s*0.2,-s*0.75); ctx.lineTo(-s*0.1,-s*0.58); ctx.lineTo(0,-s*0.8); ctx.lineTo(s*0.1,-s*0.58); ctx.lineTo(s*0.2,-s*0.75); ctx.lineTo(s*0.25,-s*0.55); ctx.fill();
    // eyes
    ctx.fillStyle='#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=s*0.3;
    ctx.beginPath(); ctx.arc(-s*0.1,-s*0.42,s*0.06,0,Math.PI*2); ctx.arc(s*0.1,-s*0.42,s*0.06,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  },
  hydra(ctx,s,c,t){
    shadow(ctx,s);
    // body
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,s*0.4,s*0.6,s*0.45,0,0,Math.PI*2); ctx.fill();
    // three heads on necks
    const headPos=[-0.5,0,0.5];
    headPos.forEach((hx,i)=>{
      const wob=Math.sin(t/200+i*1.5)*s*0.1;
      ctx.strokeStyle=c; ctx.lineWidth=s*0.22; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(hx*s*0.5,s*0.2); ctx.quadraticCurveTo(hx*s*0.8+wob,-s*0.3,hx*s*0.9+wob,-s*0.6); ctx.stroke();
      // head
      ctx.fillStyle=lighten(c,20);
      ctx.beginPath(); ctx.ellipse(hx*s*0.9+wob,-s*0.65,s*0.2,s*0.16,0,0,Math.PI*2); ctx.fill();
      // eyes
      ctx.fillStyle='#ffdd00';
      ctx.beginPath(); ctx.arc(hx*s*0.9+wob-s*0.05,-s*0.68,s*0.04,0,Math.PI*2); ctx.arc(hx*s*0.9+wob+s*0.05,-s*0.68,s*0.04,0,Math.PI*2); ctx.fill();
    });
  },
  reaper(ctx,s,c,t){
    const float=Math.sin(t/300)*s*0.1;
    ctx.save(); ctx.translate(0,float);
    // scythe
    ctx.strokeStyle='#5a4030'; ctx.lineWidth=s*0.06;
    ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.7); ctx.lineTo(s*0.6,s*0.7); ctx.stroke();
    ctx.strokeStyle='#cccccc'; ctx.lineWidth=s*0.1;
    ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.7); ctx.quadraticCurveTo(s*0.0,-s*0.9,-s*0.3,-s*0.5); ctx.stroke();
    // cloak
    const g=ctx.createLinearGradient(0,-s*0.5,0,s*0.9);
    g.addColorStop(0,lighten(c,30)); g.addColorStop(1,'#000');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(0,-s*0.6);
    ctx.lineTo(-s*0.55,s*0.9); ctx.lineTo(-s*0.2,s*0.7); ctx.lineTo(0,s*0.9); ctx.lineTo(s*0.2,s*0.7); ctx.lineTo(s*0.55,s*0.9);
    ctx.closePath(); ctx.fill();
    // hood opening (black void)
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(0,-s*0.35,s*0.25,0,Math.PI*2); ctx.fill();
    // glowing eyes in void
    ctx.fillStyle='#ff0000'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=s*0.4;
    ctx.beginPath(); ctx.arc(-s*0.08,-s*0.35,s*0.05,0,Math.PI*2); ctx.arc(s*0.08,-s*0.35,s*0.05,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  },
  behemoth(ctx,s,c,t){
    shadow(ctx,s*1.1);
    const bob=Math.sin(t/300)*s*0.03;
    ctx.save(); ctx.translate(0,bob);
    // massive body
    const g=ctx.createRadialGradient(-s*0.2,-s*0.2,0,0,0,s);
    g.addColorStop(0,lighten(c,40)); g.addColorStop(1,c);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(0,s*0.3,s*0.8,s*0.7,0,0,Math.PI*2); ctx.fill();
    // spikes on back
    ctx.fillStyle=darken(c,30);
    for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*s*0.25,-s*0.3); ctx.lineTo(i*s*0.25-s*0.08,-s*0.7); ctx.lineTo(i*s*0.25+s*0.08,-s*0.4); ctx.fill(); }
    // legs
    ctx.fillStyle=darken(c,15);
    ctx.fillRect(-s*0.55,s*0.6,s*0.3,s*0.4);
    ctx.fillRect(s*0.25,s*0.6,s*0.3,s*0.4);
    // head
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-s*0.1,s*0.5,s*0.4,0,0,Math.PI*2); ctx.fill();
    // multiple eyes
    ctx.fillStyle='#ffff00'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=s*0.2;
    [-0.2,0,0.2].forEach(x=>{ ctx.beginPath(); ctx.arc(x*s,-s*0.15,s*0.07,0,Math.PI*2); ctx.fill(); });
    ctx.shadowBlur=0;
    // mouth
    ctx.fillStyle='#1a0505';
    ctx.beginPath(); ctx.ellipse(0,s*0.1,s*0.3,s*0.12,0,0,Math.PI); ctx.fill();
    ctx.fillStyle='#fff';
    for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*s*0.1,s*0.05); ctx.lineTo(i*s*0.1+s*0.03,s*0.18); ctx.lineTo(i*s*0.1+s*0.06,s*0.05); ctx.fill(); }
    ctx.restore();
  },
};

function drawMonster(ctx, mon, sx, sy, baseSize, t){
  // The game stores type info under mon.base; fall back to direct props for safety.
  const shape = (mon.base && mon.base.shape) || mon.shape || 'slime';
  const color = (mon.base && mon.base.color) || mon.color || '#5fdd5f';
  const drawFn = MONSTER_DRAW[shape] || MONSTER_DRAW.slime;
  const mId = (mon.base&&mon.base.id)||mon.id||'';
  // ── Special monster auras (drawn before body, at world coords) ──
  if(mId==='vampire'||mId==='vampire_lord'){
    ctx.save(); ctx.globalAlpha=0.16+Math.sin(t/300)*0.07;
    ctx.fillStyle='#cc0033'; ctx.shadowColor='#ff0044'; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.1,0,Math.PI*2); ctx.fill(); ctx.restore();
  } else if(mId==='phoenix'){
    ctx.save(); ctx.globalAlpha=0.2+Math.sin(t/200)*0.1;
    const fg=ctx.createRadialGradient(sx,sy-baseSize*0.4,0,sx,sy-baseSize*0.4,baseSize*1.4);
    fg.addColorStop(0,'rgba(255,200,0,0.4)'); fg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.4,0,Math.PI*2); ctx.fill(); ctx.restore();
  } else if(mId==='shadow'||mId==='shadow_king'){
    ctx.save(); ctx.globalAlpha=0.18+Math.sin(t/400)*0.1;
    ctx.fillStyle='#1a0033'; ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.25,0,Math.PI*2); ctx.fill(); ctx.restore();
  } else if(mId==='elemental'){
    ctx.save(); ctx.globalAlpha=0.22+Math.sin(t/150)*0.12;
    ctx.strokeStyle='#ff6600'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=18; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.0,0,Math.PI*2); ctx.stroke(); ctx.restore();
  } else if(mId==='banshee'){
    ctx.save(); ctx.globalAlpha=0.12+Math.sin(t/250)*0.1;
    ctx.fillStyle='#e0e8ff'; ctx.shadowColor='#aabbff'; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.2,0,Math.PI*2); ctx.fill(); ctx.restore();
  } else if(mId==='troll'){
    ctx.save(); ctx.globalAlpha=0.12+Math.sin(t/600)*0.06;
    ctx.fillStyle='#3a7a20'; ctx.beginPath(); ctx.arc(sx,sy-baseSize*0.4,baseSize*1.1,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  ctx.save();
  ctx.translate(sx,sy);
  const s = baseSize;
  drawFn(ctx, s, color, t);
  ctx.restore();
}

// ── PLAYER (human characters per class) ──
function drawPlayer(ctx, sx, sy, classId, moving, t, facing, evoStage){
  ctx.save();
  ctx.translate(sx,sy);
  const s = 26 + (evoStage||0)*3; // grow slightly each evolution
  const cls = window.GAME_DATA.CLASSES.find(c=>c.id===classId);
  const basePal = {
    warrior:{armor:'#a8332a',armor2:'#d14438',skin:'#e8b488',hair:'#3a2010',trim:'#ffd700'},
    mage:   {armor:'#5a2a8a',armor2:'#7b3db3',skin:'#d8b090',hair:'#1a1030',trim:'#cc88ff'},
    archer: {armor:'#2a7a3a',armor2:'#33a04a',skin:'#d4a878',hair:'#5a3a18',trim:'#88ff99'},
    paladin:{armor:'#c8a020',armor2:'#e8c030',skin:'#e8c098',hair:'#6a4a20',trim:'#ffffff'},
  }[classId];
  const pal = {...basePal};
  // upgrade armor colors per evolution stage
  const evos = window.GAME_DATA.EVOLUTIONS[classId]||[];
  let evoAura=null;
  if(evoStage>0 && evos[evoStage-1]){
    const evo = evos[evoStage-1];
    // BUG FIX: use evo color as trim/accent only; keep armor readable on all backgrounds
    pal.armor2 = evo.color;
    pal.armor = darken(evo.color, 55); // darker variant for shading (was 40, increased for contrast)
    pal.trim = evo.glow;
    evoAura = evo.aura;
  }

  const bob = moving ? Math.sin(t/120)*2.5 : Math.sin(t/600)*1;
  const legSw = moving ? Math.sin(t/120)*0.35 : 0;
  const armSw = moving ? Math.sin(t/120+Math.PI)*0.3 : 0;
  const flip = facing<0 ? -1 : 1;

  // evolution aura glow under/around the character
  if(evoAura){
    ctx.save();
    const pulse = 0.5 + Math.sin(t/200)*0.5;
    ctx.globalAlpha = 0.25 + pulse*0.2;
    const g = ctx.createRadialGradient(0, s*0.4, 0, 0, s*0.4, s*1.6);
    g.addColorStop(0, evoAura); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, s*0.4, s*1.6, 0, Math.PI*2); ctx.fill();
    // orbiting motes for stage 2 (lv110)
    if(evoStage>=2){
      ctx.globalAlpha = 0.8; ctx.fillStyle = evoAura; ctx.shadowColor=evoAura; ctx.shadowBlur=10;
      for(let i=0;i<5;i++){ const a=t/300+i*Math.PI*2/5; ctx.beginPath(); ctx.arc(Math.cos(a)*s*1.3, s*0.3+Math.sin(a)*s*0.5, 3, 0, Math.PI*2); ctx.fill(); }
    }
    ctx.restore();
  }

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0,s*1.4,s*0.5,s*0.15,0,0,Math.PI*2); ctx.fill();

  ctx.save();
  ctx.scale(flip,1);
  ctx.translate(0,bob);

  // legs (pivot from hip at s*0.45, not from center)
  ctx.fillStyle=pal.armor2;
  ctx.save(); ctx.translate(-s*0.12, s*0.45); ctx.rotate(-legSw*0.5);
  ctx.fillRect(-s*0.1,0,s*0.2,s*0.6); ctx.fillStyle='#1a1008'; ctx.fillRect(-s*0.13,s*0.55,s*0.26,s*0.16); ctx.restore();
  ctx.fillStyle=pal.armor2;
  ctx.save(); ctx.translate(s*0.12, s*0.45); ctx.rotate(legSw*0.5);
  ctx.fillRect(-s*0.1,0,s*0.2,s*0.6); ctx.fillStyle='#1a1008'; ctx.fillRect(-s*0.13,s*0.55,s*0.26,s*0.16); ctx.restore();

  // torso
  const tg=ctx.createLinearGradient(-s*0.35,-s*0.2,s*0.35,s*0.5);
  tg.addColorStop(0,lighten(pal.armor,35)); tg.addColorStop(0.5,pal.armor2); tg.addColorStop(1,darken(pal.armor,20));
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(-s*0.34,s*0.5); ctx.lineTo(-s*0.38,-s*0.05);
  ctx.quadraticCurveTo(0,-s*0.2,s*0.38,-s*0.05); ctx.lineTo(s*0.34,s*0.5); ctx.closePath(); ctx.fill();
  // chest highlight (rim light)
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.moveTo(-s*0.2,s*0.4); ctx.lineTo(-s*0.28,-s*0.02); ctx.quadraticCurveTo(-s*0.1,-s*0.12,0,-s*0.1); ctx.lineTo(-s*0.05,s*0.4); ctx.closePath(); ctx.fill();
  // shoulder pauldrons
  ctx.fillStyle=lighten(pal.armor,15);
  ctx.beginPath(); ctx.ellipse(-s*0.34,-s*0.02,s*0.14,s*0.1,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.34,-s*0.02,s*0.14,s*0.1,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.trim;
  ctx.beginPath(); ctx.ellipse(-s*0.34,-s*0.04,s*0.06,s*0.04,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.34,-s*0.04,s*0.06,s*0.04,0.3,0,Math.PI*2); ctx.fill();
  // belt
  ctx.fillStyle='#1a1008'; ctx.fillRect(-s*0.35,s*0.42,s*0.7,s*0.12);
  ctx.fillStyle=pal.trim; ctx.fillRect(-s*0.06,s*0.42,s*0.12,s*0.12);
  ctx.fillStyle=lighten(pal.trim,40); ctx.fillRect(-s*0.04,s*0.44,s*0.08,s*0.04);

  // back arm
  ctx.save(); ctx.translate(s*0.36,0); ctx.rotate(-armSw+0.1);
  ctx.fillStyle=pal.armor2; ctx.fillRect(-s*0.12,0,s*0.24,s*0.45);
  ctx.fillStyle=pal.skin; ctx.fillRect(-s*0.1,s*0.4,s*0.2,s*0.22); ctx.restore();

  // weapon arm + weapon
  ctx.save(); ctx.translate(-s*0.36,0); ctx.rotate(armSw-0.1);
  ctx.fillStyle=pal.armor2; ctx.fillRect(-s*0.12,0,s*0.24,s*0.45);
  ctx.fillStyle=pal.skin; ctx.fillRect(-s*0.1,s*0.4,s*0.2,s*0.22);
  if(classId==='warrior'||classId==='paladin'){
    ctx.fillStyle='#c8d8e0'; ctx.fillRect(-s*0.05,s*0.5,s*0.1,s*0.7);
    ctx.fillStyle=pal.trim; ctx.fillRect(-s*0.15,s*0.55,s*0.3,s*0.08);
  } else if(classId==='mage'){
    ctx.fillStyle='#6a4820'; ctx.fillRect(-s*0.05,s*0.5,s*0.1,s*0.8);
    ctx.fillStyle=pal.trim; ctx.shadowColor=pal.trim; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(0,s*0.5,s*0.15,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  } else if(classId==='archer'){
    ctx.strokeStyle='#6a4820'; ctx.lineWidth=s*0.08;
    ctx.beginPath(); ctx.arc(s*0.1,s*0.6,s*0.4,-Math.PI*0.55,Math.PI*0.55); ctx.stroke();
    ctx.strokeStyle='#ddd'; ctx.lineWidth=s*0.02;
    ctx.beginPath(); ctx.moveTo(s*0.1,s*0.25); ctx.lineTo(s*0.1,s*0.95); ctx.stroke();
  }
  ctx.restore();

  // head
  ctx.save(); ctx.translate(0,-s*0.25);
  if(classId==='warrior'){
    ctx.fillStyle=pal.armor;
    ctx.beginPath(); ctx.arc(0,-s*0.05,s*0.32,Math.PI,0); ctx.rect(-s*0.32,-s*0.05,s*0.64,s*0.12); ctx.fill();
    ctx.fillStyle='#000a'; ctx.fillRect(-s*0.2,-s*0.05,s*0.4,s*0.1);
    ctx.fillStyle=pal.trim; ctx.fillRect(-s*0.04,-s*0.4,s*0.08,s*0.32);
  } else {
    ctx.fillStyle=pal.skin;
    ctx.beginPath(); ctx.ellipse(0,s*0.05,s*0.24,s*0.28,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.hair;
    ctx.beginPath(); ctx.arc(0,-s*0.02,s*0.25,Math.PI,0); ctx.fill();
    if(classId==='mage'){
      ctx.fillStyle=pal.armor;
      ctx.beginPath(); ctx.moveTo(-s*0.3,0); ctx.lineTo(s*0.3,0); ctx.lineTo(s*0.08,-s*0.2); ctx.lineTo(0,-s*0.6); ctx.lineTo(-s*0.08,-s*0.2); ctx.closePath(); ctx.fill();
      ctx.fillStyle=pal.trim; ctx.beginPath(); ctx.arc(0,-s*0.55,s*0.05,0,Math.PI*2); ctx.fill();
    } else if(classId==='paladin'){
      ctx.fillStyle=pal.trim;
      ctx.beginPath(); ctx.arc(0,-s*0.2,s*0.28,Math.PI,0); ctx.fill();
      // halo
      ctx.strokeStyle='#ffee88'; ctx.lineWidth=2; ctx.shadowColor='#ffee88'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,-s*0.5,s*0.3,s*0.08,0,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    }
    // eyes
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(-s*0.09,s*0.03,s*0.045,0,Math.PI*2); ctx.arc(s*0.09,s*0.03,s*0.045,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  ctx.restore(); // flip
  ctx.restore(); // main
}

// ════════════════════════════════════════════════════
// RICH TEXTURED GROUND — fills the world floor with detailed,
// modern-looking terrain per tile type (grass/stone/water/lava/etc.)
// ════════════════════════════════════════════════════
function hashCell(gx,gy){ const v=Math.sin(gx*127.1+gy*311.7)*43758.5453; return v-Math.floor(v); }
let _groundCache=null, _groundKey='';
function drawGround(ctx, W, H, cam, wd, now){
  const CELL = 80; // larger cells = fewer draws
  // Cache the static ground to an offscreen canvas; only regenerate when the
  // camera moves by a whole cell or the world/size changes. This keeps the
  // expensive per-cell drawing off the per-frame path → no lag.
  const camGX = Math.floor(cam.x/CELL), camGY = Math.floor(cam.y/CELL);
  const animated = (wd.tile==='lava'||wd.tile==='inferno'||wd.tile==='astral'||wd.tile==='oblivion'||wd.tile==='metal');
  const key = `${wd.tile}|${W}x${H}|${camGX},${camGY}`;
  if(key!==_groundKey || !_groundCache){
    _groundKey=key;
    if(!_groundCache || _groundCache.width!==W+CELL*2 || _groundCache.height!==H+CELL*2){
      _groundCache=document.createElement('canvas');
      _groundCache.width=W+CELL*2; _groundCache.height=H+CELL*2;
    }
    const g=_groundCache.getContext('2d');
    g.clearRect(0,0,_groundCache.width,_groundCache.height);
    // draw cells into the cache (offset so subpixel camera scroll works)
    const baseX=camGX*CELL, baseY=camGY*CELL;
    const cols=Math.ceil(_groundCache.width/CELL)+1, rows=Math.ceil(_groundCache.height/CELL)+1;
    for(let cy=0; cy<rows; cy++){
      for(let cx=0; cx<cols; cx++){
        const gx=camGX+cx-1, gy=camGY+cy-1;
        const sx=(gx*CELL)-baseX+CELL, sy=(gy*CELL)-baseY+CELL;
        drawGroundCell(g, sx, sy, CELL, gx, gy, wd.tile, wd);
      }
    }
  }
  // blit cache with subpixel camera offset
  const offX = -(cam.x - camGX*CELL) - CELL;
  const offY = -(cam.y - camGY*CELL) - CELL;
  ctx.drawImage(_groundCache, offX, offY);

  // animated overlay — per tile type
  if(animated){
    const startGX=Math.floor(cam.x/CELL), startGY=Math.floor(cam.y/CELL);
    const cc=Math.ceil(W/CELL)+2, rr=Math.ceil(H/CELL)+2;
    ctx.save();
    for(let cy=0;cy<rr;cy++) for(let cx=0;cx<cc;cx++){
      const gx=startGX+cx, gy=startGY+cy, h=hashCell(gx,gy);
      const sx=gx*CELL-cam.x, sy=gy*CELL-cam.y;
      if(wd.tile==='lava'||wd.tile==='inferno'){
        const glow=0.4+Math.sin(now/500+gx*0.5+gy*0.3)*0.35;
        ctx.globalAlpha=glow*0.5;
        ctx.fillStyle=wd.tile==='inferno'?'#ff2a10':'#ff7a10';
        if(h<0.5){ ctx.fillRect(sx,sy+CELL*0.5-1,CELL,2); } else { ctx.fillRect(sx+CELL*0.5-1,sy,2,CELL); }
      } else if(wd.tile==='astral'){
        // pulsing rainbow sparkles
        const phase = now/800 + gx*0.3 + gy*0.4;
        const alpha = (0.5+Math.sin(phase)*0.5)*0.25;
        if(h>0.6){ const hue=(Math.floor(h*360+now/20))%360; ctx.globalAlpha=alpha; ctx.fillStyle=`hsl(${hue},100%,70%)`; ctx.fillRect(sx+h*CELL-1,sy+hashCell(gx+5,gy+5)*CELL-1,3,3); }
      } else if(wd.tile==='oblivion'){
        // slow purple pulse
        const alpha2=(0.3+Math.sin(now/1200+gx*0.2+gy*0.15)*0.3)*0.18;
        ctx.globalAlpha=alpha2; ctx.fillStyle='#6600aa';
        if(h>0.85){ ctx.fillRect(sx,sy,CELL,CELL); }
      } else if(wd.tile==='metal'){
        // electrical spark flicker
        if(h>0.92&&Math.sin(now/100+gx*7+gy*11)>0.8){
          ctx.globalAlpha=0.4; ctx.fillStyle='#aaddff';
          ctx.fillRect(sx+h*CELL-1,sy+hashCell(gx*3,gy*3)*CELL-1,3,3);
        }
      }
    }
    ctx.restore();
  }
}

// Draw a single ground cell (used to fill the offscreen cache)
function drawGroundCell(ctx, sx, sy, CELL, gx, gy, tile, wd){
  const h=hashCell(gx,gy), h2=hashCell(gx+31,gy+57), h3=hashCell(gx+17,gy+83);
  if(tile==='grass'){
    // Multi-tone grass with worn paths
    const shade = h<0.3?'#234a1e':h<0.65?'#2c5a26':h<0.85?'#326a2c':'#3a7a32';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // dirt patches
    if(h3<0.18){ ctx.fillStyle='rgba(80,55,30,0.28)'; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.5,CELL*0.38,CELL*0.28,h*3,0,Math.PI*2); ctx.fill(); }
    // grass blades
    ctx.strokeStyle='rgba(120,200,90,0.55)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    for(let b=0;b<4;b++){ const bh=hashCell(gx*7+b,gy*13); const bh2=hashCell(gx*3+b,gy*5+1); const bx=sx+bh*CELL*0.85+CELL*0.05, by=sy+CELL*0.6+bh2*CELL*0.35; ctx.beginPath(); ctx.moveTo(bx,by); ctx.quadraticCurveTo(bx+(bh-0.5)*6,by-10,bx+2,by-16); ctx.stroke(); }
    // flowers
    if(h>0.91){ const fc=['#ff6a8a','#ffd24a','#c77dff','#aaffcc','#fff'][Math.floor(h2*5)]; ctx.fillStyle=fc; for(let pp=0;pp<5;pp++){ const a=pp/5*6.28; ctx.beginPath(); ctx.arc(sx+CELL*0.5+Math.cos(a)*5,sy+CELL*0.4+Math.sin(a)*5,2.5,0,6.28); ctx.fill(); } ctx.fillStyle='#ffe866'; ctx.beginPath(); ctx.arc(sx+CELL*0.5,sy+CELL*0.4,3,0,6.28); ctx.fill(); }
    // subtle grid lines (trail effect)
    if(h2>0.8){ ctx.strokeStyle='rgba(10,30,8,0.2)'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,CELL,CELL); }
  }
  else if(tile==='forest'){
    const shade = h<0.4?'#152a10':h<0.75?'#1a3314':'#1f3d18';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // moss patches
    if(h2<0.45){ ctx.fillStyle='rgba(10,22,8,0.5)'; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.5,CELL*0.42,CELL*0.3,h*2,0,Math.PI*2); ctx.fill(); }
    // leaf litter dots
    ctx.fillStyle='rgba(90,140,60,0.35)';
    for(let s=0;s<5;s++){ const sh=hashCell(gx*5+s,gy*9); ctx.beginPath(); ctx.arc(sx+sh*CELL,sy+hashCell(gx,gy*3+s)*CELL,1.5+sh*2,0,6.28); ctx.fill(); }
    // root lines
    if(h3>0.75){ ctx.strokeStyle='rgba(30,18,10,0.4)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.8); ctx.bezierCurveTo(sx+CELL*0.3,sy+CELL*0.5,sx+CELL*0.6,sy+CELL*0.6,sx+CELL*0.9,sy+CELL*0.2); ctx.stroke(); }
  }
  else if(tile==='swamp'){
    const shade = h<0.4?'#1a2e10':h<0.7?'#1f3318':'#253d1c';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // murky water puddles
    if(h2<0.38){ ctx.fillStyle='rgba(30,60,20,0.55)'; ctx.beginPath(); ctx.ellipse(sx+h*CELL,sy+h2*CELL*1.2+CELL*0.1,CELL*0.35,CELL*0.2,h*2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(80,160,60,0.18)'; ctx.beginPath(); ctx.ellipse(sx+h*CELL,sy+h2*CELL*1.2+CELL*0.1,CELL*0.25,CELL*0.12,h*2,0,Math.PI*2); ctx.fill(); }
    // algae blobs
    ctx.fillStyle='rgba(100,160,50,0.3)';
    for(let s=0;s<3;s++){ const sh=hashCell(gx*4+s,gy*8+s); ctx.beginPath(); ctx.arc(sx+sh*CELL,sy+hashCell(gx+s,gy*2)*CELL,2+sh*3,0,6.28); ctx.fill(); }
    // toxic bubbles
    if(h3>0.88){ ctx.strokeStyle='rgba(120,200,70,0.5)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(sx+h2*CELL,sy+h3*CELL,5,0,6.28); ctx.stroke(); }
  }
  else if(tile==='stone'||tile==='crypt'){
    // stone slabs with grout lines
    const shade = h<0.35?'#252030':h<0.65?'#2a2636':h<0.85?'#30293e':'#36304a';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // grout lines
    ctx.strokeStyle='rgba(12,10,18,0.7)'; ctx.lineWidth=2;
    ctx.strokeRect(sx+2,sy+2,CELL*0.5-3,CELL*0.5-3);
    ctx.strokeRect(sx+CELL*0.5+1,sy+2,CELL*0.5-3,CELL*0.5-3);
    ctx.strokeRect(sx+2,sy+CELL*0.5+1,CELL*0.5-3,CELL*0.5-3);
    ctx.strokeRect(sx+CELL*0.5+1,sy+CELL*0.5+1,CELL*0.5-3,CELL*0.5-3);
    // highlight top-left edge
    ctx.strokeStyle='rgba(80,70,100,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+CELL,sy); ctx.moveTo(sx,sy); ctx.lineTo(sx,sy+CELL); ctx.stroke();
    // cracks
    if(h3>0.72){ ctx.strokeStyle='rgba(10,8,16,0.55)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(sx+CELL*0.2,sy+CELL*0.3); ctx.lineTo(sx+CELL*0.45,sy+CELL*0.6); ctx.lineTo(sx+CELL*0.35,sy+CELL*0.85); ctx.stroke(); }
    // moss in cracks
    if(h2<0.15){ ctx.fillStyle='rgba(50,90,40,0.4)'; ctx.fillRect(sx+CELL*0.05,sy+CELL*0.45,CELL*0.9,3); }
  }
  else if(tile==='castle'){
    // dark stone with torchlight warmth
    const shade = h<0.4?'#22151e':h<0.7?'#2a1828':'#321d30';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // brick pattern
    const row = gy % 2 === 0;
    ctx.strokeStyle='rgba(10,6,14,0.7)'; ctx.lineWidth=1.5;
    if(row){ ctx.strokeRect(sx+2,sy+2,CELL-4,CELL*0.45-3); ctx.strokeRect(sx+2,sy+CELL*0.5,CELL-4,CELL*0.45); }
    else   { ctx.strokeRect(sx+2,sy+2,CELL*0.45-3,CELL-4); ctx.strokeRect(sx+CELL*0.5,sy+2,CELL*0.45,CELL-4); }
    // warm torch glow patches
    if(h3>0.85){ ctx.fillStyle='rgba(200,120,40,0.12)'; ctx.fillRect(sx,sy,CELL,CELL); }
    // bloodstain
    if(h2>0.92){ ctx.fillStyle='rgba(140,20,20,0.3)'; ctx.beginPath(); ctx.ellipse(sx+h*CELL,sy+h2*CELL,8,5,h,0,Math.PI*2); ctx.fill(); }
  }
  else if(tile==='lava'){
    const shade = h<0.5?'#1c0e08':'#261408';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // cooled lava cracks with glow edges
    if(h2<0.55){ 
      ctx.fillStyle='rgba(50,28,15,0.65)'; ctx.beginPath(); ctx.moveTo(sx+CELL*0.15,sy+CELL*0.2); ctx.lineTo(sx+CELL*0.85,sy+CELL*0.25); ctx.lineTo(sx+CELL*0.75,sy+CELL*0.8); ctx.lineTo(sx+CELL*0.2,sy+CELL*0.75); ctx.closePath(); ctx.fill();
      // glowing crack edges
      ctx.strokeStyle=`rgba(255,${100+Math.floor(h*80)},0,0.4)`; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(sx+CELL*0.15,sy+CELL*0.2); ctx.lineTo(sx+CELL*0.85,sy+CELL*0.25); ctx.stroke();
    }
    // ember dots
    if(h3>0.78){ ctx.fillStyle=`rgba(255,${80+Math.floor(h*120)},10,0.7)`; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,1.5,0,6.28); ctx.fill(); }
  }
  else if(tile==='snow'){
    const shade = h<0.4?'#c4d4e8':h<0.7?'#cdd8f0':'#dae4f8';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // snow drifts
    if(h2<0.4){ ctx.fillStyle='rgba(200,220,245,0.45)'; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.6,CELL*0.42,CELL*0.22,h*2,0,Math.PI*2); ctx.fill(); }
    // ice patches
    if(h3>0.72){ ctx.fillStyle='rgba(160,200,240,0.35)'; ctx.beginPath(); ctx.ellipse(sx+h2*CELL,sy+h*CELL,CELL*0.3,CELL*0.18,h3,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(150,195,235,0.4)'; ctx.lineWidth=1; ctx.stroke(); }
    // snowflake crystal
    if(h>0.9){ ctx.strokeStyle='rgba(180,210,240,0.6)'; ctx.lineWidth=1; const cx2=sx+h2*CELL,cy2=sy+h3*CELL,r2=5; for(let i=0;i<6;i++){ const a=i*Math.PI/3; ctx.beginPath(); ctx.moveTo(cx2,cy2); ctx.lineTo(cx2+Math.cos(a)*r2,cy2+Math.sin(a)*r2); ctx.stroke(); } }
    // subtle blue shadow tint
    ctx.fillStyle='rgba(100,140,200,0.06)'; ctx.fillRect(sx,sy,CELL,CELL);
  }
  else if(tile==='void'){
    const shade = h<0.5?'#080612':'#0c0a1a';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // void tears
    if(h2<0.25){ ctx.fillStyle='rgba(70,30,130,0.2)'; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.5,CELL*0.48,CELL*0.32,h*3,0,Math.PI*2); ctx.fill(); }
    // stars / energy sparks
    if(h>0.62){ ctx.fillStyle=`rgba(${180+Math.floor(h3*75)},${150+Math.floor(h*80)},255,${0.6+h2*0.4})`; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,h>0.92?2:1,0,6.28); ctx.fill(); }
    // energy grid lines
    if(h3>0.88){ ctx.strokeStyle='rgba(100,50,180,0.2)'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,CELL,CELL); }
  }
  else if(tile==='celestial'){
    const shade = h<0.4?'#0c0828':h<0.7?'#100c30':'#14103a';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // golden energy veins
    if(h2<0.35){ ctx.strokeStyle='rgba(255,220,100,0.18)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.5); ctx.bezierCurveTo(sx+CELL*0.3,sy+CELL*0.2,sx+CELL*0.7,sy+CELL*0.8,sx+CELL*0.9,sy+CELL*0.5); ctx.stroke(); }
    // divine light blobs
    if(h3<0.28){ ctx.fillStyle='rgba(180,140,255,0.14)'; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.5,CELL*0.4,CELL*0.28,h*2,0,Math.PI*2); ctx.fill(); }
    // bright stars
    if(h>0.55){ ctx.fillStyle=h>0.9?'rgba(255,245,180,0.95)':'rgba(200,180,255,0.7)'; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,h>0.92?2.5:1.5,0,6.28); ctx.fill(); }
    // constellation lines
    if(h3>0.92&&h>0.7){ ctx.strokeStyle='rgba(255,230,150,0.2)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(sx+h*CELL,sy+h2*CELL); ctx.lineTo(sx+h2*CELL,sy+h3*CELL); ctx.stroke(); }
  }
  else if(tile==='inferno'){
    const shade = h<0.5?'#1c0608':'#28080c';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // hellish cracked ground
    if(h2<0.6){ 
      ctx.fillStyle='rgba(60,15,18,0.7)'; ctx.beginPath(); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.15); ctx.lineTo(sx+CELL*0.9,sy+CELL*0.2); ctx.lineTo(sx+CELL*0.8,sy+CELL*0.85); ctx.lineTo(sx+CELL*0.15,sy+CELL*0.8); ctx.closePath(); ctx.fill();
      // burning crack glow
      ctx.strokeStyle=`rgba(255,${30+Math.floor(h*80)},20,0.5)`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.15); ctx.lineTo(sx+CELL*0.9,sy+CELL*0.2); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.15); ctx.lineTo(sx+CELL*0.15,sy+CELL*0.8); ctx.stroke();
    }
    // skull pattern faint
    if(h3>0.9){ ctx.fillStyle='rgba(180,30,30,0.15)'; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,7,0,Math.PI); ctx.fill(); }
    // ember particles
    if(h>0.82){ ctx.fillStyle=`rgba(255,${60+Math.floor(h3*160)},10,0.8)`; ctx.beginPath(); ctx.arc(sx+h2*CELL,sy+h3*CELL,2,0,6.28); ctx.fill(); }
  }
  else if(tile==='metal'){
    // Titan tower — industrial metal plates
    const shade = h<0.35?'#101010':h<0.65?'#181818':'#202020';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // metal plate seams
    ctx.strokeStyle='rgba(60,60,80,0.7)'; ctx.lineWidth=2;
    ctx.strokeRect(sx+1,sy+1,CELL-2,CELL-2);
    ctx.strokeRect(sx+4,sy+4,CELL-8,CELL-8);
    // rivets at corners
    ctx.fillStyle='rgba(80,80,100,0.8)';
    [[sx+5,sy+5],[sx+CELL-5,sy+5],[sx+5,sy+CELL-5],[sx+CELL-5,sy+CELL-5]].forEach(([rx,ry])=>{ ctx.beginPath(); ctx.arc(rx,ry,2.5,0,6.28); ctx.fill(); });
    // highlight sheen
    if(h>0.6){ ctx.fillStyle='rgba(120,120,160,0.12)'; ctx.fillRect(sx,sy,CELL*0.5,CELL); }
    // rust patches
    if(h3<0.2){ ctx.fillStyle='rgba(120,50,20,0.3)'; ctx.beginPath(); ctx.ellipse(sx+h2*CELL,sy+h*CELL,CELL*0.25,CELL*0.15,h*2,0,Math.PI*2); ctx.fill(); }
    // warning stripes on some cells
    if(h2>0.88){ ctx.fillStyle='rgba(220,180,0,0.12)'; ctx.fillRect(sx,sy,CELL,CELL*0.15); ctx.fillRect(sx,sy+CELL*0.85,CELL,CELL*0.15); }
  }
  else if(tile==='astral'){
    // Astral plane — ethereal iridescent surface
    const shade = h<0.4?'#080320':h<0.7?'#0c0530':'#10073a';
    ctx.fillStyle=shade; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // rainbow energy veins
    const hue = Math.floor((h*360+gx*47+gy*31)%360);
    if(h2<0.4){ ctx.strokeStyle=`hsla(${hue},90%,65%,0.22)`; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(sx+CELL*0.1,sy+CELL*0.5); ctx.bezierCurveTo(sx+h2*CELL,sy+h*CELL,sx+h*CELL,sy+h2*CELL,sx+CELL*0.9,sy+CELL*0.5); ctx.stroke(); }
    // bright energy stars
    if(h>0.58){ const starHue=(hue+120)%360; ctx.fillStyle=`hsla(${starHue},100%,80%,${0.5+h2*0.5})`; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,h>0.9?3:1.5,0,6.28); ctx.fill(); }
    // nebula wisps
    if(h3<0.22){ ctx.fillStyle=`hsla(${(hue+60)%360},70%,40%,0.15)`; ctx.beginPath(); ctx.ellipse(sx+CELL*0.5,sy+CELL*0.5,CELL*0.48,CELL*0.3,h*3,0,Math.PI*2); ctx.fill(); }
  }
  else if(tile==='oblivion'){
    // Pure darkness — only the faintest structure visible
    ctx.fillStyle='#000000'; ctx.fillRect(sx,sy,CELL+1,CELL+1);
    // void cracks with deep purple
    if(h2<0.3){ ctx.strokeStyle='rgba(60,0,80,0.45)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(sx+CELL*0.2,sy+CELL*0.1); ctx.lineTo(sx+CELL*0.5,sy+CELL*0.5); ctx.lineTo(sx+CELL*0.8,sy+CELL*0.9); ctx.stroke(); }
    // reality tears — extremely rare bright pixels
    if(h>0.94){ ctx.fillStyle=`rgba(${Math.floor(h3*200)},0,${Math.floor(h2*255)},0.9)`; ctx.beginPath(); ctx.arc(sx+h*CELL,sy+h2*CELL,1,0,6.28); ctx.fill(); }
    // faint hex pattern
    if(h3>0.82&&h>0.5){ ctx.strokeStyle='rgba(40,0,60,0.35)'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,CELL,CELL); }
  }
  else { ctx.fillStyle = h<0.5?wd.bg:lighten(wd.bg,6); ctx.fillRect(sx,sy,CELL+1,CELL+1); }
}

// ════════════════════════════════════════════════════
// SCENERY PROPS — trees, buildings, rocks, fountains, etc.
// Makes maps look like furnished worlds. Drawn from a deterministic
// hash so positions are stable, and depth-sorted with entities.
// ════════════════════════════════════════════════════
function drawTree(ctx,x,y,s,variant){
  // trunk
  ctx.fillStyle='#5a3a1e'; ctx.fillRect(x-s*0.08,y-s*0.3,s*0.16,s*0.35);
  // foliage layers
  const greens = variant===1?['#1d4a1d','#2a6a2a','#3a8a3a']:variant===2?['#2a4a10','#3a6a18','#4a8a22']:['#0f3a2a','#1a5a3a','#2a7a4a'];
  for(let i=0;i<3;i++){
    ctx.fillStyle=greens[i];
    ctx.beginPath();
    ctx.ellipse(x, y-s*0.35-i*s*0.18, s*(0.42-i*0.08), s*(0.34-i*0.06), 0, 0, Math.PI*2);
    ctx.fill();
  }
}
function drawPine(ctx,x,y,s){
  ctx.fillStyle='#4a2e16'; ctx.fillRect(x-s*0.06,y-s*0.2,s*0.12,s*0.25);
  for(let i=0;i<3;i++){
    ctx.fillStyle=['#0f3a22','#164a2a','#1d5a32'][i];
    ctx.beginPath();
    ctx.moveTo(x, y-s*0.9+i*s*0.22);
    ctx.lineTo(x-s*(0.34-i*0.06), y-s*0.35+i*s*0.22);
    ctx.lineTo(x+s*(0.34-i*0.06), y-s*0.35+i*s*0.22);
    ctx.closePath(); ctx.fill();
  }
}
function drawRock(ctx,x,y,s,col){
  col=col||'#6a6a72';
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(x-s*0.4,y); ctx.lineTo(x-s*0.25,y-s*0.4); ctx.lineTo(x+s*0.1,y-s*0.5);
  ctx.lineTo(x+s*0.38,y-s*0.2); ctx.lineTo(x+s*0.34,y); ctx.closePath(); ctx.fill();
  ctx.fillStyle=lighten(col,18); ctx.beginPath();
  ctx.moveTo(x-s*0.25,y-s*0.4); ctx.lineTo(x+s*0.1,y-s*0.5); ctx.lineTo(x+s*0.05,y-s*0.25); ctx.closePath(); ctx.fill();
}
function drawBuilding(ctx,x,y,s,col,roof){
  // wall
  ctx.fillStyle=col||'#8a6a4a'; ctx.fillRect(x-s*0.5,y-s*0.9,s,s*0.9);
  ctx.fillStyle=darken(col||'#8a6a4a',20); ctx.fillRect(x-s*0.5,y-s*0.9,s,s*0.12);
  // roof
  ctx.fillStyle=roof||'#7a2a2a'; ctx.beginPath();
  ctx.moveTo(x-s*0.6,y-s*0.85); ctx.lineTo(x,y-s*1.3); ctx.lineTo(x+s*0.6,y-s*0.85); ctx.closePath(); ctx.fill();
  // door
  ctx.fillStyle='#3a2414'; ctx.fillRect(x-s*0.12,y-s*0.42,s*0.24,s*0.42);
  // windows
  ctx.fillStyle='#ffe08a'; ctx.fillRect(x-s*0.38,y-s*0.62,s*0.16,s*0.16); ctx.fillRect(x+s*0.22,y-s*0.62,s*0.16,s*0.16);
}
function drawTower(ctx,x,y,s,col){
  ctx.fillStyle=col||'#6a6a8a'; ctx.fillRect(x-s*0.28,y-s*1.5,s*0.56,s*1.5);
  ctx.fillStyle=darken(col||'#6a6a8a',18); ctx.fillRect(x-s*0.28,y-s*1.5,s*0.56,s*0.1);
  // battlements
  for(let i=-1;i<=1;i++){ ctx.fillStyle=col||'#6a6a8a'; ctx.fillRect(x+i*s*0.2-s*0.07,y-s*1.62,s*0.14,s*0.14); }
  // window
  ctx.fillStyle='#ffd24a'; ctx.fillRect(x-s*0.08,y-s*1.0,s*0.16,s*0.24);
}
function drawFountain(ctx,x,y,s,now){
  ctx.fillStyle='#7a7a88'; ctx.beginPath(); ctx.ellipse(x,y,s*0.6,s*0.3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a8aca'; ctx.beginPath(); ctx.ellipse(x,y,s*0.48,s*0.22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7a7a88'; ctx.fillRect(x-s*0.06,y-s*0.4,s*0.12,s*0.4);
  // water spray
  ctx.fillStyle=withAlpha('#aaddff',0.6+Math.sin(now/300)*0.3);
  for(let i=0;i<5;i++){ const a=i/5*Math.PI*2; ctx.beginPath(); ctx.arc(x+Math.cos(a)*s*0.2,y-s*0.4+Math.sin(now/200+i)*4,2,0,Math.PI*2); ctx.fill(); }
}
function drawLamp(ctx,x,y,s,now){
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(x-s*0.04,y-s*0.7,s*0.08,s*0.7);
  const glow=0.6+Math.sin(now/500+x)*0.2;
  ctx.fillStyle=withAlpha('#ffcc55',glow*0.4);
  ctx.beginPath(); ctx.arc(x,y-s*0.75,s*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=withAlpha('#ffe88a',glow); ctx.beginPath(); ctx.arc(x,y-s*0.75,s*0.1,0,Math.PI*2); ctx.fill();
}
function drawCrystal(ctx,x,y,s,col,now){
  const glow=0.5+Math.sin(now/400+x)*0.3;
  ctx.fillStyle=withAlpha(col||'#aa66ff',glow);
  ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x-s*0.2,y-s*0.2); ctx.lineTo(x,y); ctx.lineTo(x+s*0.2,y-s*0.2); ctx.closePath(); ctx.fill();
  ctx.fillStyle=withAlpha(lighten(col||'#aa66ff',40),glow);
  ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x-s*0.08,y-s*0.2); ctx.lineTo(x,y); ctx.closePath(); ctx.fill();
}
// draw a single scenery prop by type
function drawProp(ctx, type, x, y, s, now){
  switch(type){
    case 'tree': drawTree(ctx,x,y,s,1); break;
    case 'tree2': drawTree(ctx,x,y,s,2); break;
    case 'darktree': drawTree(ctx,x,y,s,3); break;
    case 'pine': drawPine(ctx,x,y,s); break;
    case 'rock': drawRock(ctx,x,y,s); break;
    case 'darkrock': drawRock(ctx,x,y,s,'#3a3a44'); break;
    case 'icerock': drawRock(ctx,x,y,s,'#9ac4dd'); break;
    case 'building': drawBuilding(ctx,x,y,s,'#8a6a4a','#7a2a2a'); break;
    case 'house': drawBuilding(ctx,x,y,s,'#a08060','#3a5a8a'); break;
    case 'tower': drawTower(ctx,x,y,s); break;
    case 'fountain': drawFountain(ctx,x,y,s,now); break;
    case 'lamp': drawLamp(ctx,x,y,s,now); break;
    case 'crystal': drawCrystal(ctx,x,y,s,'#aa66ff',now); break;
    case 'firecrystal': drawCrystal(ctx,x,y,s,'#ff5a2a',now); break;
    default: drawRock(ctx,x,y,s); break;
  }
}

// ════════════════════════════════════════════════════
// MOUNTS — rideable creatures (drawn under the player)
// ════════════════════════════════════════════════════
function drawMount(ctx, x, y, type, facing, t){
  ctx.save();
  const bob=Math.sin(t/150)*2;
  const f=facing||1;
  if(type==='horse'){
    ctx.fillStyle='#6a4a2a';
    ctx.beginPath(); ctx.ellipse(x, y+bob, 30, 16, 0, 0, Math.PI*2); ctx.fill(); // body
    ctx.fillStyle='#5a3a1e';
    ctx.fillRect(x+f*22, y-18+bob, 10, 20); // neck
    ctx.beginPath(); ctx.ellipse(x+f*30, y-20+bob, 9, 7, 0,0,Math.PI*2); ctx.fill(); // head
    ctx.fillStyle='#3a2414';
    [-18,-6,8,20].forEach(lx=>ctx.fillRect(x+lx, y+10+bob, 4, 14)); // legs
    ctx.fillStyle='#2a1a0a'; ctx.fillRect(x-f*30,y-12+bob,6,18); // tail
  } else if(type==='wolf'){
    ctx.fillStyle='#555';
    ctx.beginPath(); ctx.ellipse(x, y+bob, 28, 14, 0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#444';
    ctx.beginPath(); ctx.ellipse(x+f*26, y-8+bob, 11, 9, 0,0,Math.PI*2); ctx.fill(); // head
    ctx.fillStyle='#333'; [-16,-4,8,18].forEach(lx=>ctx.fillRect(x+lx,y+8+bob,4,12));
    ctx.fillStyle='#666'; ctx.beginPath(); ctx.moveTo(x-f*26,y-4+bob); ctx.lineTo(x-f*40,y-12+bob); ctx.lineTo(x-f*28,y+4+bob); ctx.fill();
  } else if(type==='drake'){
    ctx.fillStyle='#2a7a4a';
    ctx.beginPath(); ctx.ellipse(x, y+bob, 32, 16, 0,0,Math.PI*2); ctx.fill();
    // wings
    ctx.fillStyle=withAlpha('#3a9a5a',0.85);
    const wf=Math.sin(t/180)*8;
    ctx.beginPath(); ctx.moveTo(x,y-8+bob); ctx.lineTo(x-20,y-30-wf+bob); ctx.lineTo(x+10,y-10+bob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-8+bob); ctx.lineTo(x+30,y-28-wf+bob); ctx.lineTo(x+12,y-8+bob); ctx.fill();
    ctx.fillStyle='#1d5a32'; ctx.beginPath(); ctx.ellipse(x+f*30,y-14+bob,10,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#143a22'; [-18,-4,10,22].forEach(lx=>ctx.fillRect(x+lx,y+10+bob,4,12));
  }
  ctx.restore();
}

return {drawMonster, drawPlayer, lighten, darken, drawGround, withAlpha, drawProp, drawMount};
})();

window.WOLCloud = (function(){
  const C = {
    get on(){ return !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY); },

    _u(path){ return window.SUPABASE_URL.replace(/\/$/,'') + '/rest/v1/' + path; },

    // ── ACCOUNTS ──
    // Register: insert a row in wol_accounts (username unique). pwHash is the local hash.
    async register(username, pwHash){
      if(!this.on) return {ok:false, reason:'cloud-off'};
      try{
        const r = await fetch(this._u('wol_accounts'), {method:'POST', headers:{...this._h(),'Prefer':'return=representation'},
          body: JSON.stringify({username, pw_hash:pwHash, characters:[null,null,null,null], is_admin:false, banned:false})});
        if(r.status===409) return {ok:false, reason:'שם המשתמש כבר תפוס'};

      if(!this.on) return {ok:false, reason:'cloud-off'};
      try{
        const r = await fetch(this._u('wol_accounts?username=eq.'+encodeURIComponent(username)+'&select=*'), {headers:this._h()});
        const rows = await r.json();
        if(!rows.length) return {ok:false, reason:'שם משתמש לא קיים'};
        const a = rows[0];
        if(a.pw_hash !== pwHash) return {ok:false, reason:'סיסמה שגויה'};

        await fetch(this._u('wol_accounts?username=eq.'+encodeURIComponent(username)), {method:'PATCH', headers:this._h(),

window.WOLNet = (function(){
  const Net = {
    ws:null, id:null, connected:false, peers:new Map(), profile:null,
    onChat:null, onPvp:null, onParty:null, party:null,
    _lastSent:0, _reconnectT:null,
    connect(profile){
      this.profile=profile;
      if(!window.WOL_SERVER_URL){ return; } // offline mode
      try{ this.ws=new WebSocket(window.WOL_SERVER_URL); }catch(e){ return; }
      this.ws.onopen=()=>{ this.connected=true; this.send('join',this.profile); };
      this.ws.onclose=()=>{ this.connected=false; this.peers.clear(); clearTimeout(this._reconnectT); this._reconnectT=setTimeout(()=>this.connect(this.profile),3000); };
      this.ws.onerror=()=>{};
      this.ws.onmessage=(ev)=>{ let m; try{m=JSON.parse(ev.data);}catch{return;} this.handle(m); };
    },
    handle(m){
      switch(m.type){
        case 'welcome': this.id=m.id; break;
        case 'peers': this.peers.clear(); (m.peers||[]).forEach(p=>this.peers.set(p.id,p)); break;
        case 'playerJoined': if(m.player&&m.player.id!==this.id) this.peers.set(m.player.id,m.player); break;
        case 'playerLeft': this.peers.delete(m.id); break;
        case 'peerMove': { const p=this.peers.get(m.id); if(p){p.x=m.x;p.y=m.y;p.facing=m.facing;p.hp=m.hp;} break; }
        case 'peerHp': { const p=this.peers.get(m.id); if(p){p.hp=m.hp;p.maxHp=m.maxHp;} break; }
        case 'peerStats': { const p=this.peers.get(m.id); if(p){p.level=m.level;p.evoStage=m.evoStage;p.maxHp=m.maxHp;} break; }
        case 'peerParty': { const p=this.peers.get(m.id); if(p){p.partyId=m.partyId;} break; }
        case 'peerDeath': { const p=this.peers.get(m.id); if(p){p.hp=0;p._dead=true; setTimeout(()=>{if(p)p._dead=false;},3000);} break; }
        case 'chat': if(this.onChat) this.onChat(m.from,m.text,{sys:m.sys,level:m.level,fromId:m.fromId,me:m.fromId===this.id}); break;
        case 'pvpHurt': case 'pvpKill': if(this.onPvp) this.onPvp(m.type,m); break;
        case 'partyUpdate': this.party=m; if(this.onParty) this.onParty(m); break;
        case 'partyInvited': if(this.onParty) this.onParty(m); break;
        // ── Shared monsters (server-owned, fought together) ──
        case 'monstersSpawn': if(this.onMonsters) this.onMonsters('spawn', m); break;
        case 'monstersSync':  if(this.onMonsters) this.onMonsters('sync', m); break;
        case 'monsterHp':     if(this.onMonsters) this.onMonsters('hp', m); break;
        case 'monsterDead':   if(this.onMonsters) this.onMonsters('dead', m); break;
        case 'partyXp':       if(this.onPartyXp) this.onPartyXp(m); break;
        case 'worldBossSpawn': if(this.onBoss) this.onBoss('spawn', m); break;
        case 'worldBossHp':    if(this.onBoss) this.onBoss('hp', m); break;
        case 'worldBossDead':  if(this.onBoss) this.onBoss('dead', m); break;
        case 'worldBossGone':  if(this.onBoss) this.onBoss('gone', m); break;
        case 'worldBossReward':if(this.onBoss) this.onBoss('reward', m); break;
        case 'peerAction': if(m.id!==this.id && this.onPeerAction) this.onPeerAction(m); break;
        case 'charState': if(this.onCharState) this.onCharState(m); break;
        case 'kicked': if(this.onKicked) this.onKicked(m); this.connected=false; break;
      }
    },
    send(type,data){ if(this.ws&&this.ws.readyState===1) this.ws.send(JSON.stringify({type,...data})); },
    move(x,y,facing,hp){ const n=Date.now(); if(n-this._lastSent<80)return; this._lastSent=n; this.send('move',{x:Math.round(x),y:Math.round(y),facing,hp:Math.round(hp)}); },
    changeWorld(world,x,y,tier){ this.send('changeWorld',{world,x,y,worldTier:tier||1}); if(this.profile)this.profile.world=world; this.peers.clear(); },
    chat(text){ this.send('chat',{text}); },
    updateStats(level,evoStage,maxHp){ this.send('stats',{level,evoStage,maxHp}); },
    pvpHit(targetId,damage,kx,ky){ this.send('pvpHit',{targetId,damage,knockX:kx||0,knockY:ky||0}); },
    reportHp(hp){ this.send('pvpHp',{hp:Math.round(hp)}); },
    reportDeath(killerId){ this.send('pvpDeath',{killerId}); },
    monsterHit(mid,damage){ this.send('monsterHit',{mid,damage:Math.round(damage)}); },
    monsterMove(mid,x,y){ this.send('monsterMove',{mid,x:Math.round(x),y:Math.round(y)}); },
    worldBossHit(bid,damage){ this.send('worldBossHit',{bid,damage:Math.round(damage)}); },
    action(kind,facing,color){ this.send('peerAction',{kind,facing,color}); },
    partyCreate(){ this.send('partyCreate',{}); },
    partyInvite(targetId){ this.send('partyInvite',{targetId}); },
    partyJoin(partyId){ this.send('partyJoin',{partyId}); },
    partyLeave(){ this.send('partyLeave',{}); },
    isOnline(){ return this.connected; },
  };
  return Net;
})();
