            <div className="bar"><div className="barf xp-f" style={{width:(p.level>=250?100:(p.xp/xpNeed*100))+'%'}}></div></div>
          </div>
        </div>
        {/* Quick-use potions */}
        <div className="quick-pots">
          {['hp_pot_s','hp_pot_m','hp_pot_l','mp_pot_s','mp_pot_m','mp_pot_l'].map(pid=>{
            const c = D.CONSUMABLES.find(x=>x.id===pid);
            const cnt = (p.consumables&&p.consumables[pid])||0;
            const isHp = pid.startsWith('hp');
            return (
              <div key={pid}
                className={`qpot ${isHp?'hp-pot':'mp-pot'}${cnt===0?' empty':''}`}
                title={c?c.desc:''}
                onClick={()=>{ if(G.running) useConsumable(pid); }}>
                <span className="qp-emj">{c?c.emoji:'?'}</span>
                <span className="qp-cnt">×{cnt}</span>
              </div>
            );
          })}
        </div>
        {p.statPoints>0 &&
          <button className="statpts-btn" onClick={()=>{G.running&&setModal('stats');}}>
            ⬆️ {p.statPoints} נקודות לשדרוג!
          </button>}
      </div>

      {/* TOP RIGHT: gold + minimap */}
      <div className="hud hud-tr">
        <div className="gold-disp">🪙 {p.gold}</div>
        {(()=>{ const readyCount=(D.QUESTS||[]).filter(q=>{ const qs=p.quests&&p.quests[q.id]; return qs&&qs.done&&!qs.claimed; }).length; return readyCount>0 ? <button className="mini-btn" style={{background:'linear-gradient(135deg,#2a6a3a,#33a04a)',borderColor:'#5aff8a',animation:'ptsPulse 1.5s infinite',pointerEvents:'all'}} onClick={()=>setModal('quests')}>✅ {readyCount} משימות מוכנות!</button> : <button className="mini-btn" style={{pointerEvents:'all'}} onClick={()=>setModal('quests')}>📋 משימות</button>; })()}
        <div className="minimap" onClick={()=>setModal('worldmap')}>
          <div className="minimap-lbl">🗺️ מפת עולמות</div>
          <canvas ref={minimapRef} width={110} height={110} style={{borderRadius:4,display:'block'}}></canvas>
        </div>
      </div>

      {/* ACTIVE BUFFS */}
      {(G.buffEnd>Date.now()||G.shieldEnd>Date.now()||(G.spdBuffEnd&&G.spdBuffEnd>Date.now())) && (
        <div style={{position:'absolute',top:130,left:8,display:'flex',gap:5,zIndex:41,pointerEvents:'none'}}>
          {G.buffEnd>Date.now()&&<div style={{background:'rgba(0,0,0,0.7)',border:'1px solid #ff8800',borderRadius:6,padding:'2px 6px',fontSize:'0.55rem',color:'#ff8800'}}>🔥ATK+{Math.round((G.buffAtk||0)*100)}% {Math.ceil((G.buffEnd-Date.now())/1000)}s</div>}
          {G.shieldEnd>Date.now()&&<div style={{background:'rgba(0,0,0,0.7)',border:'1px solid #4af',borderRadius:6,padding:'2px 6px',fontSize:'0.55rem',color:'#4af'}}>🛡️ {Math.ceil((G.shieldEnd-Date.now())/1000)}s</div>}
          {G.spdBuffEnd>Date.now()&&<div style={{background:'rgba(0,0,0,0.7)',border:'1px solid #afa',borderRadius:6,padding:'2px 6px',fontSize:'0.55rem',color:'#afa'}}>💨SPD+{Math.round((G.spdBuff||0)*100)}% {Math.ceil((G.spdBuffEnd-Date.now())/1000)}s</div>}
        </div>
      )}

      {/* BOSS BAR */}
      {G.nearBoss &&
        <div className="boss-bar">
          <div className="boss-name">{G.nearBoss.base.name} • Lv{G.nearBoss.lv}</div>
          <div className="boss-track"><div className="boss-f" style={{width:(G.nearBoss.hp/G.nearBoss.maxHp*100)+'%'}}></div></div>
        </div>}

      {/* COMBAT LOG */}
      <div className="clog">
        {G.log.slice(-7).map((l,i)=><div key={i} className={l.cls}>{l.msg}</div>)}
      </div>

      {/* TOP MENU BUTTONS */}
      <div className="btm">
        <div className="btn-bar">
          <button className="mini-btn" onClick={()=>setModal('inventory')}>🎒 תיק</button>
          <button className="mini-btn" onClick={()=>setModal('equip')}>🛡️ ציוד</button>
          <button className="mini-btn" onClick={()=>setModal('stats')}>📊 סטטוס</button>
          <button className="mini-btn" onClick={()=>setModal('shopSkill')}>📖 מתקפות</button>
          <button className="mini-btn" onClick={()=>setModal('shopGear')}>🏪 חנות</button>
          <button className="mini-btn" onClick={()=>setModal('chat')}>💬 צ׳אט</button>
          <button className="mini-btn" onClick={()=>setModal('pvp')}>⚔️ PvP</button>
          <button className="mini-btn" onClick={()=>setModal('party')}>👥 קבוצה</button>
          <button className="mini-btn" onClick={()=>setModal('achievements')}>🏆 הישגים</button>
          <button className="mini-btn" onClick={()=>setModal('leaderboard')}>📊 דירוג</button>
          <button className="mini-btn" onClick={()=>setModal('daily')}>🎁 יומי</button>
          {p.evoReady && <button className="mini-btn" style={{borderColor:'#ffd24a',color:'#ffd24a',animation:'ptsPulse 1.5s infinite'}} onClick={()=>setModal('evolution')}>⚡ התפתחות!</button>}
          {G.worldDef && G.worldDef.town && <button className="mini-btn" style={{borderColor:'#ff99cc',color:'#ff99cc'}} onClick={()=>setModal('pets')}>🐾 חיות</button>}
          <button className="mini-btn" onClick={()=>teleport('town')}>🏰 עיר</button>
          <button className="mini-btn" style={p.activeMount?{borderColor:'#5aff8a',color:'#5aff8a'}:{}} onClick={()=>{
            if(p.activeMount){ p.activeMount=null; showToast('ירדת מהרכיבה','#9a8aa8'); }
            else if(p.mounts && p.mounts.length){ p.activeMount=p.mounts[p.mounts.length-1]; showToast(`🐎 רכבת על ${D.MOUNTS[p.activeMount].name}`,'#5aff8a'); }
            else showToast('אין לך חיית רכיבה','#ff5a5a');
            rerender();
          }}>{p.activeMount?'🛑 רד':'🐎 רכב'}</button>
          {G.worldDef && G.worldDef.town && <button className="mini-btn" style={{borderColor:'#88ddff',color:'#88ddff'}} onClick={()=>setModal('stable')}>🐎 אורווה</button>}
          {G.worldDef && G.worldDef.town && <button className="mini-btn" style={{borderColor:'#ffaa3a',color:'#ffaa3a'}} onClick={()=>setModal('blacksmith')}>🔨 נפח</button>}
          {G.worldDef && G.worldDef.town && <button className="mini-btn" style={{borderColor:'#ff66ff',color:'#ff66ff'}} onClick={()=>setModal('dungeon')}>🔨 מבוך</button>}
          {(()=>{
            const readyQ=(D.QUESTS||[]).filter(q=>{const qs=p.quests&&p.quests[q.id];return qs&&qs.done&&!qs.claimed;}).length;
            return <button className="mini-btn" style={readyQ>0?{borderColor:'#5aff8a',color:'#5aff8a',animation:'ptsPulse 1.5s infinite'}:{}} onClick={()=>setModal('quests')}>{readyQ>0?`✅ ${readyQ}`:'📋'} משימות</button>;
          })()}
          {p.gm && <button className="mini-btn" style={{borderColor:'#c0392b',color:'#ff7a6a'}} onClick={()=>setModal('gm')}>🛡️ GM</button>}
        </div>
      </div>

      {/* JOYSTICK */}
      <div className="joy-base" ref={joyRef}
        onTouchStart={onJoyStart} onTouchMove={onJoyMove} onTouchEnd={onJoyEnd} onTouchCancel={onJoyEnd}
        onMouseDown={onJoyStart}>
        <div className="joy-stick"></div>
      </div>

      {/* ATTACK + SKILLS */}
      <div className="atk-zone">
        <div className="skill-ring">
          {activeSkills().map((sid,i)=>{
            const sk = D.SKILLS[sid];
            const cd = G.skillCd[sid]||0;
            const rem = Math.max(0, cd-Date.now());
            return (
              <div key={sid} className="skill-btn" style={{borderColor:rem>0?'#444':sk.color}}
                onTouchStart={e=>{e.preventDefault();useSkill(sid);}}
                onMouseDown={e=>{e.preventDefault();useSkill(sid);}}>
                {sk.emoji}
                {rem>0 && <div className="skill-cd">{(rem/1000).toFixed(1)}</div>}
              </div>
            );
          })}
        </div>
        <div className="atk-main"
          onTouchStart={e=>{e.preventDefault();G.atkHeld=true;doBasicAttack();}}
          onTouchEnd={e=>{e.preventDefault();G.atkHeld=false;}}
          onMouseDown={e=>{e.preventDefault();G.atkHeld=true;doBasicAttack();}}
          onMouseUp={()=>G.atkHeld=false}>
          ⚔️
        </div>
      </div>

      {/* COMBO QUEST PROMPT (level 30) */}
      {comboPrompt && (
        <div style={{position:'absolute',inset:0,zIndex:95,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)'}}
          onClick={()=>setComboPrompt(false)}>
          <div style={{background:'linear-gradient(160deg,#2a1838,#1a0e26)',border:'2px solid #ffaa3a',borderRadius:16,padding:'24px 22px',maxWidth:340,margin:16,textAlign:'center',boxShadow:'0 0 40px rgba(255,140,40,0.4)'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'2.4rem',marginBottom:6}}>🔥</div>
            <div style={{fontFamily:"'Cinzel Decorative',serif",fontWeight:900,fontSize:'1.3rem',color:'#ffaa3a',marginBottom:10}}>אמנות הקומבו</div>
            <div style={{fontSize:'0.85rem',color:'#e8dcc8',lineHeight:1.6,marginBottom:18}}>
              הגעת לרמה 30! פתחת גישה ל<b style={{color:'#ffcc66'}}>מערכת הקומבו</b> — שילוב מיומנויות לרצפים עוצמתיים.<br/><br/>
              כדי ללמוד אותה, השלם משימה: <b style={{color:'#ffcc66'}}>השתמש ב-12 מיומנויות</b> בקרב. רק מי שישלים יוכל לבצע קומבואים.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button className="btn btn-main" onClick={()=>{ G.player.comboQuestActive=true; setComboPrompt(false); showToast('משימת קומבו החלה! השתמש ב-12 מיומנויות','#ffcc66'); }}>⚔️ קבל את המשימה</button>
              <button className="btn" style={{background:'#3a2a4a',fontSize:'0.8rem'}} onClick={()=>{ G.player.comboQuestOffered=false; setComboPrompt(false); }}>אולי מאוחר יותר</button>
            </div>
          </div>
        </div>
      )}

      {/* LEVEL UP FLASH */}
      {lvlupFlash>0 && <div className="lvlup" key={lvlupFlash}>רמה {p.level}!</div>}
      {p.comboUnlocked && (G.comboSeq||[]).length>=1 && Date.now()-(G.comboLast||0)<3000 && <div className="combo-ind">⚡ רצף {G.comboSeq.length}/3{G.comboSeq.length>=3?' 🔥':''}</div>}

      {/* EVOLUTION FLASH */}
      {evoFlash && (
        <div className="evo-overlay" style={{'--evo-c':evoFlash.color}}>
          <div className="evo-rays" style={{'--evo-c':evoFlash.color}}></div>
          {/* Player preview canvas — drawn separately so player is visible during evo */}
          <EvoPlayerPreview classId={p.classId} evoStage={evoFlash.stage} color={evoFlash.color} />
          <div className="evo-label">★ התפתחות {evoFlash.stage===1?'שנייה':'שלישית'} ★</div>
          <div className="evo-name">{evoFlash.name}</div>
          {evoFlash.skill && (
            <div className="evo-skill">
              <span className="evo-skill-emj">{evoFlash.skill.emoji}</span>
              <div className="evo-skill-txt">
                <b>מתקפה חדשה: {evoFlash.skill.name}</b>
                <small>{evoFlash.skill.desc}</small>
              </div>
            </div>
          )}
          <button className="btn btn-main evo-cont" onClick={closeEvoFlash}>המשך ⚔️</button>
        </div>
      )}

      {/* TOAST */}
      {toast && <div className="drop-toast" style={{borderColor:toast.color}} dangerouslySetInnerHTML={{__html:toast.html}}></div>}

      {/* DEATH */}
      {dead &&
        <div className="death">
          <div className="death-t">נפלת בקרב</div>
          <p style={{color:'#dim',fontSize:'0.8rem'}}>איבדת 10% מהזהב</p>
          <button className="btn btn-main" onClick={respawn}>↻ קום לתחייה</button>
          <button className="btn btn-main btn-ghost" onClick={()=>{E.save(p);cloudSync(p);G.running=false;setScreen('title');setDead(false);}}>שמור וצא</button>
        </div>}

      {/* ═══ MODALS ═══ */}
      {modal && <Modals
        modal={modal} setModal={setModal} player={p} cs={cs}
        selItem={selItem} setSelItem={setSelItem}
        equipItem={equipItem} unequip={unequip} sellItem={sellItem}
        allocStat={allocStat} autoFillStats={autoFillStats} buySkill={buySkill} buySet={buySet}
        buyConsumable={buyConsumable} useConsumable={useConsumable}
        teleport={teleport} canEquip={(it)=>E.canEquip(p,it)}
        rerender={rerender} showToast={showToast}
        gm={{giveGold:gmGiveGold, giveXP:gmGiveXP, setLevel:gmSetLevel, spawnItem:gmSpawnItem, fullHeal:gmFullHeal, godMode:gmGodMode, killAll:gmKillAll, unlockWorlds:gmUnlockWorlds, startEvent:gmStartEvent,
          allMaterials:()=>{ const pl=G.player; if(!pl.materials)pl.materials={}; Object.keys(D.MATERIALS).forEach(k=>pl.materials[k]=(pl.materials[k]||0)+50); showToast('🔨 +50 מכל חומר','#ffaa3a'); rerender(); },
          allMounts:()=>{ G.player.mounts=Object.keys(D.MOUNTS); showToast('🐎 כל החיות נפתחו','#5aff8a'); rerender(); },
          dungeonKey:()=>{ G.player.dungeonKey=true; showToast('🗝️ מפתח מבוך','#ff66ff'); rerender(); },
          speed:()=>{ G.gmSpeed=!G.gmSpeed; G.spdBuff=G.gmSpeed?2:0; G.spdBuffEnd=G.gmSpeed?Date.now()+9e8:0; showToast(`💨 מהירות-על ${G.gmSpeed?'🟢':'🔴'}`,'#88ddff'); rerender(); },
          isOn:()=>({god:G.godMode, dxp:G.doubleXp, speed:G.gmSpeed})}} />}
    </div>
  );
}

// ════════════════════════════════════════════════
// MODALS COMPONENT
// ════════════════════════════════════════════════
function Modals(props){
  const {modal, setModal, player:p, cs, selItem, setSelItem, equipItem, unequip, sellItem,
    allocStat, autoFillStats, buySkill, buySet, buyConsumable, useConsumable, teleport, canEquip, showToast} = props;
  const [shopTab, setShopTab] = useState(modal==='shopSkill'?'loadout':'gear');

  const close = ()=>{ setModal(null); setSelItem(null); };

  const ItemDetail = ({item, where})=>{
    const rar = D.RARITY[item.rarity];
    const chk = canEquip(item);
    const statNames = {str:'STR',agi:'AGI',int:'INT',vit:'VIT',atk:'נזק',matk:'נזק קסם',def:'הגנה',spd:'מהירות',crit:'קריטי'};
    // currently equipped item in the same slot, for comparison
    const equipped = p.equipped[item.slot];
    const isEquipped = equipped && equipped.uid===item.uid;
    // combined stat keys across both items
    const allKeys = Array.from(new Set([
      ...Object.keys(item.stats||{}),
      ...(equipped?Object.keys(equipped.stats||{}):[])
    ]));
    // overall power score for a simple better/worse verdict
    const score = (it)=>{ if(!it) return 0; let s=0; for(const [k,v] of Object.entries(it.stats||{})){ s += (k==='crit'?v*8:k==='spd'?v*4:v); } return s; };
    const myScore = score(item), eqScore = score(equipped);
    const verdict = (!equipped || isEquipped) ? null : (myScore>eqScore ? 'better' : myScore<eqScore ? 'worse' : 'equal');

    return (
      <div className="item-detail" style={{'--rar-color':rar.color}}>
        <div className="id-head">
          <span className="id-emoji">{item.emoji}</span>
          <div style={{flex:1}}>
            <div className="id-name">{item.name}</div>
            <div className="id-rar" style={{color:rar.color}}>{rar.name} • {item.slot} {isEquipped&&'• לבוש כעת'}</div>
          </div>
          {verdict && <span className={'verdict v-'+verdict}>
            {verdict==='better'?'▲ שדרוג':verdict==='worse'?'▼ חלש יותר':'= שווה'}
          </span>}
        </div>
        <div className={'id-req '+(p.level>=item.reqLv?'met':'unmet')}>
          {p.level>=item.reqLv?'✓':'✗'} רמה {item.reqLv}
        </div>
        {Object.entries(item.reqStat||{}).map(([k,v])=>(
          <div key={k} className={'id-req '+((p.stats[k]||0)>=v?'met':'unmet')}>
            {(p.stats[k]||0)>=v?'✓':'✗'} {statNames[k]} {v} <span style={{color:'#666'}}>(יש לך {p.stats[k]||0})</span>
          </div>
        ))}
        <div className="divider"></div>
        {/* stats with comparison deltas vs equipped */}
        {allKeys.map(k=>{
          const mine = (item.stats&&item.stats[k])||0;
          const theirs = (equipped&&equipped.stats&&equipped.stats[k])||0;
          const delta = mine - theirs;
          const showDelta = equipped && !isEquipped && where==='inv';
          return (
            <div key={k} className="id-stat" style={{display:'flex',justifyContent:'space-between'}}>
              <span>{statNames[k]||k}: <b>{mine>0?'+'+mine:mine}</b></span>
              {showDelta && delta!==0 &&
                <span style={{color:delta>0?'#5aff8a':'#ff6a6a',fontWeight:700,fontSize:'0.66rem'}}>
                  {delta>0?'▲ +'+delta:'▼ '+delta} <span style={{color:'#777',fontWeight:400}}>(לבוש: {theirs})</span>
                </span>}
            </div>
          );
        })}
        {equipped && !isEquipped && where==='inv' &&
          <div style={{fontSize:'0.62rem',color:'#9a8aa8',marginTop:6,paddingTop:6,borderTop:'1px dashed #333'}}>
            משווה מול: {equipped.emoji} {equipped.name}
          </div>}
        <div className="id-actions">
          {where==='inv' && !isEquipped && <button className="id-btn id-equip" disabled={!chk.ok} onClick={()=>equipItem(item)}>
            {chk.ok?'🛡️ לבש':chk.reason}</button>}
          {where==='inv' && isEquipped && <button className="id-btn id-sell" onClick={()=>{unequip(item.slot);setSelItem(null);}}>הסר</button>}
          {where==='inv' && !isEquipped && <button className="id-btn id-sell" onClick={()=>sellItem(item)}>💰 מכור {item.sellPrice}</button>}
        </div>
      </div>
    );
  };

  let title='', body=null;

  if(modal==='inventory'){
    title='🎒 התיק';
    body = (
      <div>
        {selItem && <ItemDetail item={selItem} where="inv" />}
        <div className="section-h">חפצים ({p.inventory.length}/40)</div>
        {p.inventory.length===0 ? <div className="empty-note">התיק ריק. צא להילחם!</div> :
          <div className="inv-grid">
            {p.inventory.map(it=>(
              <div key={it.uid} className={'inv-cell r-'+it.rarity} onClick={()=>setSelItem(selItem&&selItem.uid===it.uid?null:it)}>
                <span className="emj">{it.emoji}</span>
                <span className="nm">{it.name}</span>
              </div>
            ))}
          </div>}
        <div className="divider"></div>
        <div className="section-h">🧪 שיקויים</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {D.CONSUMABLES.map(c=>{
            const cnt = p.consumables[c.id]||0;
            if(cnt<=0) return null;
            return <button key={c.id} className="mini-btn" style={{fontSize:'0.8rem',padding:'8px 12px'}}
              onClick={()=>useConsumable(c.id)}>{c.emoji} {c.name} ×{cnt}</button>;
          })}
          {Object.values(p.consumables).every(v=>v<=0) && <div className="empty-note">אין שיקויים. קנה בחנות.</div>}
        </div>
      </div>
    );
  }

  if(modal==='equip'){
    title='🛡️ ציוד לבוש';
    const slots = [['weapon','נשק','⚔️'],['chest','שריון','🛡️'],['helm','קסדה','⛑️'],['boots','מגפיים','🥾'],['ring','טבעת','💍'],['amulet','שרשרת','📿']];
    body = (
      <div>
        <div className="eq-grid">
          {slots.map(([slot,lbl,emj])=>{
            const it = p.equipped[slot];
            return (
              <div key={slot} className="eq-slot" style={it?{borderColor:D.RARITY[it.rarity].color}:{}}
                onClick={()=>it&&unequip(slot)}>
                <span className="se">{it?it.emoji:emj}</span>
                <div>
                  <div className="eq-lbl">{lbl}</div>
                  <div className="eq-nm" style={it?{color:D.RARITY[it.rarity].color}:{color:'#666'}}>{it?it.name:'ריק'}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="divider"></div>
        <div className="section-h">סטטיסטיקות כוללות</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:'0.72rem'}}>
          <div>⚔️ נזק: <b style={{color:'#5aff8a'}}>{cs.atk}</b></div>
          <div>🔮 נזק קסם: <b style={{color:'#5aff8a'}}>{cs.matk}</b></div>
          <div>🛡️ הגנה: <b style={{color:'#5aff8a'}}>{cs.def}</b></div>
          <div>💨 מהירות: <b style={{color:'#5aff8a'}}>{cs.spd}</b></div>
          <div>💥 קריטי: <b style={{color:'#5aff8a'}}>{Math.round(cs.crit*100)}%</b></div>
          <div>❤️ HP: <b style={{color:'#5aff8a'}}>{cs.maxHp}</b></div>
        </div>
      </div>
    );
  }

  if(modal==='stats'){
    title='📊 סטטיסטיקות';
    const statDef = [
      ['str','💪 STR — כוח','נזק התקפה פיזית','#e74c3c'],
      ['agi','🏃 AGI — זריזות','מהירות, קריטי, התחמקות','#27ae60'],
      ['int','🧠 INT — חוכמה','נזק קסם, MP מקסימלי','#3498db'],
      ['vit','❤️ VIT — חיוניות','HP מקסימלי, הגנה','#f39c12'],
    ];
    // ── hold-to-allocate refs ──
    const allocHoldRef = React.useRef(null);
    const startAllocHold = (k, amt) => {
      allocStat(k, amt);
      allocHoldRef.current = setTimeout(()=>{
        allocHoldRef.current = setInterval(()=>allocStat(k, amt), 80);
      }, 400);
    };
    const stopAllocHold = () => {
      if(allocHoldRef.current){ clearTimeout(allocHoldRef.current); clearInterval(allocHoldRef.current); allocHoldRef.current=null; }
    };

    body = (
      <div className="stat-alloc">
        <div className="alloc-pts">{p.statPoints>0?`⬆️ ${p.statPoints} נקודות זמינות`:'אין נקודות פנויות'}</div>
        {p.statPoints>0 && (
          <button className="btn btn-main" style={{width:'100%',marginBottom:8,background:'linear-gradient(135deg,#b8860b,#e0a030)',borderColor:'#ffd24a'}}
            onClick={()=>{ if(window.confirm('למלא אוטומטית את כל הנקודות לפי ה-build המומלץ למחלקה שלך, כדי להיות חזק יותר?')) autoFillStats(); }}>
            ⭐ מילוי מומלץ אוטומטי
          </button>
        )}
        <div style={{fontSize:'0.58rem',color:'#6a5a7a',textAlign:'center',marginBottom:4}}>לחץ לנקודה אחת • לחץ-לחוץ לנקודות מהיר • +5 / +10 לפיל מהיר</div>
        {statDef.map(([k,nm,sub,col])=>(
          <div className="stat-line" key={k}>
            <span className="stat-icon">{nm.split(' ')[0]}</span>
            <div className="stat-info">
              <div className="stat-nm" style={{color:col}}>{nm.replace(/^\S+\s/,'')}</div>
              <div className="stat-sub">{sub}</div>
            </div>
            <span className="stat-val" style={{color:col}}>{p.stats[k]}</span>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              {p.statPoints>=10 && <button className="stat-plus" style={{fontSize:'0.6rem',width:'auto',padding:'0 6px',background:'linear-gradient(135deg,#1a4a8a,#2060b0)',borderColor:'#4a9aff'}} disabled={p.statPoints<10} onClick={()=>allocStat(k,10)}>+10</button>}
              {p.statPoints>=5  && <button className="stat-plus" style={{fontSize:'0.6rem',width:'auto',padding:'0 6px',background:'linear-gradient(135deg,#2a5a4a,#306050)',borderColor:'#4aff9a'}} disabled={p.statPoints<5}  onClick={()=>allocStat(k,5)}>+5</button>}
              <button className="stat-plus" disabled={p.statPoints<=0}
                onClick={()=>allocStat(k,1)}
                onMouseDown={()=>startAllocHold(k,1)} onMouseUp={stopAllocHold} onMouseLeave={stopAllocHold}
                onTouchStart={(e)=>{e.preventDefault();startAllocHold(k,1);}} onTouchEnd={stopAllocHold}>+</button>
            </div>
          </div>
        ))}
        <div className="divider"></div>
        <div style={{fontSize:'0.7rem',color:'#9a8aa8',lineHeight:1.6}}>
          רמה {p.level} • הריגות: {p.kills} • זהב: {p.gold}🪙
        </div>
      </div>
    );
  }

  if(modal==='quests'){
    title='📋 משימות';
    const claimQuest = (q)=>{
      if(!p.quests) p.quests={};
      if(!p.quests[q.id] || !p.quests[q.id].done || p.quests[q.id].claimed) return;
      p.quests[q.id].claimed = true;
      p.xp += (q.reward.xp||0);
      p.gold += (q.reward.gold||0);
      if(q.reward.statpts){ p.statPoints = (p.statPoints||0) + q.reward.statpts; }
      if(q.reward.item){ try{ const it=window.ENGINE.genItem(p.level,'epic',1.5); p.inventory.push(it); showToast(`${it.emoji} ${it.name}`,D.RARITY[it.rarity].color); }catch(e){} }
      showToast(`✅ ${q.name} הושלמה! +${q.reward.xp||0}XP +${q.reward.gold||0}🪙`, '#5aff8a');
      rerender();
    };
    const allQ = (D.QUESTS||[]);
    const active = allQ.filter(q=>(q.reqLv||1)<=p.level);
    const locked = allQ.filter(q=>(q.reqLv||1)>p.level).slice(0,8);
    body = (
      <div className="quest-list">
        {active.length===0 && <div style={{color:'var(--dim)',textAlign:'center',padding:'20px'}}>אין משימות זמינות עדיין</div>}
        {active.map(q=>{
          const qs = p.quests&&p.quests[q.id];
          const prog = qs ? qs.progress||0 : 0;
          const done = qs && qs.done;
          const claimed = qs && qs.claimed;
          const pct = Math.min(100, Math.round(prog/q.count*100));
          return (
            <div key={q.id} className={`quest-item${done?' done':''}${claimed?' claimed':''}`}>
              <span className="quest-emj">{q.emoji}</span>
              <div className="quest-info">
                <div className="quest-name">{q.name}</div>
                <div className="quest-desc">{q.desc}</div>
                <div className="quest-prog"><div className="quest-prog-f" style={{width:pct+'%'}}></div></div>
                <div className="quest-prog-txt">{prog}/{q.count} {done&&!claimed?'✅ מוכן לגביה':claimed?'✔ נגבה':''}</div>
                <div className="quest-reward">🏆 {q.reward.xp?'+'+q.reward.xp+'XP ':''}{q.reward.gold?'+'+q.reward.gold+'🪙 ':''}{q.reward.statpts?'+'+q.reward.statpts+' נקודות ':''}{q.reward.item?'+ חפץ אפי ':''}</div>
              </div>
              {done && !claimed && <button className="quest-claim" onClick={()=>claimQuest(q)}>גבה!</button>}
            </div>
          );
        })}
        {locked.length>0 && <div style={{color:'var(--dim)',fontSize:'0.65rem',margin:'8px 0 2px'}}>🔒 נעול (רמה נדרשת):</div>}
        {locked.map(q=>(<div key={q.id} className="quest-locked">Lv{q.reqLv} — {q.emoji} {q.name}: {q.desc}</div>))}
      </div>
    );
  }

  if(modal==='shopSkill'){
    title='📖 מתקפות';
    const avail = Object.entries(D.SKILLS).filter(([id,sk])=>(sk.cls===p.classId||sk.cls==='all') && sk.price>0);
    const owned = p.skills.map(id=>[id, D.SKILLS[id]]);
    if(!p.loadout) p.loadout = p.skills.slice(0,8);
    const inLoadout = (id)=>p.loadout.includes(id);
    const toggleLoadout = (id)=>{
      if(inLoadout(id)){ p.loadout = p.loadout.filter(x=>x!==id); }
      else { if(p.loadout.length>=8){ showToast('מקסימום 8 מתקפות פעילות', '#ff5a5a'); return; } p.loadout = [...p.loadout, id]; }
      setShopTab('loadout'); // keep tab
      // force update via parent
      props.rerender && props.rerender();
    };
    body = (
      <div>
        <div className="modal-tabs" style={{padding:'0 0 8px'}}>
          <div className={'tab'+(shopTab==='loadout'?' active':'')} onClick={()=>setShopTab('loadout')}>⚡ מתקפות פעילות</div>
          <div className={'tab'+(shopTab==='shop'?' active':shopTab==='gear'?' active':'')} onClick={()=>setShopTab('shop')}>🛒 חנות</div>
        </div>

        {(shopTab==='loadout') && <div>
          <div style={{fontSize:'0.68rem',color:'#9a8aa8',margin:'8px 0'}}>
            בחר עד 4 מתקפות שיופיעו על המסך ({p.loadout.length}/4). לחץ על מתקפה כדי להוסיף/להסיר.
          </div>
          {/* active slots preview */}
          <div className="loadout-row">
            {[0,1,2,3].map(i=>{
              const id=p.loadout[i]; const sk=id&&D.SKILLS[id];
              return <div key={i} className="loadout-slot" style={sk?{borderColor:sk.color}:{}}>
                <span className="ls-num">{i+1}</span>
                {sk? <span className="ls-emoji">{sk.emoji}</span> : <span className="ls-empty">+</span>}
              </div>;
            })}
          </div>
          <div className="divider"></div>
          <div className="section-h">המתקפות שלך ({owned.length})</div>
          {owned.map(([id,sk])=>{
            const active=inLoadout(id);
            return (
              <div className="shop-item" key={id} style={{borderColor:active?sk.color:'#2a1e38',background:active?sk.color+'1a':'#0c0712'}}
                onClick={()=>toggleLoadout(id)}>
                <span className="shop-emoji">{sk.emoji}</span>
                <div className="shop-info">
                  <div className="shop-nm" style={{color:sk.color}}>{sk.name}</div>
                  <div className="shop-desc">{sk.desc} • נזק ×{sk.dmg||'—'} • MP {sk.mp}</div>
                </div>
                <span style={{fontSize:'0.7rem',fontWeight:700,color:active?'#5aff8a':'#9a8aa8',whiteSpace:'nowrap'}}>
                  {active?'✓ פעיל':'+ הוסף'}
                </span>
              </div>
            );
          })}
        </div>}

        {(shopTab==='shop'||shopTab==='gear') && <div>
          <div style={{fontSize:'0.7rem',color:'#9a8aa8',margin:'8px 0'}}>🪙 זהב: {p.gold} • רכוש מתקפות חדשות</div>
          {avail.map(([id,sk])=>{
            const own = p.skills.includes(id);
            const canBuy = !own && p.level>=sk.reqLv && p.gold>=sk.price;
            return (
              <div className="shop-item" key={id} style={{borderColor:sk.color+'66'}}>
                <span className="shop-emoji">{sk.emoji}</span>
                <div className="shop-info">
                  <div className="shop-nm" style={{color:sk.color}}>{sk.name} {sk.cls==='all'&&'🌐'}</div>
                  <div className="shop-desc">{sk.desc} • רמה {sk.reqLv} • נזק ×{sk.dmg||'—'}</div>
                </div>
                {own ? <span style={{color:'#5aff8a',fontSize:'0.7rem',fontWeight:700}}>✓ בבעלותך</span> :
                  <button className="shop-buy" disabled={!canBuy} onClick={()=>buySkill(id)}>
                    <span>🪙{sk.price}</span>
                    {p.level<sk.reqLv && <small style={{color:'#ff8888'}}>רמה {sk.reqLv}</small>}
                  </button>}
              </div>
            );
          })}
        </div>}
      </div>
    );
  }

  if(modal==='shopGear'){
    title='🏪 חנות הציוד';
    body = (
      <div>
        <div className="modal-tabs" style={{padding:'0 0 8px'}}>
          <div className={'tab'+(shopTab==='gear'?' active':'')} onClick={()=>setShopTab('gear')}>⚔️ סטים ונשקים</div>
          <div className={'tab'+(shopTab==='pots'?' active':'')} onClick={()=>setShopTab('pots')}>🧪 שיקויים</div>
        </div>
        <div style={{fontSize:'0.7rem',color:'#9a8aa8',margin:'8px 0'}}>🪙 זהב: {p.gold}</div>
        {shopTab==='gear' && D.SHOP_SETS.map(set=>{
          const canBuy = p.level>=set.reqLv && p.gold>=set.price;
          const rar = D.RARITY[set.rarity];
          return (
            <div className="shop-item" key={set.id} style={{borderColor:rar.color}}>
              <span className="shop-emoji">{set.emoji}</span>
              <div className="shop-info">
                <div className="shop-nm" style={{color:rar.color}}>{set.name}</div>
                <div className="shop-desc">{set.pieces.length} חלקים • {rar.name} • רמה {set.reqLv}</div>
              </div>
              <button className="shop-buy" disabled={!canBuy} onClick={()=>buySet(set)}>
                <span>🪙{set.price}</span>
                {p.level<set.reqLv && <small style={{color:'#ff8888'}}>רמה {set.reqLv}</small>}
              </button>
            </div>
          );
        })}
        {shopTab==='pots' && D.CONSUMABLES.filter(c=>!c.reqLv||p.level>=c.reqLv).map(c=>(
          <div className="shop-item" key={c.id}>
            <span className="shop-emoji">{c.emoji}</span>
            <div className="shop-info">
              <div className="shop-nm">{c.name}</div>
              <div className="shop-desc">{c.desc} • יש לך: {p.consumables[c.id]||0}</div>
            </div>
            <button className="shop-buy" disabled={p.gold<c.price} onClick={()=>buyConsumable(c)}>🪙{c.price}</button>
          </div>
        ))}
      </div>
    );
  }

  if(modal==='worldmap'){
    title='🗺️ עולמות';
    body = (
      <div>
        <div style={{fontSize:'0.7rem',color:'#9a8aa8',marginBottom:10}}>השתגר לעולמות חדשים. כל עולם דורש רמה מינימלית.</div>
        {D.WORLDS.filter(w=>!w.town && !w.pvp && !w.dungeon).map(w=>{
          const unlocked = p.level>=w.reqLv;
          const current = p.world===w.id;
          const isHere = G.worldDef&&G.worldDef.id===w.id;
          const sizeKm = Math.round((w.ww||4800)/1000*10)/10;
          const xpBonus = w.xpMul > 1 ? `+${Math.round((w.xpMul-1)*100)}% XP` : 'XP ×1';
          return (
            <div key={w.id} className={'world-item'+(unlocked?'':' locked')+(current||isHere?' current':'')}
              onClick={()=>{ if(unlocked&&!isHere) teleport(w.id); }}>
              <span className="world-emoji">{w.emoji}</span>
              <div className="world-info">
                <div className="world-nm" style={{color:isHere?'#5aff8a':unlocked?'inherit':'#6a5a7a'}}>{w.name} {isHere&&'◀'}</div>
                <div className="world-lv">מפלצות {w.monLv[0]}-{w.monLv[1]} • מינ׳ {w.reqLv} • 🗺 {sizeKm}km² • <span style={{color:'#ffd24a'}}>{xpBonus}</span></div>
                {w.desc&&<div style={{fontSize:'0.55rem',color:'#8a7a9a',marginTop:1}}>{w.desc}</div>}
              </div>
              {isHere ? <span className="world-go">📍 כאן</span> :
                unlocked ? <span className="world-go">🌀 נסע</span> :
                <span className="world-lock">🔒 {w.reqLv}</span>}
            </div>
          );
        })}
      </div>
    );
  }

  if(modal==='gm'){
    title='🛡️ פאנל GM';
    const gm = props.gm;
    const states = gm.isOn();
    body = (
      <div className="gm-body">
        <div className="gm-sec">⚡ מהיר</div>
        <div className="gm-grid">
          <button className="gm-btn" onClick={()=>gm.fullHeal()}>❤️ ריפוי מלא</button>
          <button className="gm-btn" onClick={()=>{gm.godMode();}} style={states.god?{borderColor:'#5aff8a',color:'#5aff8a'}:{}}>🛡️ אלמוות {states.god?'🟢':''}</button>
          <button className="gm-btn" onClick={()=>gm.killAll()}>💥 חסל הכל</button>
          <button className="gm-btn" onClick={()=>gm.unlockWorlds()}>🗺️ פתח עולמות</button>
        </div>

        <div className="gm-sec">💰 משאבים</div>
        <div className="gm-grid">
          <button className="gm-btn" onClick={()=>gm.giveGold(1000)}>+1,000 🪙</button>
          <button className="gm-btn" onClick={()=>gm.giveGold(50000)}>+50,000 🪙</button>
          <button className="gm-btn" onClick={()=>gm.giveGold(1000000)}>+1M 🪙</button>
          <button className="gm-btn" onClick={()=>{ const g=prompt('כמה זהב?','100000'); if(g)gm.giveGold(+g); }}>🎚️ זהב מותאם</button>
          <button className="gm-btn" onClick={()=>gm.giveXP(5000)}>+5,000 XP</button>
          <button className="gm-btn" onClick={()=>gm.giveXP(100000)}>+100K XP</button>
        </div>

        <div className="gm-sec">📊 רמה</div>
        <div className="gm-grid">
          <button className="gm-btn" onClick={()=>gm.setLevel(10)}>רמה 10</button>
          <button className="gm-btn" onClick={()=>gm.setLevel(50)}>רמה 50</button>
          <button className="gm-btn" onClick={()=>gm.setLevel(110)}>רמה 110</button>
          <button className="gm-btn" onClick={()=>gm.setLevel(200)}>רמה 200</button>
          <button className="gm-btn" onClick={()=>gm.setLevel(250)}>רמה 250 (מקס)</button>
          <button className="gm-btn" onClick={()=>{ const lv=prompt('בחר רמה (1-250):','100'); if(lv)gm.setLevel(+lv); }}>🎚️ רמה מותאמת</button>
        </div>

        <div className="gm-sec">💎 יצירת פריטים</div>
        <div className="gm-grid">
          {['rare','epic','legendary','mythic'].map(r=>(
            <button key={r} className="gm-btn" style={{borderColor:D.RARITY[r].color,color:D.RARITY[r].color}} onClick={()=>gm.spawnItem(r)}>
              {D.RARITY[r].name}
            </button>
          ))}
        </div>

        <div className="gm-sec">🔨 חומרים וחיות</div>
        <div className="gm-grid">
          <button className="gm-btn" onClick={()=>gm.allMaterials()}>🔨 +50 חומרים</button>
          <button className="gm-btn" onClick={()=>gm.allMounts()}>🐎 כל החיות</button>
          <button className="gm-btn" onClick={()=>gm.dungeonKey()}>🗝️ מפתח מבוך</button>
          <button className="gm-btn" onClick={()=>gm.speed()} style={states.speed?{borderColor:'#88ddff',color:'#88ddff'}:{}}>💨 מהירות-על {states.speed?'🟢':''}</button>
        </div>

        <div className="gm-sec">🎉 אירועים (פרסים)</div>
        <div className="gm-grid">
          <button className="gm-btn" onClick={()=>{gm.startEvent('boss_rush');close();}}>👑 פלישת בוסים</button>
          <button className="gm-btn" onClick={()=>{gm.startEvent('treasure');close();}}>💎 גשם אוצרות</button>
          <button className="gm-btn" onClick={()=>gm.startEvent('double_xp')} style={states.dxp?{borderColor:'#c77dff',color:'#c77dff'}:{}}>⭐ XP כפול {states.dxp?'🟢':''}</button>
        </div>
      </div>
    );
  }

  if(modal==='chat'){
    title='💬 צ׳אט עולמי';
    body = <ChatPanel player={p} showToast={showToast} />;
  }

  if(modal==='pvp'){
    title='⚔️ זירת PvP';
    body = <PvpPanel player={p} cs={cs} showToast={showToast} rerender={props.rerender} teleport={teleport} setModal={setModal} />;
  }

  if(modal==='blacksmith'){
    title='🔨 הנפח';
    body = <BlacksmithPanel player={p} showToast={showToast} rerender={props.rerender} />;
  }

  if(modal==='dungeon'){
    title='🔨 שומר מבוך הנפחייה';
    body = <DungeonPanel player={p} showToast={showToast} teleport={teleport} setModal={setModal} />;
  }

  if(modal==='stable'){
    title='🐎 האורווה';
    body = <StablePanel player={p} showToast={showToast} rerender={props.rerender} />;
  }

  if(modal==='pets'){
    title='🐾 חיות מחמד';
    body = <PetsPanel player={p} showToast={showToast} rerender={props.rerender} />;
  }

  if(modal==='achievements'){
    title='🏆 הישגים';
    body = <AchievementsPanel player={p} />;
  }

  if(modal==='leaderboard'){
    title='📊 טבלת מובילים';
    body = <LeaderboardPanel player={p} showToast={showToast} rerender={props.rerender} />;
  }

  if(modal==='daily'){
    title='🎁 תגמול יומי';
    body = <DailyPanel player={p} showToast={showToast} rerender={props.rerender} />;
  }

  if(modal==='evolution'){
    title='⚡ דרך ההתפתחות';
    body = <EvolutionPanel player={p} showToast={showToast} rerender={props.rerender} teleport={teleport} setModal={setModal} />;
  }

  if(modal==='party'){
    title='👥 קבוצה';
    body = <PartyPanel player={p} showToast={showToast} />;
  }

  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <span className="modal-title">{title}</span>
          <button className="modal-x" onClick={close}>✕</button>
        </div>
        <div className="modal-body">{body}</div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// PETS — buy & summon combat companions
// ════════════════════════════════════════════════
function PetsPanel({player, showToast, rerender}){
  if(!player.pets) player.pets=[];
  if(!player.petParts) player.petParts={};
  const D=window.GAME_DATA;
  const [,setT]=useState(0); const refresh=()=>setT(n=>n+1);
  const parts = player.petParts;
  const craft=(pet)=>{
    if(player.pets.includes(pet.id)){ showToast('כבר ברשותך','#ff5a5a'); return; }
    // check all parts present
    for(const [pid,need] of Object.entries(pet.parts||{})){
      if((parts[pid]||0) < need){ showToast(`חסר: ${D.PET_PARTS[pid].emoji} ${D.PET_PARTS[pid].name}`,'#ff5a5a'); return; }
    }
    for(const [pid,need] of Object.entries(pet.parts||{})){ parts[pid]-=need; }
    player.pets.push(pet.id);
    showToast(`🐾 יצרת ${pet.name}!`,'#5aff8a'); refresh(); rerender&&rerender();
  };
  const summon=(pet)=>{ player.activePet = player.activePet===pet.id ? null : pet.id; G._pet=null; showToast(player.activePet?`🐾 ${pet.name} זומן!`:'החיה נשלחה הביתה','#5aff8a'); refresh(); rerender&&rerender(); };
  return (
    <div className="bs-panel">
      <div className="bs-guide">🐾 חיות מחמד נלחמות לצידך! הן תוקפות אוטומטית אויבים קרובים בנזק <b>קטן</b> (2%–25% מכוחך) — עזרה, לא תחליף. יוצרים אותן מ<b>חלקים שנופלים מהרצפה</b>.</div>
      {/* parts inventory */}
      <div className="bs-mats">
        {Object.values(D.PET_PARTS).map(pp=>(
          <div key={pp.id} className="bs-mat">
            <span>{pp.emoji}</span><span className="bs-mat-n">{pp.name}</span>
            <span className="bs-mat-c" style={{color:(parts[pp.id]||0)>0?'#5aff8a':'#7a6a8a'}}>{parts[pp.id]||0}</span>
          </div>
        ))}
      </div>
      {/* where-to-find guide */}
      <div style={{fontSize:'0.62rem',color:'#9a8aa8',lineHeight:1.6,background:'#0c0712',borderRadius:8,padding:8,margin:'4px 0'}}>
        <b style={{color:'#88ffcc'}}>📍 איפה משיגים חלקים:</b><br/>
        {Object.values(D.PET_PARTS).map(pp=><span key={pp.id}>{pp.emoji} {pp.name}: {pp.desc}<br/></span>)}
      </div>
      {Object.values(D.PETS).map(pet=>{
        const owned=player.pets.includes(pet.id); const active=player.activePet===pet.id;
        const canCraft = Object.entries(pet.parts||{}).every(([pid,need])=>(parts[pid]||0)>=need);
        return (
          <div key={pet.id} className="bs-recipe" style={{borderColor:active?'#5aff8a':pet.color+'66'}}>
            <div className="bs-r-head"><span className="bs-r-emoji">{pet.emoji}</span>
              <span className="bs-r-name" style={{color:pet.color}}>{pet.name}</span>
              <span style={{marginInlineStart:'auto',fontSize:'0.7rem',color:'#ff9a9a'}}>נזק {Math.round(pet.dmgMul*100)}%</span></div>
            <div className="bs-r-desc">{pet.desc}</div>
            {!owned && (
              <div className="bs-r-cost">
                {Object.entries(pet.parts||{}).map(([pid,need])=>(
                  <span key={pid} style={{marginInlineEnd:8,color:(parts[pid]||0)>=need?'#5aff8a':'#ff9a9a'}}>
                    {D.PET_PARTS[pid].emoji} {parts[pid]||0}/{need}
                  </span>
                ))}
              </div>
            )}
            {owned
              ? <button className="bs-craft" style={{background:active?'#2a6a3a':'#3a5a8a'}} onClick={()=>summon(pet)}>{active?'🏠 שלח הביתה':'🐾 זמן'}</button>
              : <button className="bs-craft" disabled={!canCraft} onClick={()=>craft(pet)}>{canCraft?'🔨 צור חיה':'חסרים חלקים'}</button>}
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════
// LEADERBOARD — ranks all local characters across accounts
// ════════════════════════════════════════════════
function LeaderboardPanel({player, showToast, rerender}){
  const [tab,setTab]=useState('overall'); // overall | weekly | hall
  const [,setT]=useState(0);
  const [cloudData,setCloudData]=useState(null); // {overall:[],weekly:[]} from Supabase
  const [cloudLoading,setCloudLoading]=useState(false);
  const accts = E.loadAccounts();
  const curWeek = Math.floor(Date.now()/(7*24*60*60*1000));
  // ── Fetch the global cloud leaderboard once (if Supabase is configured) ──
  useEffect(()=>{
    if(window.WOLCloud && window.WOLCloud.on && !cloudData && !cloudLoading){
      setCloudLoading(true);
      (async()=>{
        try{
          const [ov,wk] = await Promise.all([
            window.WOLCloud.getLeaderboard('overall'),
            window.WOLCloud.getLeaderboard('weekly'),
          ]);
          setCloudData({overall:ov||[], weekly:wk||[]});
        }catch(e){ setCloudData({overall:[],weekly:[]}); }
        setCloudLoading(false);
      })();
    }
  },[]);
  const isCloud = !!(cloudData);
  // gather characters from LOCAL accounts (fallback / offline)
  let chars=[];
  Object.keys(accts).forEach(u=>{
    const isGM = accts[u].isAdmin;
    const list=(accts[u].characters||[accts[u].player]).filter(Boolean);
    list.forEach((c,slot)=>chars.push({
      name:c.name, level:c.level||1, gold:c.gold||0, kills:c.kills||0,
      weeklyXp:(c.weekId===curWeek? (c.weeklyXp||0):0), account:u, slot, classId:c.classId, gm:isGM,
    }));
  });
  chars = chars.filter(c=>!(c.account===player.account && c.name===player.name));
  chars.push({name:player.name, level:player.level, gold:player.gold, kills:player.kills,
    weeklyXp:(player.weekId===curWeek?(player.weeklyXp||0):0), account:player.account, slot:player.charSlot, classId:player.classId, gm:!!player.gm, me:true});

  // map cloud rows to the same shape
  const mapCloud = rows => (rows||[]).map(r=>({
    name:r.name, level:r.level||1, gold:r.gold||0, kills:r.kills||0, weeklyXp:r.weekly_xp||0,
    account:r.username, classId:r.class_id, gm:!!r.is_gm, me:(r.username===player.account && r.name===player.name),
  }));

  // choose source: cloud if available, else local
  const weekly = isCloud ? mapCloud(cloudData.weekly) : chars.filter(c=>!c.gm).sort((a,b)=> b.weeklyXp-a.weeklyXp);
  const overall = isCloud ? mapCloud(cloudData.overall) : [...chars].sort((a,b)=> b.level-a.level || b.kills-a.kills || b.gold-a.gold);
  const list = tab==='weekly' ? weekly : overall;
  const medal=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;

  // ── Official weekly prize: based on the RESOLVED finished week (pending reward) ──
  const W = E.loadWeekly();
  const pendingMine = W.pending && W.pending.account===player.account;
  const claimPending = ()=>{
    const p = E.claimWeeklyPending(player.account);
    if(!p){ showToast('אין פרס ממתין','#ff5a5a'); return; }
    if(!player.materials) player.materials={};
    const matIds=Object.keys(D.MATERIALS).filter(k=>k!=='forge_crystal');
    const mat = matIds[p.week % matIds.length];
    player.materials[mat] = (player.materials[mat]||0) + 10;
    showToast(`🏆 פרס שחקן השבוע: 10× ${D.MATERIALS[mat].emoji} ${D.MATERIALS[mat].name}!`, '#ffd24a');
    setT(n=>n+1); rerender&&rerender();
  };
  // live current-week leader (informational)
  const winner = weekly[0] && weekly[0].weeklyXp>0 ? weekly[0] : null;

  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:6}}>
        <button className="lb-tab" style={tab==='overall'?{background:'#5a3da0',color:'#fff'}:{}} onClick={()=>setTab('overall')}>👑 כללי</button>
        <button className="lb-tab" style={tab==='weekly'?{background:'#5a3da0',color:'#fff'}:{}} onClick={()=>setTab('weekly')}>📅 שבועי</button>
        <button className="lb-tab" style={tab==='hall'?{background:'#5a3da0',color:'#fff'}:{}} onClick={()=>setTab('hall')}>🏆 היכל</button>
      </div>
      <div style={{textAlign:'center',fontSize:'0.6rem',color:isCloud?'#5aff8a':'#9a8aa8',marginBottom:8}}>
        {cloudLoading ? '☁️ טוען נתונים גלובליים...' : isCloud ? '🟢 דירוג גלובלי (ענן)' : '💾 דירוג מקומי (הפעל ענן לדירוג גלובלי)'}
      </div>
      {tab==='weekly' && (
        <div style={{background:'linear-gradient(160deg,#2a1e08,#1a1204)',border:'1px solid #5a4a18',borderRadius:10,padding:10,marginBottom:10,fontSize:'0.68rem',color:'#e8d0a8',lineHeight:1.5}}>
          🏆 <b>תחרות שחקן השבוע</b> — מי שצובר הכי הרבה XP השבוע מנצח ומקבל <b>10 חומרי יצירה</b>!
          הזוכה מוכרז אוטומטית בתחילת השבוע הבא. (GM לא משתתפים). {winner && <span style={{color:'#ffd24a'}}><br/>מוביל נוכחי: {winner.name} ({winner.weeklyXp.toLocaleString()} XP)</span>}
        </div>
      )}
      {pendingMine && (
        <button className="btn btn-main" style={{width:'100%',marginBottom:10}} onClick={claimPending}>
          🎁 ניצחת! אסוף את פרס שחקן השבוע (10 חומרים)
        </button>
      )}
      {tab==='hall' ? (
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          <div style={{fontSize:'0.7rem',color:'#9a8aa8',textAlign:'center',marginBottom:6}}>אלופי העבר — מנצחי תחרות ה-XP השבועית</div>
          {W.history.length===0 && <div style={{textAlign:'center',color:'#9a8aa8',fontSize:'0.7rem',padding:20}}>עדיין אין אלופים — היה הראשון!</div>}
          {W.history.map((h,i)=>(
            <div key={i} className="bs-recipe" style={{borderColor:i===0?'#ffd24a':'#2a2238',display:'flex',alignItems:'center',gap:10,padding:'8px 12px'}}>
              <span style={{fontSize:'1.1rem'}}>🏆</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:'#ffe0a0',fontSize:'0.82rem'}}>{h.winnerName}</div>
                <div style={{fontSize:'0.6rem',color:'#9a8aa8'}}>{new Date(h.ts).toLocaleDateString('he-IL')}</div>
              </div>
              <div style={{fontWeight:800,color:'#c77dff',fontSize:'0.78rem'}}>{h.xp.toLocaleString()} XP</div>
            </div>
          ))}
        </div>
      ) : (
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {list.slice(0,20).map((c,i)=>(
          <div key={i} className="bs-recipe" style={{borderColor:c.me?'#5aff8a':i<3?'#c9a84a':'#2a2238',display:'flex',alignItems:'center',gap:10,padding:'8px 12px'}}>
            <span style={{fontSize:'1rem',minWidth:28}}>{medal(i)}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:c.me?'#5aff8a':'#ffe0a0',fontSize:'0.82rem'}}>
                {c.name} {c.me&&'(אתה)'} {c.gm&&<span style={{fontSize:'0.55rem',color:'#ff7a6a'}}>GM</span>}
              </div>
              <div style={{fontSize:'0.62rem',color:'#9a8aa8'}}>{(D.CLASSES.find(x=>x.id===c.classId)||{}).name||''} • {c.kills.toLocaleString()} הריגות</div>
            </div>
            <div style={{textAlign:'left'}}>
              {tab==='weekly'
                ? <div style={{fontWeight:800,color:'#c77dff',fontSize:'0.85rem'}}>{c.weeklyXp.toLocaleString()} XP</div>
                : <><div style={{fontWeight:800,color:'#ffd24a',fontSize:'0.85rem'}}>רמה {c.level}</div>
                   <div style={{fontSize:'0.6rem',color:'#c9a84a'}}>{c.gold.toLocaleString()}🪙</div></>}
            </div>
          </div>
        ))}
        {list.length===0 && <div style={{textAlign:'center',color:'#9a8aa8',fontSize:'0.7rem',padding:20}}>אין עדיין נתונים השבוע</div>}
      </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════
// EVOLUTION — quest-gated evolution + branch choice
// ════════════════════════════════════════════════
function EvolutionPanel({player, showToast, rerender, teleport, setModal}){
  const [,setT]=useState(0); const refresh=()=>setT(n=>n+1);
  const D = window.GAME_DATA;
  const evos = D.EVOLUTIONS[player.classId]||[];
  const stage = player.evoStage||0;
  const next = evos[stage];
  if(!next){
    return <div style={{textAlign:'center',padding:20,color:'#ffd24a'}}>🏆 הגעת להתפתחות הסופית! אתה אגדה אמיתית.</div>;
  }
  const reached = player.level >= next.lv;
  const def = D.EVO_QUESTS[next.lv];
  // simple-quest stages (50,110)
  if(def && !def.epic){
    if(!player.evoQuests) player.evoQuests={};
    const allDone = def.quests.every(q=>player.evoQuests[q.id]&&player.evoQuests[q.id].done);
    return (
      <div className="bs-panel">
        <div className="bs-guide">📜 <b>נותן המשימות:</b> כדי להתפתח ל<b>{next.name}</b> (רמה {next.lv}) עליך להוכיח את עצמך. {reached?'השלם את המשימות:':`קודם הגע לרמה ${next.lv}.`}</div>
        {def.quests.map(q=>{
          const qs=player.evoQuests[q.id]||{progress:0,done:false};
          const prog=Math.min(qs.progress||0, q.target);
          return (
            <div key={q.id} className="bs-recipe" style={{borderColor:qs.done?'#5aff8a':'#2a2238'}}>
              <div className="bs-r-head"><span className="bs-r-emoji">{qs.done?'✅':'📜'}</span>
                <span className="bs-r-name" style={{color:qs.done?'#5aff8a':'#e8e0f0'}}>{q.desc}</span></div>
              <div className="bs-r-cost">{prog.toLocaleString()} / {q.target.toLocaleString()}</div>
              <div style={{height:6,background:'#0c0712',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:(prog/q.target*100)+'%',background:qs.done?'#5aff8a':'#c9a84a'}}></div></div>
            </div>
          );
        })}
        {reached && allDone
          ? <button className="btn btn-main" onClick={()=>{ player.evoReady=true; setModal&&setModal(null); showToast('⚡ המשימות הושלמו! ההתפתחות תופעל מיד','#ffd24a'); rerender&&rerender(); }}>⚡ התפתח עכשיו!</button>
          : <div style={{textAlign:'center',color:'#9a8aa8',fontSize:'0.7rem'}}>{reached?'השלם את כל המשימות כדי להתפתח':`דרושה רמה ${next.lv}`}</div>}
      </div>
    );
  }
  // EPIC lv220 chain
  if(def && def.epic){
    const ep = player.epicStage||0;
    const steps = [
      {t:'הבא חפץ אגדי לנביא', d:'מצא חפץ אגדי כלשהו (drop) — הנביא יהפוך אותו למפתח לעולם האבוד'},
      {t:'היכנס לעולם האבוד', d:'השתמש במפתח כדי להיכנס לממד האבוד'},
      {t:'הרוג 100 מפלצות + 6 בוסים', d:'בעולם האבוד — נקה 100 מפלצות ו-6 בוסים מאזורים שונים'},
      {t:'עזור לשחקן חדש לעלות 10 רמות', d:'חזור לעיר — למד שחקן מתחיל (העלה 10 רמות בזמן שאתה בקרבת מקום)'},
    ];
    return (
      <div className="bs-panel">
        <div className="bs-guide">🌌 <b>הנביא:</b> ההתפתחות הסופית ל<b>{next.name}</b> היא המסע הקשה ביותר. {reached?'':'קודם הגע לרמה 220.'}</div>
        {steps.map((s,i)=>(
          <div key={i} className="bs-recipe" style={{borderColor:ep>i?'#5aff8a':ep===i?'#c9a84a':'#2a2238',opacity:ep>=i?1:0.5}}>
            <div className="bs-r-head"><span className="bs-r-emoji">{ep>i?'✅':ep===i?'⚡':'🔒'}</span>
              <span className="bs-r-name">{i+1}. {s.t}</span></div>
            <div className="bs-r-desc">{s.d}</div>
            {reached && ep===i && (
              <button className="bs-craft" onClick={()=>{
                // simulate progression of the epic chain step
                if(i===1){ teleport && teleport('oblivion'); setModal&&setModal(null); }
                player.epicStage = ep+1;
                showToast(`⚡ שלב ${i+1} הושלם!`, '#5aff8a');
                refresh(); rerender&&rerender();
              }}>{i===1?'🌌 היכנס לעולם':'✓ סמן כהושלם'}</button>
            )}
          </div>
        ))}
        {reached && ep>=4 && (
          <div>
            <div className="bs-sec" style={{color:'#ffd24a',textAlign:'center',margin:'8px 0'}}>🎉 בחר את מסלולך הסופי:</div>
            <BranchChoice player={player} showToast={showToast} rerender={rerender} setModal={setModal} />
          </div>
        )}
      </div>
    );
  }
  return null;
}

function BranchChoice({player, showToast, rerender, setModal}){
  const D=window.GAME_DATA;
  const branches = D.EVO_BRANCHES[player.classId]||[];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {branches.map(b=>(
        <div key={b.id} className="bs-recipe" style={{borderColor:b.aura}}>
          <div className="bs-r-head"><span className="bs-r-name" style={{color:b.aura}}>{b.name}</span></div>
          <div className="bs-r-desc">{b.desc} • תואר: "{b.title}"</div>
          <button className="bs-craft" onClick={()=>{
            player.evoBranch=b.id; player.evoReady=true; player.title=b.title;
            showToast(`⚡ בחרת: ${b.name}! ההתפתחות תופעל`,'#ffd24a');
            setModal&&setModal(null); rerender&&rerender();
          }}>בחר מסלול זה</button>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════
// PARTY — create/join groups for co-op & PvP teams
// ════════════════════════════════════════════════
function PartyPanel({player, showToast}){
  const [,setT]=useState(0); const refresh=()=>setT(n=>n+1);
  const [invite,setInvite]=useState(()=>window._partyInvite||null);
  const online = window.WOLNet && window.WOLNet.isOnline();
  useEffect(()=>{
    if(!online) return;
    // subscribe to the always-on party handler's pushes (don't override it)
    window._onPartyPush=(pm)=>{ if(pm.type==='partyInvited'){ setInvite(pm); } refresh(); };
    return ()=>{ window._onPartyPush=null; };
  },[online]);
  if(!online){
    return <div style={{textAlign:'center',padding:20,color:'#9a8aa8',fontSize:'0.8rem',lineHeight:1.6}}>
      👥 קבוצות זמינות במצב מקוון בלבד.<br/>הפעל את שרת המולטיפלייר (ראה מדריך) כדי להתאגד עם שחקנים אחרים,
      להילחם יחד במבוך, ולהגן זה על זה ב-PvP.</div>;
  }
  const party = window.WOLNet.party;
  const peers = [...window.WOLNet.peers.values()];
  return (
    <div className="bs-panel">
      {invite && (
        <div className="bs-recipe" style={{borderColor:'#5aff8a'}}>
          <div className="bs-r-desc">📨 {invite.fromName} הזמין אותך לקבוצה</div>
          <div style={{display:'flex',gap:6}}>
            <button className="bs-craft" onClick={()=>{ window.WOLNet.partyJoin(invite.partyId); setInvite(null); window._partyInvite=null; showToast('הצטרפת לקבוצה!','#5aff8a'); refresh(); }}>✓ הצטרף</button>
            <button className="bs-craft" style={{background:'#5a2a2a'}} onClick={()=>{ setInvite(null); window._partyInvite=null; }}>✕ דחה</button>
          </div>
        </div>
      )}
      {party && party.partyId ? (
        <div>
          <div className="bs-guide">👥 <b>הקבוצה שלך</b> ({party.members?.length||1} חברים) — מוגנים מאש ידידותית, נלחמים יחד.</div>
          {(party.members||[]).map(m=>(
            <div key={m.id} className="bs-recipe">
              <div className="bs-r-head"><span className="bs-r-emoji">{m.leader?'👑':'⚔️'}</span>
                <span className="bs-r-name">{m.name}</span>
                <span style={{marginInlineStart:'auto',fontSize:'0.7rem',color:'#9a8aa8'}}>רמה {m.level}</span></div>
            </div>
          ))}
          <button className="bs-craft" style={{background:'#5a2a2a'}} onClick={()=>{ window.WOLNet.partyLeave(); showToast('עזבת את הקבוצה','#9a8aa8'); refresh(); }}>🚪 עזוב קבוצה</button>
        </div>
      ) : (
        <div>

// ════════════════════════════════════════════════
// DAILY REWARD — escalating rewards for consecutive logins
// ════════════════════════════════════════════════
const DAILY_REWARDS = [
  {gold:1000, xp:500}, {gold:2500, xp:1500}, {gold:5000, xp:3000},
  {gold:10000, xp:6000}, {gold:20000, xp:12000}, {gold:40000, xp:25000},
  {gold:100000, xp:60000, item:true},
];
function DailyPanel({player, showToast, rerender}){
  const [,setT]=useState(0);
  const now=Date.now(); const DAY=24*60*60*1000;
  const since = now - (player.dailyClaim||0);
  const canClaim = since >= DAY || !player.dailyClaim;
  const streak = player.dailyStreak||0;
  const claim=()=>{
    if(!canClaim){ showToast('כבר אספת היום! חזור מחר','#ff5a5a'); return; }
    // streak continues if claimed within 48h, else resets
    const newStreak = (since < 2*DAY && player.dailyClaim) ? streak+1 : 1;
    player.dailyStreak = newStreak;
    player.dailyClaim = now;
    const r = DAILY_REWARDS[Math.min(newStreak-1, DAILY_REWARDS.length-1)];
    player.gold += r.gold;
    if(r.item && player.inventory.length<40){ player.inventory.push(E.genItem(player.level,'legendary',2)); }
    showToast(`🎁 יום ${newStreak}: +${r.gold.toLocaleString()}🪙 +${r.xp.toLocaleString()}XP${r.item?' + חפץ אגדי!':''}`, '#ffd24a');
    setT(n=>n+1); rerender&&rerender();
  };
  return (
    <div>
      <div style={{textAlign:'center',marginBottom:14}}>
        <div style={{fontSize:'1.6rem',fontWeight:800,color:'#ffd24a'}}>🔥 רצף: {streak} ימים</div>
        <div style={{fontSize:'0.7rem',color:'#9a8aa8'}}>היכנס כל יום לתגמולים גדלים</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:14}}>
        {DAILY_REWARDS.map((r,i)=>{
          const claimed = streak>i && (!canClaim || streak>i+1);
          const isNext = (canClaim && i===streak%7) || (canClaim && streak===0 && i===0);
          return (
            <div key={i} style={{background:claimed?'#2a4a2a':isNext?'#3a2e5a':'#140e24',border:`1px solid ${isNext?'#c9a84a':'#2a2238'}`,borderRadius:6,padding:'6px 2px',textAlign:'center'}}>
              <div style={{fontSize:'0.55rem',color:'#9a8aa8'}}>יום {i+1}</div>
              <div style={{fontSize:'0.85rem'}}>{r.item?'🎁':'🪙'}</div>
              <div style={{fontSize:'0.5rem',color:'#c9a84a'}}>{r.gold>=1000?(r.gold/1000)+'K':r.gold}</div>
            </div>
          );
        })}
      </div>
      <button className="btn btn-main" style={{width:'100%',opacity:canClaim?1:0.5}} disabled={!canClaim} onClick={claim}>
        {canClaim?'🎁 אסוף תגמול יומי':'✓ נאסף — חזור מחר'}
      </button>
    </div>
  );
}

// STABLE — buy & equip mounts
// ════════════════════════════════════════════════
function StablePanel({player, showToast, rerender}){
  if(!player.mounts) player.mounts=['horse'];
  if(player.activeMount===undefined) player.activeMount=null;
  const [,setT]=useState(0); const refresh=()=>setT(n=>n+1);
  const buy=(m)=>{
    if(player.mounts.includes(m.id)){ showToast('כבר ברשותך','#ff5a5a'); return; }
    if(player.gold<m.price){ showToast('אין מספיק זהב','#ff5a5a'); return; }
    player.gold-=m.price; player.mounts.push(m.id);
    showToast(`🐎 קנית ${m.name}!`,'#5aff8a'); refresh(); rerender&&rerender();
  };
  const ride=(m)=>{ player.activeMount = player.activeMount===m.id ? null : m.id; showToast(player.activeMount?`רוכב על ${m.name}`:'ירדת','#5aff8a'); refresh(); rerender&&rerender(); };
  return (
    <div className="bs-panel">
      <div className="bs-guide">🐎 חיות רכיבה מגבירות את מהירות התנועה. רכוב בעולם הפתוח כדי לחצות מפות גדולות במהירות!</div>
      {Object.values(window.GAME_DATA.MOUNTS).map(m=>{
        const owned=player.mounts.includes(m.id); const active=player.activeMount===m.id;
        return (
          <div key={m.id} className="bs-recipe" style={{borderColor:active?'#5aff8a':'#3a5a8a'}}>
            <div className="bs-r-head"><span className="bs-r-emoji">{m.emoji}</span>
              <span className="bs-r-name">{m.name}</span>
              <span style={{marginInlineStart:'auto',fontSize:'0.7rem',color:'#88ddff'}}>×{m.speedMul} מהירות</span></div>
            <div className="bs-r-desc">{m.desc}</div>
            {owned
              ? <button className="bs-craft" style={{background:active?'#2a6a3a':'#3a5a8a'}} onClick={()=>ride(m)}>{active?'🛑 רד מהחיה':'🐎 רכב'}</button>
              : <button className="bs-craft" disabled={player.gold<m.price} onClick={()=>buy(m)}>🪙 {m.price.toLocaleString()}</button>}
          </div>
        );
      })}
    </div>
  );
}

// BLACKSMITH — crafting guide + forge unique items
// ════════════════════════════════════════════════
function BlacksmithPanel({player, showToast, rerender}){
  if(!player.materials) player.materials={};
  if(!player.craftedUniques) player.craftedUniques=[];
  const [, setT] = useState(0);
  const refresh = ()=>setT(n=>n+1);
  const mats = player.materials || {};
  const craft = (recipe)=>{
    const have = mats[recipe.mat]||0;
    if(player.craftedUniques && player.craftedUniques.includes(recipe.id) && recipe.rarity==='mythic'){
      showToast('כבר יצרת את החפץ הייחודי הזה','#ff5a5a'); return;
    }
    if(have < recipe.matCount){ showToast(`חסרים חומרים (${have}/${recipe.matCount})`,'#ff5a5a'); return; }
    if(player.inventory.length>=40){ showToast('התיק מלא!','#ff5a5a'); return; }
    player.materials[recipe.mat] = have - recipe.matCount;
    const item = E.craftUnique(recipe, player.level);
    player.inventory.push(item);
    if(!player.craftedUniques) player.craftedUniques=[];
    player.craftedUniques.push(recipe.id);
    // advance craft quests
    if(!player.quests) player.quests={};
    (window.GAME_DATA.QUESTS||[]).forEach(q=>{
      if(q.type==='craft' && q.reqLv<=player.level){
        if(!player.quests[q.id]) player.quests[q.id]={progress:0,done:false,claimed:false};
        const qs=player.quests[q.id]; if(!qs.done){ qs.progress=q.count; qs.done=true; }
      }
    });
    showToast(`🔨 יצרת ${recipe.emoji} ${recipe.name}!`, '#ffaa3a');
    refresh(); rerender && rerender();
  };
  return (
    <div className="bs-panel">
      <div className="bs-guide">
        <b>📖 מדריך הנפח</b><br/>
        חומרי יצירה נופלים במבוך הנפחייה 🔨 (4 אזורים). אסוף <b>15 חומרים</b> מאותו סוג
        כדי ליצור חלק ייחודי שמתאים לרמה שלך — חזק יותר מכל דבר שתמצא ברצפה.
        חפצי <b>endgame</b> דורשים גבישי נפחייה מהבוס.
      </div>
      <div className="bs-mats">
        {Object.values(window.GAME_DATA.MATERIALS).map(m=>(
          <div key={m.id} className="bs-mat">
            <span>{m.emoji}</span><span className="bs-mat-n">{m.name}</span>
            <span className="bs-mat-c" style={{color:(mats[m.id]||0)>0?'#5aff8a':'#7a6a8a'}}>{mats[m.id]||0}</span>
          </div>
        ))}
      </div>
      <div className="bs-recipes">
        {window.GAME_DATA.CRAFT_RECIPES.map(r=>{
          const have=mats[r.mat]||0; const can=have>=r.matCount; const rc=window.GAME_DATA.RARITY[r.rarity];
          const made = player.craftedUniques && player.craftedUniques.includes(r.id) && r.rarity==='mythic';
          return (
            <div key={r.id} className="bs-recipe" style={{borderColor:rc.color+'66'}}>
              <div className="bs-r-head"><span className="bs-r-emoji">{r.emoji}</span>
                <span className="bs-r-name" style={{color:rc.color}}>{r.name}</span></div>
              <div className="bs-r-desc">{r.desc}</div>
              <div className="bs-r-cost">{window.GAME_DATA.MATERIALS[r.mat].emoji} {have}/{r.matCount}</div>
              <button className="bs-craft" disabled={!can||made} onClick={()=>craft(r)}>
                {made?'✓ נוצר':can?'🔨 צור':'חסרים חומרים'}</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// DUNGEON GATEKEEPER — enter the forge dungeon
// (needs the rare key OR a free entry once every 3 days)
// ════════════════════════════════════════════════
const DUNGEON_COOLDOWN = 3*24*60*60*1000; // 3 days
function DungeonPanel({player, showToast, teleport, setModal}){
  const now = Date.now();
  const freeReady = (now - (player.lastDungeonEntry||0)) >= DUNGEON_COOLDOWN;
  const hasKey = player.dungeonKey;
  const msLeft = DUNGEON_COOLDOWN - (now - (player.lastDungeonEntry||0));
  const hoursLeft = Math.ceil(msLeft/3600000);
  const enter = (useKey)=>{
    if(player.level < 60){ showToast('דרושה רמה 60','#ff5a5a'); return; }
    if(useKey){
      if(!hasKey){ showToast('אין לך מפתח','#ff5a5a'); return; }
      player.dungeonKey = false;
    } else {
      if(!freeReady){ showToast(`כניסה חינם בעוד ${hoursLeft} שעות`,'#ff5a5a'); return; }
      player.lastDungeonEntry = now;
    }
    teleport('forge_dungeon'); setModal&&setModal(null);
  };
  return (
    <div className="dg-panel">
      <div className="dg-info">
        🔨 <b>מבוך הנפחייה</b> — מבוך מיוחד עם 4 אזורים מסוכנים. כל אזור מלא במפלצות
        שמפילות חומרי יצירה נדירים (1%), ובסופו בוס עוצמתי. <b>הבוס חזק מאוד — קח קבוצה של 4!</b>
        מהבוס נופלים חומרים לכל הקבוצה + סיכוי לחפצים נדירים.
      </div>
      <div className="dg-entry">
        <div className="dg-opt">
          <div className="dg-opt-t">🗝️ כניסה עם מפתח</div>
          <div className="dg-opt-s">{hasKey?'יש לך מפתח נדיר!':'אין מפתח (נופל נדיר במפות endgame)'}</div>
          <button className="btn btn-main" disabled={!hasKey} onClick={()=>enter(true)}>היכנס עם מפתח</button>
        </div>
        <div className="dg-opt">
          <div className="dg-opt-t">🆓 כניסה חינם</div>
          <div className="dg-opt-s">{freeReady?'זמין עכשיו!':`בעוד ${hoursLeft} שעות`}</div>
          <button className="btn btn-main" disabled={!freeReady} onClick={()=>enter(false)}>כניסה חינם (כל 3 ימים)</button>
        </div>
      </div>
    </div>
  );
}

// CHAT PANEL — local world chat with bot players
// (placeholder until a real multiplayer server exists)
// ════════════════════════════════════════════════
const BOT_NAMES = ['דרקון_קילר','שדאו99','אלופת_הקשת','מאגוס','נינ׳ה_שקטה','לוחם_הברזל','פיניקס','כספיון','רוח_רפאים','מלך_הזהב','סער','אבירה'];
const BOT_LINES = [
  'מישהו רוצה לעשות את בוס תהום הנשמות?','איזה דרופ מטורף קיבלתי עכשיו!','מישהו יודע איפה מפיל סט התהום?',
  'רמה 200 סוף סוף!!','הקומבו קריטי הזה הורס','מי פה הכי חזק?','מחפש קבוצה לאסטרל','עליתי רמה 🎉',
  'הבוס הזה בלתי אפשרי לבד','איזו מחלקה הכי טובה לדעתכם?','קניתי סט חדש, שווה?','מישהו ב-PvP?',
  'GG','חחח מת לבוס','עוד טיפה ואני באוקליבן','מוכר חפצים אגדיים זול'];
function ChatPanel({player, showToast}){
  const online = window.WOLNet && window.WOLNet.isOnline();
  const [msgs,setMsgs]=useState(()=> (window._chatInbox && window._chatInbox.length ? window._chatInbox.slice(-40) : (window._chatLog || [
    {who:'מערכת',txt: online?'ברוך הבא לצ׳אט העולמי החי! 🟢':'ברוך הבא לצ׳אט (מצב לא-מקוון — בוטים. הפעל שרת לצ׳אט אמיתי)',sys:true},
  ])));
  const [txt,setTxt]=useState('');
  const endRef=useRef(null);
  useEffect(()=>{ window._chatLog=msgs; if(endRef.current) endRef.current.scrollTop=endRef.current.scrollHeight; },[msgs]);
  // Mark chat open (so the global handler won't toast), and subscribe to pushes.
  useEffect(()=>{
    window._chatOpen = true;
    window._onChatPush = ()=>{ setMsgs((window._chatInbox||[]).slice(-40)); };
    return ()=>{ window._chatOpen=false; window._onChatPush=null; };
  },[]);
  // ONLINE messages arrive via the always-on global handler → _chatInbox → _onChatPush.
  // OFFLINE: generate bot chatter locally.
  useEffect(()=>{
    if(online) return; // online handled globally
    const iv=setInterval(()=>{
      if(Math.random()<0.7){
        const who=BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];
        const t=BOT_LINES[Math.floor(Math.random()*BOT_LINES.length)];
        setMsgs(m=>[...m.slice(-40),{who,txt:t,lv:50+Math.floor(Math.random()*200)}]);
      }
    },4000);
    return ()=>clearInterval(iv);
  },[online]);
  const send=()=>{
    const t=txt.trim(); if(!t) return;
    setTxt('');
    if(online){
      window.WOLNet.chat(t); // server will echo back to everyone incl. me
    } else {
      if(window.G && window.G.player) window.G._myBubble={txt:t.length>60?t.slice(0,60)+'…':t, until:Date.now()+5000};
      setMsgs(m=>[...m.slice(-40),{who:player.name||'אני',txt:t,me:true,lv:player.level}]);
      if(Math.random()<0.5) setTimeout(()=>{
        const who=BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];
        const replies=['מסכים!','חחח','נכון','איפה אתה במפה?','בוא נעשה ביחד','מגניב'];
        setMsgs(m=>[...m.slice(-40),{who,txt:replies[Math.floor(Math.random()*replies.length)],lv:50+Math.floor(Math.random()*150)}]);
      },1200+Math.random()*1500);
    }
  };
  return (
    <div className="chat-panel">
      {online && <div style={{fontSize:'0.62rem',color:'#5aff8a',textAlign:'center',paddingBottom:4}}>🟢 צ׳אט חי • {window.WOLNet.peers.size+1} מחוברים</div>}
      <div className="chat-msgs" ref={endRef}>
        {msgs.map((m,i)=>(
          <div key={i} className={'chat-msg'+(m.me?' me':'')+(m.sys?' sys':'')}>
            {!m.sys && <span className="chat-who" style={m.me?{color:'#5affc0'}:{color:'#c9a84a'}}>{m.who}{m.lv?` [${m.lv}]`:''}:</span>}
            <span className="chat-txt">{m.txt}</span>
          </div>
        ))}
      </div>
      <div className="chat-input-row">
        <input className="chat-input" value={txt} maxLength={120} placeholder="כתוב הודעה..."
          onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} dir="rtl" />
        <button className="chat-send" onClick={send}>שלח</button>
      </div>
    </div>
  );
}

  const accounts = E.listAccounts().filter(a=>a.username.toLowerCase().includes(search.toLowerCase()));
  const totalChars = E.listAccounts().reduce((s,a)=>s+a.charCount,0);
  const doGrant=(username,opts)=>{ if(E.adminGrant(username,opts)){ refresh(); } };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal admin-pro" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <span className="modal-title">🛡️ פאנל אדמין מקצועי</span>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {/* server stats */}
          <div className="admin-stats">
            <div className="admin-stat"><b>{E.listAccounts().length}</b><span>חשבונות</span></div>
            <div className="admin-stat"><b>{totalChars}</b><span>דמויות</span></div>
            <div className="admin-stat"><b>{E.listAccounts().filter(a=>a.isAdmin).length}</b><span>אדמינים</span></div>
            <div className="admin-stat"><b>{E.listAccounts().filter(a=>a.banned).length}</b><span>מורחקים</span></div>
            <div className="admin-stat"><b>{(window.WOLNet&&window.WOLNet.isOnline())?window.WOLNet.peers.size+1:'—'}</b><span>מקוונים</span></div>
          </div>
          {/* live game GM (only when in-game) */}
          {window.__GM_HOOKS__ ? (
            <div className="admin-section">
              <div className="admin-sec-t">🎮 בקרות GM למשחק הנוכחי</div>
              <div className="admin-grid">
                <button className="admin-btn" onClick={()=>{ const lv=prompt('עלה לרמה (1-250):',grantLv); if(lv)window.__GM_HOOKS__.setLevel(+lv); }}>⬆️ קבע רמה</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.heal()}>❤️ ריפוי מלא</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.god()}>🛡️ אל-מוות</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.speed()}>💨 מהירות-על</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.gold(100000)}>💰 +100K זהב</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.gold(10000000)}>💰 +10M זהב</button>
                <button className="admin-btn" onClick={()=>{ const x=prompt('כמה XP?','100000'); if(x)window.__GM_HOOKS__.giveXP(+x); }}>⭐ תן XP</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.doubleXp()}>⭐ XP כפול</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.unlockAll()}>🗺️ פתח עולמות</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.killAll()}>💀 הרוג הכל</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.bossRush()}>👑 פלישת בוסים</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.treasure()}>💎 גשם אוצרות</button>
              </div>
              <div className="admin-sec-t" style={{marginTop:10}}>🎁 חפצים וחומרים</div>
              <div className="admin-grid">
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.spawnItem('legendary')}>🟠 חפץ אגדי</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.spawnItem('mythic')}>🔴 חפץ מיתי</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.allMaterials()}>🔨 +50 חומרים</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.allMounts()}>🐎 כל החיות</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.dungeonKey()}>🗝️ מפתח מבוך</button>
                <button className="admin-btn" onClick={()=>window.__GM_HOOKS__.maxStats()}>💪 אפס נקודות</button>
              </div>
            </div>
          ) : (
            <div className="admin-section" style={{borderColor:'#5a4a2a'}}>
              <div className="admin-sec-t" style={{color:'#ffd24a'}}>🎮 בקרות GM למשחק</div>
              <div style={{fontSize:'0.7rem',color:'#c8bce0',lineHeight:1.5}}>
                כדי לקבל גישה לכל בקרות ה-GM (רמה, זהב, אל-מוות, חפצים, אירועים ועוד) —
                בחר דמות והיכנס למשחק, ואז פתח את פאנל האדמין מתוך המשחק.
              </div>
            </div>
          )}
          {/* account search */}
          <input className="chat-input" style={{width:'100%',margin:'8px 0'}} placeholder="🔍 חפש חשבון..."
            value={search} onChange={e=>setSearch(e.target.value)} dir="rtl" />
          {/* account list */}
          <div className="admin-accts">
            {accounts.map(a=>(
              <div key={a.username} className={'admin-acct'+(sel===a.username?' sel':'')+(a.banned?' banned':'')}>
                <div className="admin-acct-head" onClick={()=>setSel(sel===a.username?null:a.username)}>
                  <div>
                    {a.isAdmin && <span className="gm-tag">GM</span>}
                    {a.banned && <span className="ban-tag">⛔</span>}
                    <b>{a.username}</b>
                    {a.username===myAccount && <span style={{color:'#5aff8a',fontSize:'0.6rem'}}> (אתה)</span>}
                  </div>
                  <div className="admin-acct-sub">{a.charCount} דמויות • רמה מקס {a.maxLevel}</div>
                </div>
                {sel===a.username && (
                  <div className="admin-acct-expand">
                    {/* characters list */}
                    {a.characters.map((c,i)=>(
                      <div key={i} className="admin-char">⚔️ {c.name} • {(D.CLASSES.find(x=>x.id===c.classId)||{}).name} • רמה {c.level}</div>
                    ))}
                    {/* grant controls */}
                    <div className="admin-grant">
                      <div className="admin-grant-row">
                        <input type="number" value={grantLv} onChange={e=>setGrantLv(+e.target.value)} className="admin-num"/>
                        <button className="admin-btn sm" onClick={()=>doGrant(a.username,{level:grantLv})}>קבע רמה</button>
                      </div>
                      <div className="admin-grant-row">
                        <input type="number" value={grantGold} onChange={e=>setGrantGold(+e.target.value)} className="admin-num"/>
                        <button className="admin-btn sm" onClick={()=>doGrant(a.username,{gold:grantGold})}>תן זהב</button>
                      </div>
                    </div>
                    {/* actions */}
                    <div className="admin-acct-actions">
                      <button className="admin-btn sm" style={a.isAdmin?{borderColor:'#c0392b'}:{}}
                        onClick={()=>{ E.setAdmin(a.username,!a.isAdmin); refresh(); }}>{a.isAdmin?'הסר GM':'הפוך GM'}</button>
                      {a.username!==myAccount && <button className="admin-btn sm" style={{borderColor:a.banned?'#5aff8a':'#e67e22'}}
                        onClick={()=>{ E.banAccount(a.username,!a.banned); refresh(); }}>{a.banned?'בטל הרחקה':'⛔ הרחק'}</button>}
                      {a.username!==myAccount && <button className="admin-btn sm" style={{borderColor:'#7a2a2a'}}
                        onClick={()=>{ if(confirm(`למחוק לצמיתות את ${a.username}?`)){ E.deleteAccount(a.username); setSel(null); refresh(); } }}>🗑️ מחק</button>}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// Small animated player preview for the evolution overlay
function EvoPlayerPreview({ classId, evoStage, color }){
  const cvRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(()=>{
    const cv = cvRef.current;
    if(!cv) return;
    const size = 150;
    cv.width = size; cv.height = size;
    let running = true;
    function draw(ts){
      if(!running) return;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0,0,size,size);
      // Glow ring centered in canvas
      const cx = size/2, cy = size*0.42;
      ctx.save();
      const pulse = 0.4 + Math.sin(ts/300)*0.35;
      ctx.globalAlpha = pulse;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 58);
      g.addColorStop(0, color); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, 58, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // anchor at (cx, cy) — drawPlayer draws head ~s*0.85 above and feet ~s*1.21 below
      // s = 26 + evoStage*3, max s=32 → total height ~62px, well within 150px canvas
      SP.drawPlayer(ctx, cx, cy, classId, false, ts, 1, evoStage);
      rafRef.current = requestAnimationFrame(draw);
    }
    rafRef.current = requestAnimationFrame(draw);
    return ()=>{ running=false; cancelAnimationFrame(rafRef.current); };
  }, [classId, evoStage, color]);
  return (
    <canvas ref={cvRef}
      style={{width:150,height:150,display:'block',margin:'0 auto 4px',filter:`drop-shadow(0 0 22px ${color})`}} />
  );
}
